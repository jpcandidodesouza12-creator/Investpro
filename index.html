<script type="text/babel" data-presets="react,env">
  // ... (mesmas constantes iniciais: LS_KEY, CDI_ATUAL, BANK_COLORS)

  function App() {
    // 1. Correção: Estado inicial mais robusto
    const [invs, setInvs] = useState(() => {
      try {
        const saved = localStorage.getItem(LS_KEY);
        return saved ? JSON.parse(saved) : [];
      } catch (e) { return []; }
    });

    const [modal, setModal] = useState(null);

    useEffect(() => {
      localStorage.setItem(LS_KEY, JSON.stringify(invs));
      const loader = document.getElementById('loading');
      if(loader) loader.style.display = 'none';
    }, [invs]);

    // 2. Correção: Evitar NaN no cálculo total
    const totalInv = useMemo(() => 
      invs.reduce((a, c) => a + (Number(c.valor) || 0), 0)
    , [invs]);

    const dataBancos = useMemo(() => {
      const map = {};
      invs.forEach(i => {
        const b = i.banco || "Outros";
        map[b] = (map[b] || 0) + (Number(i.valor) || 0);
      });
      return Object.entries(map).map(([name, value]) => ({ 
        name, 
        value, 
        color: BANK_COLORS[name] || "#666" 
      })).sort((a,b) => b.value - a.value);
    }, [invs]);

    const saveInv = (form) => {
      // 3. Correção: Garantir que valores vazios não quebrem o app
      const valorNumerico = parseFloat(form.valor) || 0;
      const pctNumerico = parseFloat(form.pct) || 0;

      if (form.id === undefined || form.id === null) {
        // Criar novo
        setInvs([...invs, { ...form, valor: valorNumerico, pct: pctNumerico, id: Date.now() }]);
      } else {
        // Editar existente
        setInvs(invs.map(i => i.id === form.id ? { ...form, valor: valorNumerico, pct: pctNumerico } : i));
      }
      setModal(null);
    };

    return (
      <div style={{ padding: "30px", maxWidth: "1200px", margin: "0 auto" }}>
        {/* ... (Header e KPIs iguais) ... */}

        {/* ... (Gráficos iguais) ... */}

        {/* Modal Corrigido */}
        {modal && (
          <div style={styles.overlay}>
            <div style={styles.modal}>
              <h2 style={{ marginBottom: "20px" }}>{modal.id ? "Editar Ativo" : "Novo Ativo"}</h2>
              
              <label style={styles.label}>Nome do Investimento</label>
              <input style={styles.input} defaultValue={modal.nome} id="m_nome" />
              
              <label style={styles.label}>Instituição (Banco)</label>
              <select style={styles.input} defaultValue={modal.banco || "Nubank"} id="m_banco">
                {Object.keys(BANK_COLORS).map(b => <option key={b} value={b}>{b}</option>)}
              </select>

              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px" }}>
                <div>
                  <label style={styles.label}>Valor (R$)</label>
                  <input style={styles.input} type="number" defaultValue={modal.valor} id="m_valor" />
                </div>
                <div>
                  <label style={styles.label}>% CDI</label>
                  <input style={styles.input} type="number" defaultValue={modal.pct} id="m_pct" />
                </div>
              </div>

              <div style={{ display: "flex", gap: "10px", marginTop: "20px" }}>
                <button onClick={() => setModal(null)} style={styles.btnSec}>Cancelar</button>
                <button onClick={() => {
                  saveInv({
                    id: modal.id, // Aqui passamos o ID original se for edição
                    nome: document.getElementById('m_nome').value,
                    banco: document.getElementById('m_banco').value,
                    valor: document.getElementById('m_valor').value,
                    pct: document.getElementById('m_pct').value,
                    tipo: "cdb",
                    data: "2024-01-01"
                  });
                }} style={styles.btnMain}>Salvar</button>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }
  // ... (Estilos e Render)
</script>
