<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InvestPro | Multi-Bancos</title>
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prop-types@15/prop-types.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/recharts@2.12.7/umd/Recharts.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#090909;color:#fff;font-family:sans-serif;overflow-x:hidden}
    #loading{position:fixed;inset:0;background:#090909;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;color:#F5C518;font-family:monospace;font-size:14px;z-index:9999}
    .spinner{width:36px;height:36px;border:3px solid #222;border-top-color:#F5C518;border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div id="loading"><div class="spinner"></div><span>🪙 Sincronizando Instituições...</span></div>
  <div id="root"></div>
  <script type="text/babel" data-presets="react,env">
const { useState, useMemo, useEffect, useCallback, useRef } = React;
const { AreaChart, Area, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, PieChart, Pie, Cell } = Recharts;

// --- Configurações de Cores de Bancos ---
const BANK_CONFIG = {
  "Nubank": { color: "#8a05be", icon: "💜" },
  "Inter": { color: "#ff7a00", icon: "🧡" },
  "C6 Bank": { color: "#222222", icon: "🖤" },
  "BTG Pactual": { color: "#001529", icon: "💙" },
  "XP Investimentos": { color: "#e2c97e", icon: "💛" },
  "Itaú": { color: "#ec7000", icon: "🧡" },
  "Outros": { color: "#444444", icon: "🏦" }
};

// --- Constantes Mantidas ---
const LS_KEY = "investpro_v8_bancos";
const CDI_ATUAL = 14.51;
const FX_DEFAULT = { USD: 5.72, EUR: 6.21 };

const TYPES = [
  { id: "cdb", label: "CDB", icon: "🏦", color: "#F5C518", ir: true },
  { id: "lci", label: "LCI/LCA", icon: "🌾", color: "#ffffff", ir: false },
  { id: "tesouro", label: "Tesouro", icon: "🏛️", color: "#aaaaaa", ir: true },
  { id: "bolsa", label: "Bolsa BR", icon: "📈", color: "#F5C518", ir: false },
  { id: "fii", label: "FII", icon: "🏢", color: "#e2a07e", ir: false },
  { id: "crypto", label: "Crypto", icon: "₿", color: "#f7931a", ir: false },
  { id: "stocks_us", label: "Ações EUA", icon: "🇺🇸", color: "#60a5fa", ir: false, currency: "USD" },
];

const ICONS = {
  dashboard: `<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="2" y="2" width="7" height="7" rx="1.5"/><rect x="11" y="2" width="7" height="7" rx="1.5"/><rect x="2" y="11" width="7" height="7" rx="1.5"/><rect x="11" y="11" width="7" height="7" rx="1.5"/></svg>`,
  investments: `<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><polyline points="2,14 7,9 11,12 18,5"/><polyline points="13,5 18,5 18,10"/></svg>`,
  settings: `<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="10" cy="10" r="3"/><path d="M10 1v2M10 17v2M1 10h2M17 10h2"/></svg>`,
  bank: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21h18M3 10h18M5 10v11M9 10v11M15 10v11M19 10v11M12 3l9 7H3l9-7z"/></svg>`
};

function Icon({ name, size=16 }) {
  return <span style={{ display:"inline-flex", width:size, height:size }} dangerouslySetInnerHTML={{ __html: ICONS[name] }} />;
}

// --- Helpers ---
const fmt = v => new Intl.NumberFormat("pt-BR", { style: "currency", currency: "BRL" }).format(v);

function App() {
  const [invs, setInvs] = useState(() => {
    const s = localStorage.getItem(LS_KEY);
    return s ? JSON.parse(s) : [
      { id: 1, nome: "CDB Liquidez", banco: "Nubank", tipo: "cdb", valor: 10000, pct: 100, data: "2024-01-01" },
      { id: 2, nome: "LCI IPCA", banco: "Inter", tipo: "lci", valor: 5000, pct: 95, data: "2024-02-01" }
    ];
  });
  const [screen, setScreen] = useState("dashboard");
  const [modal, setModal] = useState(null);

  useEffect(() => {
    localStorage.setItem(LS_KEY, JSON.stringify(invs));
    document.getElementById('loading').style.display = 'none';
  }, [invs]);

  const totalGeral = invs.reduce((a, c) => a + c.valor, 0);

  // Agrupamento por Banco
  const dadosBancos = useMemo(() => {
    const mapa = {};
    invs.forEach(i => {
      const b = i.banco || "Outros";
      mapa[b] = (mapa[b] || 0) + i.valor;
    });
    return Object.entries(mapa).map(([name, value]) => ({
      name,
      value,
      color: BANK_CONFIG[name]?.color || "#444"
    })).sort((a,b) => b.value - a.value);
  }, [invs]);

  return (
    <div style={{ padding: "20px", maxWidth: "1200px", margin: "0 auto" }}>
      <header style={{ display: "flex", justifyContent: "space-between", marginBottom: "30px", alignItems: "center" }}>
        <div>
          <h1 style={{ fontSize: "28px", fontWeight: "800" }}>InvestPro <span style={{color:"#F5C518"}}>Banks</span></h1>
          <p style={{ color: "#555", fontSize: "12px" }}>Gestão de Patrimônio por Instituição</p>
        </div>
        <div style={{ display: "flex", gap: "10px" }}>
          <button onClick={() => setScreen("dashboard")} style={screen === "dashboard" ? styles.btnNavActive : styles.btnNav}>Dashboard</button>
          <button onClick={() => setScreen("investments")} style={screen === "investments" ? styles.btnNavActive : styles.btnNav}>Ativos</button>
          <button onClick={() => setModal({})} style={styles.btnMain}>+ Novo Ativo</button>
        </div>
      </header>

      {screen === "dashboard" ? (
        <>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(200px, 1fr))", gap: "15px", marginBottom: "30px" }}>
            <div style={styles.kpiCard}>
              <div style={styles.kpiLabel}>PATRIMÔNIO TOTAL</div>
              <div style={styles.kpiValue}>{fmt(totalGeral)}</div>
            </div>
            {dadosBancos.slice(0, 3).map(b => (
              <div key={b.name} style={{ ...styles.kpiCard, borderLeft: `4px solid ${b.color}` }}>
                <div style={styles.kpiLabel}>{b.name.toUpperCase()}</div>
                <div style={{ fontSize: "18px", fontWeight: "700" }}>{fmt(b.value)}</div>
              </div>
            ))}
          </div>

          <div style={{ display: "grid", gridTemplateColumns: window.innerWidth < 768 ? "1fr" : "1fr 1fr", gap: "20px" }}>
            <div style={styles.chartCard}>
              <h3 style={styles.chartTitle}>Distribuição por Instituição</h3>
              <ResponsiveContainer width="100%" height={250}>
                <PieChart>
                  <Pie data={dadosBancos} dataKey="value" nameKey="name" cx="50%" cy="50%" innerRadius={60} outerRadius={80} paddingAngle={5}>
                    {dadosBancos.map((e, i) => <Cell key={i} fill={e.color} />)}
                  </Pie>
                  <Tooltip formatter={v => fmt(v)} contentStyle={{background:"#111", border:"1px solid #333"}} />
                  <Legend />
                </PieChart>
              </ResponsiveContainer>
            </div>

            <div style={styles.chartCard}>
              <h3 style={styles.chartTitle}>Top Bancos (R$)</h3>
              <ResponsiveContainer width="100%" height={250}>
                <BarChart data={dadosBancos}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#222" vertical={false} />
                  <XAxis dataKey="name" tick={{fill: "#555", fontSize: 10}} axisLine={false} />
                  <YAxis tickFormatter={v => `R$${v/1000}k`} tick={{fill: "#555", fontSize: 10}} axisLine={false} />
                  <Bar dataKey="value" radius={[4, 4, 0, 0]}>
                    {dadosBancos.map((e, i) => <Cell key={i} fill={e.color} />)}
                  </Bar>
                  <Tooltip formatter={v => fmt(v)} cursor={{fill: "#1a1a1a"}} contentStyle={{background:"#111", border:"1px solid #333"}} />
                </BarChart>
              </ResponsiveContainer>
            </div>
          </div>
        </>
      ) : (
        <div style={styles.chartCard}>
          <table style={{ width: "100%", borderCollapse: "collapse" }}>
            <thead>
              <tr style={{ textAlign: "left", color: "#444", fontSize: "11px", borderBottom: "1px solid #222" }}>
                <th style={{ padding: "12px" }}>ATIVO</th>
                <th>INSTITUIÇÃO</th>
                <th>VALOR</th>
                <th>RENTABILIDADE</th>
                <th>AÇÕES</th>
              </tr>
            </thead>
            <tbody>
              {invs.map(inv => (
                <tr key={inv.id} style={{ borderBottom: "1px solid #161616" }}>
                  <td style={{ padding: "15px", fontWeight: "600" }}>{inv.nome}</td>
                  <td>
                    <span style={{ 
                      padding: "4px 10px", borderRadius: "6px", fontSize: "10px", fontWeight: "700",
                      background: (BANK_CONFIG[inv.banco]?.color || "#333") + "22",
                      color: BANK_CONFIG[inv.banco]?.color || "#ccc",
                      border: `1px solid ${BANK_CONFIG[inv.banco]?.color || "#333"}44`
                    }}>
                      {BANK_CONFIG[inv.banco]?.icon} {inv.banco}
                    </span>
                  </td>
                  <td style={{ color: "#F5C518", fontWeight: "700" }}>{fmt(inv.valor)}</td>
                  <td style={{ color: "#7ecfb3", fontSize: "12px" }}>{inv.pct}% CDI</td>
                  <td>
                    <button onClick={() => setModal(inv)} style={styles.actionBtn}>✏️</button>
                    <button onClick={() => setInvs(invs.filter(i => i.id !== inv.id))} style={styles.actionBtn}>🗑️</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {modal && (
        <div style={styles.overlay}>
          <div style={styles.modal}>
            <h2 style={{ marginBottom: "20px" }}>{modal.id ? "Editar" : "Novo"} Ativo</h2>
            
            <label style={styles.label}>Nome do Ativo</label>
            <input id="m_nome" style={styles.input} defaultValue={modal.nome} placeholder="Ex: CDB Pós" />

            <label style={styles.label}>Instituição (Banco)</label>
            <select id="m_banco" style={styles.input} defaultValue={modal.banco}>
              {Object.keys(BANK_CONFIG).map(b => <option key={b} value={b}>{b}</option>)}
            </select>

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px" }}>
              <div>
                <label style={styles.label}>Valor (R$)</label>
                <input id="m_valor" type="number" style={styles.input} defaultValue={modal.valor} />
              </div>
              <div>
                <label style={styles.label}>% CDI</label>
                <input id="m_pct" type="number" style={styles.input} defaultValue={modal.pct} />
              </div>
            </div>

            <div style={{ display: "flex", gap: "10px", marginTop: "25px" }}>
              <button onClick={() => setModal(null)} style={styles.btnSec}>Cancelar</button>
              <button onClick={() => {
                const novo = {
                  id: modal.id || Date.now(),
                  nome: document.getElementById('m_nome').value,
                  banco: document.getElementById('m_banco').value,
                  valor: parseFloat(document.getElementById('m_valor').value),
                  pct: parseFloat(document.getElementById('m_pct').value),
                  tipo: "cdb", data: modal.data || "2024-03-20"
                };
                if (modal.id) setInvs(invs.map(i => i.id === modal.id ? novo : i));
                else setInvs([...invs, novo]);
                setModal(null);
              }} style={styles.btnMain}>Confirmar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const styles = {
  kpiCard: { background: "#111", padding: "20px", borderRadius: "12px", border: "1px solid #222" },
  kpiLabel: { fontSize: "10px", color: "#555", letterSpacing: "1px", marginBottom: "8px" },
  kpiValue: { fontSize: "24px", fontWeight: "800", color: "#F5C518" },
  chartCard: { background: "#111", padding: "20px", borderRadius: "15px", border: "1px solid #222" },
  chartTitle: { fontSize: "11px", color: "#444", textTransform: "uppercase", marginBottom: "20px", letterSpacing: "1px" },
  btnMain: { background: "#F5C518", border: "none", padding: "10px 20px", borderRadius: "8px", fontWeight: "bold", cursor: "pointer" },
  btnNav: { background: "none", border: "none", color: "#555", cursor: "pointer", fontWeight: "600" },
  btnNavActive: { background: "none", border: "none", color: "#F5C518", cursor: "pointer", fontWeight: "800", borderBottom: "2px solid #F5C518" },
  overlay: { position: "fixed", inset: 0, background: "rgba(0,0,0,0.9)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000 },
  modal: { background: "#111", padding: "30px", borderRadius: "16px", width: "400px", border: "1px solid #333" },
  input: { width: "100%", background: "#000", border: "1px solid #222", padding: "12px", borderRadius: "8px", color: "#fff", marginBottom: "15px" },
  label: { fontSize: "10px", color: "#555", display: "block", marginBottom: "5px" },
  btnSec: { background: "#222", border: "none", color: "#fff", padding: "10px 20px", borderRadius: "8px", cursor: "pointer" },
  actionBtn: { background: "none", border: "none", cursor: "pointer", fontSize: "16px", marginLeft: "8px" }
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>
