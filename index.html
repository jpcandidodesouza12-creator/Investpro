function useIsMobile() {
  const [v, set] = useState(false);
  useEffect(() => {
    const fn = () => set(window.innerWidth < 768);
    fn();
    window.addEventListener("resize", fn);
    return () => window.removeEventListener("resize", fn);
  }, []);
  return v;
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function getType(id) { return TYPES.find(t => t.id === id) || TYPES[TYPES.length - 1]; }

function irAliquota(dias) {
  if (dias <= 180) return 0.225;
  if (dias <= 360) return 0.200;
  if (dias <= 720) return 0.175;
  return 0.15;
}
function irLabel(dias) {
  if (dias <= 180) return "22,5%";
  if (dias <= 360) return "20,0%";
  if (dias <= 720) return "17,5%";
  return "15,0%";
}

function getIRAlert(inv) {
  const dias = Math.round((Date.now() - new Date(inv.data + "T12:00:00").getTime()) / 86400000);
  const bands = [[160, 180, "22,5%", "20,0%"], [340, 360, "20,0%", "17,5%"], [700, 720, "17,5%", "15,0%"]];
  for (const [s, e, from, to] of bands) {
    if (dias >= s && dias < e) {
      return { faixa: from, proxima: to, diasRestantes: e - dias, urgente: dias >= s + 15 };
    }
  }
  return null;
}

function getVencAlert(inv) {
  if (!inv.vencimento) return null;
  const dias = Math.round((new Date(inv.vencimento + "T12:00:00").getTime() - Date.now()) / 86400000);
  if (dias < 0)   return { label: "Vencido",   dias: Math.abs(dias), cor: "#e27e7e", urgente: true  };
  if (dias <= 30) return { label: `${dias}d`,  dias, cor: "#e27e9a", urgente: true  };
  if (dias <= 90) return { label: `${dias}d`,  dias, cor: "#e2c97e", urgente: false };
  return null;
}

function addMonths(date, n) {
  const d = new Date(date);
  d.setMonth(d.getMonth() + n);
  return d;
}

function calcMonths(inv, cdiRate, fx) {
  const t      = getType(inv.tipo);
  const annual = t.intl ? (inv.pct / 100) : ((cdiRate * (inv.pct || 100)) / 10000);
  const mo     = Math.pow(1 + annual, 1 / 12) - 1;
  const start  = new Date(inv.data + "T12:00:00");
  const today  = new Date();
  const past   = Math.max(0,
    (today.getFullYear() - start.getFullYear()) * 12 + today.getMonth() - start.getMonth()
  );
  const fxRate  = t.currency ? (fx[t.currency] || 1) : 1;
  const valBRL  = inv.valor * fxRate;

  return Array.from({ length: 24 }, (_, i) => {
    const fd       = addMonths(today, i + 1);
    const dtot     = Math.round((fd - start) / 86400000);
    const aliq     = t.ir ? irAliquota(dtot) : 0;
    const saldo    = valBRL * Math.pow(1 + mo, past + i + 1);
    const rb       = saldo - valBRL;
    const ir       = rb * aliq;
    const rl       = rb - ir;
    return {
      mes:          fd.toLocaleDateString("pt-BR", { month: "short", year: "numeric" }),
      saldo,        rendimento: rb,
      ir,           aliquotaLabel: irLabel(dtot),
      saldoLiquido: valBRL + rl,
      rendLiquido:  rl,
    };
  });
}

// ─── Storage ──────────────────────────────────────────────────────────────────
const LS_SNAPS = "investpro_snaps_v1";
const MAX_SNAPS = 10;

function lsLoad() {
  try { const r = localStorage.getItem(LS_KEY); return r ? JSON.parse(r) : null; }
  catch (_) { return null; }
}

function lsSave(d) {
  try {
    // Before overwriting, snapshot the current state
    const current = localStorage.getItem(LS_KEY);
    if (current) {
      try {
        const snaps = JSON.parse(localStorage.getItem(LS_SNAPS) || "[]");
        const cur   = JSON.parse(current);
        const label = cur.investments
          ? `${cur.investments.length} ativo${cur.investments.length!==1?"s":""}`
          : "snapshot";
        snaps.unshift({
          ts:      Date.now(),
          label,
          data:    current,
        });
        localStorage.setItem(LS_SNAPS, JSON.stringify(snaps.slice(0, MAX_SNAPS)));
      } catch (_) {}
    }
    localStorage.setItem(LS_KEY, JSON.stringify(d));
  } catch (_) {}
}

function lsLoadSnaps() {
  try { return JSON.parse(localStorage.getItem(LS_SNAPS) || "[]"); }
  catch (_) { return []; }
}

function lsRestoreSnap(snapData) {
  try {
    // Snapshot current state before restoring
    const current = localStorage.getItem(LS_KEY);
    if (current) {
      const snaps = lsLoadSnaps();
      const cur   = JSON.parse(current);
      snaps.unshift({ ts: Date.now(), label: `(antes do restore) ${cur.investments?.length||0} ativos`, data: current });
      localStorage.setItem(LS_SNAPS, JSON.stringify(snaps.slice(0, MAX_SNAPS)));
    }
    localStorage.setItem(LS_KEY, snapData);
    return JSON.parse(snapData);
  } catch (_) { return null; }
}

// ─── Export / Import ──────────────────────────────────────────────────────────
function doExportJSON(investments, categories, settings, deposits) {
  const b = new Blob([JSON.stringify({ investments, categories, settings, deposits }, null, 2)], { type: "application/json" });
  const a = Object.assign(document.createElement("a"), { href: URL.createObjectURL(b), download: `investpro_${Date.now()}.json` });
  a.click(); URL.revokeObjectURL(a.href);
}
function doExportCSV(investments) {
  const rows = ["id,nome,tipo,valor,pct,data,vencimento,categoriaId",
    ...investments.map(i => `${i.id},"${i.nome}",${i.tipo},${i.valor},${i.pct},${i.data},${i.vencimento||""},${i.categoriaId||""}`)];
  const b = new Blob([rows.join("\n")], { type: "text/csv" });
  const a = Object.assign(document.createElement("a"), { href: URL.createObjectURL(b), download: `investpro_${Date.now()}.csv` });
  a.click(); URL.revokeObjectURL(a.href);
}
function parseImport(text, isCSV) {
  if (isCSV) {
    const rows = text.trim().split("\n").slice(1);
    const investments = rows.map((l, i) => {
      const c = l.split(",");
      return { id: parseInt(c[0]) || i+1, nome: (c[1]||"").replace(/"/g,""), tipo: c[2]||"cdb", valor: parseFloat(c[3])||0, pct: parseFloat(c[4])||100, data: c[5]||"2024-01-01", vencimento: c[6]||null, categoriaId: c[7] ? parseInt(c[7]) : null };
    });
    return { investments };
  }
  const d = JSON.parse(text);
  if (!Array.isArray(d.investments)) throw new Error("Invalid");
  return d;
}

const DEF_WATCHLIST = {

async function fetchAllQuotes(watchlist) {
  const currencies = (watchlist.currencies || []).join(", ");
  const br         = (watchlist.br         || []).join(", ");
  const us         = (watchlist.us         || []).join(", ");
  const crypto     = (watchlist.crypto     || []).join(", ");

  const today = new Date().toLocaleDateString("pt-BR");

  let rawText = "";
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 2048,
        system: "Você é um assistente financeiro. Responda APENAS com JSON válido entre <<<JSON e JSON>>>.",
        messages: [{
          role: "user",
          content: `Data: ${today}. Forneça cotações recentes para: moedas BRL (${currencies}), ações BR (${br}), ações EUA USD (${us}), crypto USD (${crypto}). Responda SOMENTE com este bloco:\n<<<JSON\n{"currencies":{"USD":{"price":5.72,"change":0.03,"changePct":0.52}},"br":{"PETR4":{"price":38.5,"change":-0.2,"changePct":-0.51}},"us":{"AAPL":{"price":175.3,"change":1.2,"changePct":0.69}},"crypto":{"BTC":{"price":85000,"change":1200,"changePct":1.43}}}\nJSON>>>`,
        }],
      }),
    });

    rawText = await res.text();

    if (!res.ok) {
      throw new Error(`HTTP ${res.status} — ${rawText.substring(0, 300)}`);
    }

    const resp = JSON.parse(rawText);
    const allText = (resp.content || [])
      .filter(b => b.type === "text")
      .map(b => b.text || "")
      .join("\n");

    if (!allText.trim()) {
      throw new Error(`stop_reason: ${resp.stop_reason} | blocos: ${(resp.content||[]).map(b=>b.type).join(",")} | raw: ${rawText.substring(0,200)}`);
    }

    // Strategy 1: <<<JSON ... JSON>>>
    const ds = allText.indexOf("<<<JSON");
    const de = allText.indexOf("JSON>>>");
    if (ds !== -1 && de !== -1) {
      try {
        const parsed = JSON.parse(allText.slice(ds + 7, de).trim());
        if (parsed.currencies || parsed.br || parsed.us || parsed.crypto) return parsed;
      } catch (e) { /* try next */ }
    }

    // Strategy 2: outermost { ... }
    const s = allText.indexOf("{");
    const e = allText.lastIndexOf("}");
    if (s !== -1 && e > s) {
      try {
        const parsed = JSON.parse(allText.slice(s, e + 1));
        if (parsed.currencies || parsed.br || parsed.us || parsed.crypto) return parsed;
      } catch (e) { /* try next */ }
    }

    // Strategy 3: markdown
    const md = allText.match(/```(?:json)?\s*([\s\S]*?)```/);
    if (md) {
      try {
        const parsed = JSON.parse(md[1].trim());
        if (parsed.currencies || parsed.br || parsed.us || parsed.crypto) return parsed;
      } catch (e) { /* fail below */ }
    }

    throw new Error(`JSON não encontrado. Resposta: "${allText.substring(0, 200).replace(/\n/g, " ")}"`);

  } catch (err) {
    if (err.message.includes("JSON não encontrado") || err.message.includes("HTTP") || err.message.includes("stop_reason")) {
      throw err;
    }
    // Network/fetch error
    throw new Error(`Erro de rede: ${err.message} | raw: ${rawText.substring(0, 150)}`);
  }
}

// ─── Tooltip ──────────────────────────────────────────────────────────────────
const TIP_S = { background:"#0e0d0b", border:"1px solid #2a2820", borderRadius:8, padding:"10px 14px", fontFamily:"IBM Plex Mono,monospace", fontSize:11 };
const TIP_H = { color:"#c9bfaa", fontWeight:600, marginBottom:6, borderBottom:"1px solid #1e1c16", paddingBottom:4 };

function ChartTip({ active, payload, label }) {
  if (!active || !payload || !payload.length) return null;
  return (
    <div style={TIP_S}>
      <div style={TIP_H}>{label}</div>
      {payload.map((p, i) => (
        <div key={i} style={{ display:"flex", justifyContent:"space-between", gap:12, marginBottom:2 }}>
          <span style={{ color:"#6a6458" }}>{p.dataKey || p.name}</span>
          <span style={{ color: p.stroke || p.fill, fontWeight:600 }}>{fmt(p.value)}</span>
        </div>
      ))}
    </div>
  );
}

// APP
// ═══════════════════════════════════════════════════════════════════════════════
function App() {
  const saved = lsLoad();
  const [invs,      setInvs]      = useState(saved?.investments ?? DEF_INVS);
  const [cats,      setCats]      = useState(saved?.categories  ?? DEF_CATS);
  const [settings,  setSettings]  = useState(saved?.settings    ?? DEFAULT_SETTINGS);
  const [deps,      setDeps]      = useState(saved?.deposits     ?? []);
  const [nii,       setNii]       = useState(saved?.nii          ?? 3);
  const [nci,       setNci]       = useState(saved?.nci          ?? 4);
  const [ndi,       setNdi]       = useState(saved?.ndi          ?? 1);
  const [quotes,    setQuotes]    = useState(saved?.quotes        ?? DEF_QUOTES);
  const [qLoading,  setQLoading]  = useState(false);
  const [snaps,     setSnaps]     = useState(() => lsLoadSnaps());
  const [screen,    setScreen]    = useState("dashboard");
  const [sideOpen,  setSideOpen]  = useState(false);
  const [modal,     setModal]     = useState(null);
  const [toast,     setToast]     = useState(null);
  const toastRef = useRef(null);
  const isMobile = useIsMobile();
  const fx = settings.fx || FX_DEFAULT;

  const save = useCallback((i, c, s, d, ni, nc, nd, q) => {
    lsSave({ investments:i, categories:c, settings:s, deposits:d, nii:ni, nci:nc, ndi:nd, quotes:q });
    setSnaps(lsLoadSnaps());
  }, []);

  const toast_ = useCallback((msg, ok=true) => {
    setToast({ msg, ok });
    clearTimeout(toastRef.current);
    toastRef.current = setTimeout(() => setToast(null), 2800);
  }, []);

  const projs = useMemo(() =>
    invs.map(inv => ({ ...inv, months: calcMonths(inv, settings.cdiRate, fx) })),
    [invs, settings.cdiRate, fx]
  );

  const cons = useMemo(() => {
    if (!projs.length) return [];
    return Array.from({ length: 24 }, (_, i) => ({
      mes:          projs[0].months[i].mes,
      saldo:        projs.reduce((a,c) => a + c.months[i].saldo, 0),
      rendimento:   projs.reduce((a,c) => a + c.months[i].rendimento, 0),
      ir:           projs.reduce((a,c) => a + c.months[i].ir, 0),
      saldoLiquido: projs.reduce((a,c) => a + c.months[i].saldoLiquido, 0),
      rendLiquido:  projs.reduce((a,c) => a + c.months[i].rendLiquido, 0),
    }));
  }, [projs]);

  const totalInv = invs.reduce((a, c) => {
    const t = getType(c.tipo);
    return a + c.valor * (t.currency ? (fx[t.currency] || 1) : 1);
  }, 0);

  const irAlerts   = useMemo(() => invs.map(i => ({ inv:i, a:getIRAlert(i) })).filter(x => x.a),   [invs]);
  const vencAlerts = useMemo(() => invs.map(i => ({ inv:i, a:getVencAlert(i) })).filter(x => x.a), [invs]);
  const urgent     = [...irAlerts.filter(x => x.a?.urgente), ...vencAlerts.filter(x => x.a?.urgente)];

  // ── Handlers ────────────────────────────────────────────────────────────────
  function saveInv(form) {
    const v = parseFloat(String(form.valor).replace(",", "."));
    const p = parseFloat(String(form.pct).replace(",", "."));
    if (!form.nome?.trim() || isNaN(v) || v <= 0 || isNaN(p) || p <= 0 || !form.data || !form.tipo) {
      toast_("Preencha todos os campos.", false); return;
    }
    const obj = { nome:form.nome.trim(), tipo:form.tipo, valor:v, pct:p, data:form.data, vencimento:form.vencimento||null, categoriaId:form.categoriaId||null };
    let newInvs, newNii = nii;
    if (!form.id) { newInvs = [...invs, { id:nii, ...obj }]; newNii++; }
    else          { newInvs = invs.map(i => i.id === form.id ? { ...i, ...obj } : i); }
    setInvs(newInvs); setNii(newNii); setModal(null);
    save(newInvs, cats, settings, deps, newNii, nci, ndi, quotes);
    toast_("✓ Investimento salvo");
  }

  function delInv(id) {
    const n = invs.filter(i => i.id !== id);
    setInvs(n); save(n, cats, settings, deps, nii, nci, ndi, quotes);
    toast_("✓ Removido");
  }

  function saveDep(form) {
    const v = parseFloat(String(form.valor).replace(",", "."));
    if (!form.invId || isNaN(v) || v <= 0 || !form.data) { toast_("Preencha todos os campos.", false); return; }
    const newDeps = [...deps, { id:ndi, invId:form.invId, valor:v, data:form.data, obs:form.obs||"" }];
    const newInvs = invs.map(i => i.id === form.invId ? { ...i, valor:i.valor+v } : i);
    const newNdi  = ndi + 1;
    setDeps(newDeps); setInvs(newInvs); setNdi(newNdi); setModal(null);
    save(newInvs, cats, settings, newDeps, nii, nci, newNdi, quotes);
    toast_("✓ Aporte registrado");
  }

  function delDep(id) {
    const d = deps.find(x => x.id === id);
    if (!d) return;
    const newDeps = deps.filter(x => x.id !== id);
    const newInvs = invs.map(i => i.id === d.invId ? { ...i, valor:Math.max(0, i.valor-d.valor) } : i);
    setDeps(newDeps); setInvs(newInvs);
    save(newInvs, cats, settings, newDeps, nii, nci, ndi, quotes);
    toast_("✓ Aporte removido");
  }

  function saveCat(form) {
    if (!form.nome?.trim()) { toast_("Nome obrigatório.", false); return; }
    let newCats, newNci = nci;
    if (!form.id) { newCats = [...cats, { id:nci, nome:form.nome.trim(), cor:form.cor||"#7ecfb3" }]; newNci++; }
    else          { newCats = cats.map(c => c.id === form.id ? { ...c, nome:form.nome.trim(), cor:form.cor } : c); }
    setCats(newCats); setNci(newNci); setModal(null);
    save(invs, newCats, settings, deps, nii, newNci, ndi, quotes);
    toast_("✓ Categoria salva");
  }

  function delCat(id) {
    const newCats = cats.filter(c => c.id !== id);
    const newInvs = invs.map(i => i.categoriaId === id ? { ...i, categoriaId:null } : i);
    setCats(newCats); setInvs(newInvs);
    save(newInvs, newCats, settings, deps, nii, nci, ndi, quotes);
    toast_("✓ Categoria removida");
  }

  function saveSettings(s) {
    setSettings(s); save(invs, cats, s, deps, nii, nci, ndi, quotes);
    toast_("✓ Configurações salvas");
  }

  function restoreSnap(snap) {
    const restored = lsRestoreSnap(snap.data);
    if (!restored) { toast_("✗ Erro ao restaurar versão.", false); return; }
    setInvs(restored.investments   ?? []);
    setCats(restored.categories    ?? DEF_CATS);
    setSettings(restored.settings  ?? DEFAULT_SETTINGS);
    setDeps(restored.deposits      ?? []);
    setNii(restored.nii            ?? 1);
    setNci(restored.nci            ?? 1);
    setNdi(restored.ndi            ?? 1);
    setQuotes(restored.quotes      ?? DEF_QUOTES);
    setSnaps(lsLoadSnaps());
    toast_(`✓ Versão de ${new Date(snap.ts).toLocaleString("pt-BR")} restaurada`);
  }

  async function fetchQuotes(watchlist) {
    setQLoading(true);
    try {
      const data = await fetchAllQuotes(watchlist);
      const now  = new Date().toLocaleString("pt-BR");
      const newQ = { ...quotes, watchlist, data, updatedAt: now, error: null };
      setQuotes(newQ);
      // Sync USD/EUR to settings.fx for portfolio calculations
      const newFx = { ...settings.fx };
      if (data.currencies?.USD?.price) newFx.USD = data.currencies.USD.price;
      if (data.currencies?.EUR?.price) newFx.EUR = data.currencies.EUR.price;
      const newSet = { ...settings, fx: newFx };
      setSettings(newSet);
      save(invs, cats, newSet, deps, nii, nci, ndi, newQ);
      toast_(`✓ Cotações atualizadas — ${now}`);
    } catch (e) {
      const msg = e.message || "Erro desconhecido";
      const newQ = { ...quotes, watchlist, error: msg };
      setQuotes(newQ);
      save(invs, cats, settings, deps, nii, nci, ndi, newQ);
      toast_(`✗ ${msg.substring(0, 80)}`, false);
    } finally {
      setQLoading(false);
    }
  }

  function updateWatchlist(section, tickers) {
    const newQ = { ...quotes, watchlist: { ...quotes.watchlist, [section]: tickers } };
    setQuotes(newQ);
    save(invs, cats, settings, deps, nii, nci, ndi, newQ);
  }

  function doImport(data) {
    const ni = data.investments || [];
    const nc = data.categories  || cats;
    const ns = data.settings    || settings;
    const nd = data.deposits    || [];
    const nii2 = ni.length ? Math.max(...ni.map(i=>i.id))+1 : 1;
    const nci2 = nc.length ? Math.max(...nc.map(c=>c.id))+1 : 1;
    const ndi2 = nd.length ? Math.max(...nd.map(d=>d.id))+1 : 1;
    setInvs(ni); setCats(nc); setSettings(ns); setDeps(nd);
    setNii(nii2); setNci(nci2); setNdi(ndi2);
    save(ni, nc, ns, nd, nii2, nci2, ndi2, quotes);
    setModal(null);
    toast_(`✓ ${ni.length} investimentos importados`);
  }

  const sp = { invs, cats, settings, projs, cons, totalInv, deps, fx, isMobile, quotes, snaps };

  return (
    <div style={S.app}>
      <style>{CSS}</style>

      {toast && (
        <div style={{ ...S.toast, bottom:isMobile?76:24, right:isMobile?12:24, left:isMobile?12:"auto", background:toast.ok?"#0d1f17":"#1f0d0d", borderColor:toast.ok?"#7ecfb3":"#e27e7e", color:toast.ok?"#7ecfb3":"#e27e7e" }}>
          {toast.msg}
        </div>
      )}

      {urgent.length > 0 && (
        <AlertBanner urgent={urgent} />
      )}

      {!isMobile && (
        <Sidebar sideOpen={sideOpen} setSideOpen={setSideOpen} screen={screen} setScreen={setScreen}
          totalInv={totalInv} last12={cons[11]} next1={cons[0]} settings={settings} invs={invs} fx={fx} quotes={quotes} snaps={snaps} />
      )}

      {isMobile && (
        <div style={S.mobileBar}>
          <span style={S.logoIcon}>◈</span>
          <span style={S.logoText}>InvestPro</span>
          <span style={S.mobileCdi}>CDI {fmtP(settings.cdiRate)}</span>
        </div>
      )}

      <main style={{ ...S.main, marginLeft:isMobile?0:(sideOpen?232:60), padding:isMobile?"16px 14px 88px":"32px 32px 64px", marginTop:isMobile?52:0 }}>
        {screen === "dashboard"   && <ScreenDashboard   {...sp} setScreen={setScreen} onAdd={() => setModal({t:"inv",d:{}})} irAlerts={irAlerts} vencAlerts={vencAlerts} />}
        {screen === "investments" && <ScreenInvestments {...sp} onAdd={() => setModal({t:"inv",d:{}})} onEdit={inv => setModal({t:"inv",d:inv})} onDel={delInv} onDep={inv => setModal({t:"dep",d:{invId:inv.id}})} onExJSON={() => doExportJSON(invs,cats,settings,deps)} onExCSV={() => doExportCSV(invs)} onImport={() => setModal({t:"import"})} />}
        {screen === "history"     && <ScreenHistory     {...sp} onAddDep={() => setModal({t:"dep",d:{}})} onDelDep={delDep} />}
        {screen === "comparator"  && <ScreenComparator  {...sp} />}
        {screen === "projection"  && <ScreenProjection  {...sp} />}
        {screen === "quotes"      && <ScreenCotacoes    {...sp} onFetch={fetchQuotes} onUpdateWatchlist={updateWatchlist} qLoading={qLoading} />}
        {screen === "categories"  && <ScreenCategories  {...sp} onAdd={() => setModal({t:"cat",d:{}})} onEdit={cat => setModal({t:"cat",d:cat})} onDel={delCat} />}
        {screen === "settings"    && <ScreenSettings    {...sp} onSave={saveSettings} onRestore={restoreSnap} />}
      </main>

      {isMobile && (
        <nav style={S.bottomBar}>
          {NAV.map(item => (
            <button key={item.id} style={{ ...S.bbItem, ...(screen===item.id ? S.bbActive : {}) }} onClick={() => setScreen(item.id)}>
              <span style={{ fontSize:17 }}>{item.icon}</span>
              <span style={S.bbLabel}>{item.label.split(" ")[0]}</span>
            </button>
          ))}
        </nav>
      )}

      {modal?.t === "inv"    && <InvModal    data={modal.d} cats={cats} isMobile={isMobile} onSave={saveInv}    onClose={() => setModal(null)} />}
      {modal?.t === "cat"    && <CatModal    data={modal.d}             isMobile={isMobile} onSave={saveCat}    onClose={() => setModal(null)} />}
      {modal?.t === "dep"    && <DepModal    data={modal.d} invs={invs} isMobile={isMobile} onSave={saveDep}    onClose={() => setModal(null)} />}
      {modal?.t === "import" && <ImportModal                            isMobile={isMobile} onImport={doImport} onClose={() => setModal(null)} />}
    </div>
  );
}

function Sidebar({ sideOpen, setSideOpen, screen, setScreen, totalInv, last12, next1, settings, invs, fx, quotes, snaps }) {
  const meta = settings.meta;
  const metaPct = meta?.ativa && meta.valor > 0 ? Math.min(100, totalInv / meta.valor * 100) : null;

  return (
    <aside style={{ ...S.sidebar, width:sideOpen?232:60 }}
      onMouseEnter={() => setSideOpen(true)}
      onMouseLeave={() => setSideOpen(false)}>

      <div style={S.sidebarLogo}>
        <span style={S.logoIcon}>◈</span>
        {sideOpen && <span style={S.logoText}>InvestPro</span>}
      </div>

      {sideOpen && (
        <div style={S.sidebarSum}>
          <SumRow label="Total investido"  value={fmt(totalInv)}                    color="#e2c97e" />
          <SumRow label="Patrimônio 12m"   value={fmt(last12?.saldoLiquido ?? 0)}   color="#7ecfb3" />
          <SumRow label="Próximo mês"      value={`+${fmt(next1?.rendLiquido ?? 0)}`} color="#7eb8e2" />
          <SumRow label="USD / EUR"        value={`R$${settings.fx?.USD?.toFixed(2)} · R$${settings.fx?.EUR?.toFixed(2)}`} color="#9a9080" />
          {quotes?.updatedAt && <SumRow label="Cotações" value={quotes.updatedAt.split(",")[0]} color="#5a5448" />}
          {snaps?.length > 0 && <SumRow label="Versões salvas" value={`${snaps.length} snapshot${snaps.length!==1?"s":""}`} color="#5a5448" />}
          {metaPct !== null && <MetaBar pct={metaPct} />}
        </div>
      )}

      <nav style={S.nav}>
        {NAV.map(item => (
          <button key={item.id}
            style={{ ...S.navItem, ...(screen===item.id?S.navActive:{}), justifyContent:sideOpen?"flex-start":"center" }}
            onClick={() => setScreen(item.id)}
            title={!sideOpen ? item.label : undefined}>
            <span style={S.navIcon}>{item.icon}</span>
            {sideOpen && <span style={S.navLabel}>{item.label}</span>}
          </button>
        ))}
      </nav>

      {sideOpen && invs.length > 0 && (
        <div style={S.sideTypes}>
          <div style={S.sl}>Por tipo</div>
          {TYPES.filter(t => invs.some(i => i.tipo === t.id)).map(t => {
            const sum = invs.filter(i => i.tipo === t.id).reduce((a, c) => a + c.valor * (t.currency ? (fx[t.currency]||1) : 1), 0);
            const pct = totalInv > 0 ? sum / totalInv * 100 : 0;
            return (
              <div key={t.id} style={S.typeRow}>
                <span style={{ ...S.typeDot, background:t.color }} />
                <span style={S.typeLabel}>{t.icon} {t.label}</span>
                <span style={{ ...S.typePct, color:t.color }}>{pct.toFixed(0)}%</span>
              </div>
            );
          })}
        </div>
      )}

      <div style={{ ...S.cdiBadge, justifyContent:sideOpen?"flex-start":"center", padding:sideOpen?"10px 16px":"10px 0" }}>
        <span style={S.cdiDot} />
        {sideOpen && <span style={S.cdiText}>CDI {fmtP(settings.cdiRate)} · {CDI_REF}</span>}
      </div>
    </aside>
  );
}

function SumRow({ label, value, color }) {
  return (
    <div style={{ marginTop:8 }}>
      <div style={S.sl}>{label}</div>
      <div style={{ ...S.sv, color }}>{value}</div>
    </div>
  );
}

function MetaBar({ pct }) {
  return (
    <div style={{ marginTop:8 }}>
      <div style={S.sl}>Meta {pct.toFixed(0)}%</div>
      <div style={{ height:4, background:"#1e1c16", borderRadius:2, marginTop:4 }}>
        <div style={{ height:4, background:"#b77ee2", borderRadius:2, width:`${pct}%`, transition:"width .4s" }} />
      </div>
    </div>
  );
}

function AlertBanner({ urgent }) {
  const msgs = urgent.slice(0, 3).map(x => {
    if (x.a?.proxima) return `IR ${x.inv.nome}: ${x.a.faixa}→${x.a.proxima} em ${x.a.diasRestantes}d`;
    return `Venc. ${x.inv.nome}: ${x.a.label}`;
  });
  return (
    <div style={S.alertBanner}>
      <span>⚠️</span>
      <span style={{ flex:1, fontSize:11 }}>{msgs.join(" · ")}</span>
    </div>
  );
}

function ScreenDashboard({ invs, cats, settings, projs, cons, totalInv, deps, fx, isMobile, setScreen, onAdd, irAlerts, vencAlerts }) {
  const last12  = cons[11];
  const next1   = cons[0];
  const meta    = settings.meta;
  const metaPct = meta?.ativa && meta.valor > 0 ? Math.min(100, totalInv / meta.valor * 100) : null;

  const byType = TYPES.map(t => ({
    ...t,
    value: invs.filter(i => i.tipo === t.id).reduce((a, c) => a + c.valor * (t.currency ? (fx[t.currency]||1) : 1), 0)

  const byCat = cats.map(cat => ({
    name:  cat.nome,
    color: cat.cor,
    value: invs.filter(i => i.categoriaId === cat.id).reduce((a, c) => {
      const t = getType(c.tipo);
      return a + c.valor * (t.currency ? (fx[t.currency]||1) : 1);
    }, 0),
  })).filter(c => c.value > 0);

  const areaData = cons.slice(0, 12).map(r => ({
    mes:        r.mes.split(" ")[0],
    "Líquido":  r.saldoLiquido,
    "Bruto":    r.saldo,
    "Principal": totalInv,
  }));

  return (
    <div style={P.root}>
      <PageHeader title="Dashboard" subtitle="Visão geral">
        <Btn onClick={onAdd}>+ Novo</Btn>
      </PageHeader>

      <div style={P.kpiRow} className="kpi-row">
        <KPI label="Total Investido"     value={fmt(totalInv)}                   color="#e2c97e" icon="◎" />
        <KPI label="Patrimônio 12m"      value={fmt(last12?.saldoLiquido ?? 0)}  color="#7ecfb3" icon="◈" />
        <KPI label="IR estimado 12m"     value={fmt(last12?.ir ?? 0)}            color="#e27e9a" icon="⊠" />
        <KPI label="Rend. próximo mês"   value={`+${fmt(next1?.rendLiquido ?? 0)}`} color="#7eb8e2" icon="◬" />
      </div>

      {metaPct !== null && (
        <div style={P.metaCard}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
            <span style={{ color:"#b77ee2", fontWeight:700, fontSize:13 }}>
              🎯 Meta · <span style={{ color:"#6a6458", fontWeight:400, fontSize:11, fontFamily:"IBM Plex Mono,monospace" }}>{fmt(totalInv)} de {fmt(meta.valor)}</span>
            </span>
            <span style={{ color:"#b77ee2", fontWeight:800, fontFamily:"IBM Plex Mono,monospace" }}>{metaPct.toFixed(1)}%</span>
          </div>
          <div style={P.metaTrack}><div style={{ ...P.metaFill, width:`${metaPct}%` }} /></div>
          <div style={{ display:"flex", justifyContent:"space-between", marginTop:4, fontSize:10, color:"#4a4438", fontFamily:"IBM Plex Mono,monospace" }}>
            <span>Faltam {fmt(Math.max(0, meta.valor - totalInv))}</span>
            <span>Prazo: {meta.prazo}m</span>
          </div>
        </div>
      )}

      <div style={{ ...P.grid2, gridTemplateColumns:isMobile?"1fr":"1fr 1fr" }}>
        <ChartCard title="Evolução Patrimonial — 12m">
          <ResponsiveContainer width="100%" height={200}>
            <AreaChart data={areaData} margin={{ top:8, right:8, left:0, bottom:0 }}>
              <defs>
                {[["l","#7ecfb3"],["b","#e2c97e"],["p","#3a3020"]].map(([id, c]) => (
                  <linearGradient key={id} id={`g${id}`} x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%"   stopColor={c} stopOpacity={0.3} />
                    <stop offset="100%" stopColor={c} stopOpacity={0.02} />
                  </linearGradient>
                ))}
              </defs>
              <CartesianGrid strokeDasharray="3 3" stroke="#1a1814" vertical={false} />
              <XAxis dataKey="mes" tick={{ fill:"#6a6458", fontSize:10 }} axisLine={{ stroke:"#2a2820" }} tickLine={false} />
              <YAxis tickFormatter={fmtS} tick={{ fill:"#6a6458", fontSize:10 }} axisLine={false} tickLine={false} width={52} />
              <Tooltip content={<ChartTip />} />
              <Area type="monotone" dataKey="Principal" stroke="#4a4030" strokeWidth={1} fill="url(#gp)" strokeDasharray="4 3" dot={false} />
              <Area type="monotone" dataKey="Bruto"     stroke="#e2c97e" strokeWidth={1.5} fill="url(#gb)" dot={false} />
              <Area type="monotone" dataKey="Líquido"   stroke="#7ecfb3" strokeWidth={2}   fill="url(#gl)" dot={false} activeDot={{ r:4 }} />
            </AreaChart>
          </ResponsiveContainer>
        </ChartCard>

        <ChartCard title="Alocação por Tipo">
          <ResponsiveContainer width="100%" height={200}>
            <PieChart>
              <Pie data={byType} dataKey="value" nameKey="label" cx="50%" cy="50%" outerRadius={75} innerRadius={42} paddingAngle={3}
                label={({ label: lb, percent }) => `${lb} ${(percent*100).toFixed(0)}%`}
                labelLine={{ stroke:"#2a2820" }}>
                {byType.map((t, i) => <Cell key={i} fill={t.color} stroke="#0e0d0b" strokeWidth={2} />)}

        <ChartCard title="🔔 Vencimentos">

            ? <Muted>✓ Nenhum vencimento próximo (90 dias).</Muted>
            : vencAlerts.map(({ inv, a }) => (
              <AlertRow key={inv.id} name={inv.nome} sub={`Vence: ${fmtD(inv.vencimento)}`} badge={a.label} badgeColor={a.cor} urgent={a.urgente} />

        <ChartCard title="⚠️ Alertas de IR">
          {irAlerts.length === 0
            ? <Muted>✓ Nenhum investimento próximo de mudar de faixa.</Muted>

              <AlertRow key={inv.id} name={inv.nome} sub={`IR: ${a.faixa} → ${a.proxima}`} badge={`${a.diasRestantes}d`} badgeColor={a.urgente?"#e27e9a":"#e2c97e"} urgent={a.urgente} />
            ))
          }
        </ChartCard>
      </div>

      {byCat.length > 0 && (
        <ChartCard title="Distribuição por Categoria">
          <ResponsiveContainer width="100%" height={180}>
            <BarChart data={byCat} layout="vertical" margin={{ top:4, right:8, left:0, bottom:0 }}>
              <CartesianGrid strokeDasharray="3 3" stroke="#1a1814" horizontal={false} />
              <XAxis type="number" tickFormatter={fmtS} tick={{ fill:"#6a6458", fontSize:10 }} axisLine={false} tickLine={false} />
              <YAxis type="category" dataKey="name" tick={{ fill:"#c9bfaa", fontSize:11, fontFamily:"IBM Plex Mono" }} axisLine={false} tickLine={false} width={90} />
              <Tooltip formatter={v => fmt(v)} contentStyle={{ background:"#0e0d0b", border:"1px solid #2a2820", borderRadius:8, fontFamily:"IBM Plex Mono,monospace", fontSize:11 }} />
              <Bar dataKey="value" radius={[0,4,4,0]}>
                {byCat.map((c, i) => <Cell key={i} fill={c.color} />)}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
        </ChartCard>
      )}
    </div>
  );
}

function ScreenInvestments({ invs, cats, projs, fx, isMobile, onAdd, onEdit, onDel, onDep, onExJSON, onExCSV, onImport }) {
  const [filter, setFilter] = useState("all");
  const [search, setSearch] = useState("");

  const filtered = projs.filter(inv =>
    (filter === "all" || inv.tipo === filter) &&
    inv.nome.toLowerCase().includes(search.toLowerCase())
  );

  return (
    <div style={P.root}>
      <PageHeader title="Investimentos" subtitle={`${invs.length} ativo${invs.length !== 1 ? "s" : ""}`}>
        <div style={{ display:"flex", gap:7, flexWrap:"wrap" }}>
          <BtnSec onClick={onImport}>⬆ Importar</BtnSec>
          <BtnSec onClick={onExCSV}>⬇ CSV</BtnSec>
          <BtnSec onClick={onExJSON}>⬇ JSON</BtnSec>
          <Btn onClick={onAdd}>+ Novo</Btn>
        </div>
      </PageHeader>

      <div style={P.filterRow} className="filter-row">
        <input style={P.search} className="search-input" placeholder="Buscar..." value={search} onChange={e => setSearch(e.target.value)} />
        <div style={{ display:"flex", flexWrap:"wrap", gap:7 }}>
          <Chip active={filter==="all"} onClick={() => setFilter("all")}>Todos</Chip>
          {TYPES.filter(t => invs.some(i => i.tipo === t.id)).map(t => (
            <Chip key={t.id} active={filter===t.id} onClick={() => setFilter(t.id)} color={t.color}>{t.icon} {t.label}</Chip>
          ))}
        </div>
      </div>

      {filtered.length === 0
        ? <Empty>Nenhum investimento encontrado.</Empty>
        : (
          <div style={P.cardGrid}>
            {filtered.map(inv => (
              <InvCard key={inv.id} inv={inv} cats={cats} fx={fx} onEdit={onEdit} onDel={onDel} onDep={onDep} />
            ))}
          </div>
        )
      }
    </div>
  );
}

function InvCard({ inv, cats, fx, onEdit, onDel, onDep }) {
  const t       = getType(inv.tipo);
  const cat     = cats.find(c => c.id === inv.categoriaId);
  const last    = inv.months[11];
  const fxRate  = t.currency ? (fx[t.currency] || 1) : 1;
  const valBRL  = inv.valor * fxRate;
  const gain    = last.rendLiquido;
  const gainPct = valBRL > 0 ? gain / valBRL * 100 : 0;
  const irAlert = getIRAlert(inv);
  const va      = getVencAlert(inv);

  return (
    <div style={{ ...P.invCard, borderColor:t.color+"55" }} className="card-hover">
      <div style={P.invCardTop}>
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          <span style={{ ...P.typeIcon, background:t.color+"22", color:t.color }}>{t.icon}</span>
          <div>
            <div style={{ color:"#f0ebe0", fontWeight:700, fontSize:14 }}>{inv.nome}</div>
            <div style={{ color:t.color, fontSize:11, fontFamily:"IBM Plex Mono,monospace" }}>{t.label}{t.currency && ` · ${t.currency}`}</div>
          </div>
        </div>
        <div style={{ display:"flex", gap:5 }}>
          <IBtn onClick={() => onDep(inv)} title="Registrar aporte">💰</IBtn>
          <IBtn onClick={() => onEdit(inv)}>✏️</IBtn>
          <IBtn onClick={() => onDel(inv.id)}>🗑</IBtn>
        </div>
      </div>

      {cat && <div style={{ ...P.catTag, borderColor:cat.cor, color:cat.cor }}>{cat.nome}</div>}
      {va && <div style={{ ...P.pill, borderColor:va.cor+"66", color:va.cor }}>🔔 Vence: {fmtD(inv.vencimento)} ({va.label})</div>}
      {irAlert && <div style={{ ...P.pill, borderColor:irAlert.urgente?"#e27e9a66":"#e2c97e44", color:irAlert.urgente?"#e27e9a":"#e2c97e" }}>⚠️ IR: {irAlert.faixa}→{irAlert.proxima} em {irAlert.diasRestantes}d</div>}

      <div style={P.metrics}>
        <Met label={t.currency ? `Valor (${t.currency})` : "Investido"} value={t.currency ? fmtFX(inv.valor, t.currency) : fmt(inv.valor)} />
        {t.currency && <Met label="Valor (BRL)" value={fmt(valBRL)} accent="#9a9080" />}
        <Met label={t.intl ? "Retorno a.a." : "% CDI"}    value={fmtP(inv.pct)} />
        <Met label="Saldo 12m"  value={fmt(last.saldoLiquido)} accent="#7ecfb3" />
        <Met label="Rend. líq." value={`+${fmt(gain)}`}         accent="#7ecfb3" />
        <Met label="Retorno %"  value={`+${gainPct.toFixed(2)}%`} accent="#7eb8e2" />
        {t.ir && <Met label="IR 12m" value={`-${fmt(last.ir)}`} accent="#e27e9a" />}
      </div>

      {inv.vencimento && <div style={P.dateTag}>Vence: {fmtD(inv.vencimento)}</div>}
      <div style={P.dateTag}>Início: {fmtD(inv.data)}</div>
    </div>
  );
}

function ScreenHistory({ invs, deps, isMobile, onAddDep, onDelDep }) {
  const [filterInv, setFilterInv] = useState("all");

  const sorted   = [...deps].sort((a, b) => new Date(b.data) - new Date(a.data));
  const filtered = filterInv === "all" ? sorted : sorted.filter(d => d.invId === parseInt(filterInv));
  const totalDep = deps.reduce((a, d) => a + d.valor, 0);

  const byMonth = useMemo(() => {
    const map = {};
    deps.forEach(d => {
      const key = new Date(d.data + "T12:00:00").toLocaleDateString("pt-BR", { month:"short", year:"numeric" });
      map[key] = (map[key] || 0) + d.valor;
    });
    return Object.entries(map).slice(-12).map(([mes, valor]) => ({ mes, valor }));
  }, [deps]);

  const byInv = useMemo(() => {
    const map = {};
    deps.forEach(d => { map[d.invId] = (map[d.invId] || 0) + d.valor; });
    return map;
  }, [deps]);

  return (
    <div style={P.root}>
      <PageHeader title="Histórico de Aportes" subtitle={`${deps.length} aporte${deps.length!==1?"s":""} · ${fmt(totalDep)}`}>
        <Btn onClick={onAddDep}>+ Registrar Aporte</Btn>
      </PageHeader>

      <div style={P.kpiRow} className="kpi-row">
        <KPI label="Total aportado"   value={fmt(totalDep)}                                          color="#e2c97e" icon="◎" />
        <KPI label="Média por aporte" value={deps.length ? fmt(totalDep/deps.length) : "R$ 0"}      color="#7eb8e2" icon="◬" />
        <KPI label="Ativos com aportes" value={`${Object.keys(byInv).length}`}                      color="#7ecfb3" icon="◈" />
        <KPI label="Último aporte"    value={sorted[0] ? fmtD(sorted[0].data) : "—"}                color="#b77ee2" icon="◫" />
      </div>

      <div style={{ ...P.grid2, gridTemplateColumns:isMobile?"1fr":"2fr 1fr" }}>
        <ChartCard title="Aportes por Mês">
          {byMonth.length === 0
            ? <Empty>Nenhum aporte registrado.</Empty>
            : (
              <ResponsiveContainer width="100%" height={200}>
                <BarChart data={byMonth} margin={{ top:8, right:8, left:0, bottom:0 }}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#1a1814" vertical={false} />
                  <XAxis dataKey="mes" tick={{ fill:"#6a6458", fontSize:10 }} axisLine={{ stroke:"#2a2820" }} tickLine={false} />
                  <YAxis tickFormatter={fmtS} tick={{ fill:"#6a6458", fontSize:10 }} axisLine={false} tickLine={false} width={52} />
                  <Tooltip content={<ChartTip />} />
                  <Bar dataKey="valor" fill="#e2c97e" radius={[4,4,0,0]} fillOpacity={0.85} />
                </BarChart>
              </ResponsiveContainer>
            )
          }
        </ChartCard>

        <ChartCard title="Por Investimento">
          {invs.filter(i => byInv[i.id]).length === 0
            ? <Muted>Sem aportes.</Muted>
            : invs.filter(i => byInv[i.id]).map(inv => {
              const t   = getType(inv.tipo);
              const val = byInv[inv.id] || 0;
              const pct = totalDep > 0 ? val / totalDep * 100 : 0;
              return (
                <div key={inv.id} style={{ marginBottom:10 }}>
                  <div style={{ display:"flex", justifyContent:"space-between", marginBottom:3 }}>
                    <span style={{ color:"#c9bfaa", fontSize:12 }}>{t.icon} {inv.nome}</span>
                    <span style={{ color:t.color, fontFamily:"IBM Plex Mono,monospace", fontSize:11 }}>{fmt(val)}</span>
                  </div>
                  <div style={{ height:4, background:"#1e1c16", borderRadius:2 }}>
                    <div style={{ height:4, background:t.color, borderRadius:2, width:`${pct}%` }} />
                  </div>
                </div>
              );
            })
          }
        </ChartCard>
      </div>

      <ChartCard title="Todos os Aportes">
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12, flexWrap:"wrap", gap:8 }}>
          <div />
          <select style={{ ...P.search, width:"auto", cursor:"pointer" }} value={filterInv} onChange={e => setFilterInv(e.target.value)}>
            <option value="all">Todos</option>
            {invs.map(inv => <option key={inv.id} value={inv.id}>{inv.nome}</option>)}
          </select>
        </div>
        {filtered.length === 0
          ? <Muted>Nenhum aporte encontrado.</Muted>
          : (
            <div style={{ overflowX:"auto" }}>
              <table style={P.table}>
                <thead><tr>
                  <th style={P.th}>Data</th>
                  <th style={P.th}>Investimento</th>
                  <th style={P.th}>Valor</th>
                  <th style={P.th}>Obs.</th>
                  <th style={P.th}></th>
                </tr></thead>
                <tbody>
                  {filtered.map(dep => {
                    const inv = invs.find(i => i.id === dep.invId);
                    const t   = getType(inv?.tipo);
                    return (
                      <tr key={dep.id} style={P.tr}>
                        <td style={{ ...P.td, color:"#c9bfaa" }}>{fmtD(dep.data)}</td>
                        <td style={{ ...P.td, color:t.color }}>{t.icon} {inv?.nome || "—"}</td>
                        <td style={{ ...P.td, color:"#7ecfb3", fontWeight:600 }}>{fmt(dep.valor)}</td>
                        <td style={{ ...P.td, color:"#6a6458", fontSize:11 }}>{dep.obs || "—"}</td>
                        <td style={P.td}><IBtn onClick={() => onDelDep(dep.id)}>🗑</IBtn></td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )
        }
      </ChartCard>
    </div>
  );
}

                        <linearGradient id="cA" x1="0" y1="0" x2="0" y2="1">
                          <stop offset="0%"   stopColor="#e2c97e" stopOpacity={0.3} />
                          <stop offset="100%" stopColor="#e2c97e" stopOpacity={0.02} />

}

function CompSelector({ sel, setSel, label, color, invs, projs }) {
  const inv = projs.find(p => p.id === sel);
  return (
    <div style={{ ...P.chartCard, borderColor:color+"44" }}>
      <div style={{ ...P.chartTitle, color }}>{label}</div>
      <select style={{ ...P.search, width:"100%", cursor:"pointer" }} value={sel ?? ""} onChange={e => setSel(parseInt(e.target.value))}>
        {invs.map(i => <option key={i.id} value={i.id}>{i.nome}</option>)}
      </select>
      {inv && (
        <div style={{ marginTop:12, display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
          <Met label="Investido"  value={fmt(inv.valor)} />
          <Met label="% CDI/Ret." value={fmtP(inv.pct)} />
          <Met label="Saldo 12m"  value={fmt(inv.months[11].saldoLiquido)} accent={color} />
          <Met label="Rend. líq." value={`+${fmt(inv.months[11].rendLiquido)}`} accent={color} />
        </div>

}

function CompTable({ invA, invB }) {
  const rows = [
    { label:"Valor investido",   a:invA.valor,                                 b:invB.valor },
    { label:"Saldo bruto 12m",   a:invA.months[11].saldo,                      b:invB.months[11].saldo },
    { label:"IR 12m",            a:invA.months[11].ir,                         b:invB.months[11].ir, lower:true },
    { label:"Saldo líquido 12m", a:invA.months[11].saldoLiquido,               b:invB.months[11].saldoLiquido },
    { label:"Rend. líquido 12m", a:invA.months[11].rendLiquido,                b:invB.months[11].rendLiquido },
    { label:"Retorno %",         a:invA.months[11].rendLiquido/invA.valor*100,  b:invB.months[11].rendLiquido/invB.valor*100, pct:true },
  ];
  return (
    <div style={{ overflowX:"auto" }}>
      <table style={P.table}>
        <thead><tr>
          <th style={P.th}>Métrica</th>
          <th style={{ ...P.th, color:"#e2c97e" }}>{invA.nome}</th>
          <th style={{ ...P.th, color:"#7eb8e2" }}>{invB.nome}</th>
          <th style={{ ...P.th, color:"#7ecfb3" }}>Vencedor</th>
        </tr></thead>
        <tbody>
          {rows.map(({ label, a, b, lower, pct }) => {
            const w = lower ? (a<b?"A":b<a?"B":null) : (a>b?"A":b>a?"B":null);
            return (
              <tr key={label} style={P.tr}>
                <td style={{ ...P.td, color:"#9a9080" }}>{label}</td>
                <td style={{ ...P.td, color:w==="A"?"#7ecfb3":"#b0a990", fontWeight:w==="A"?700:400 }}>{pct ? fmtP(a) : fmt(a)}</td>
                <td style={{ ...P.td, color:w==="B"?"#7ecfb3":"#b0a990", fontWeight:w==="B"?700:400 }}>{pct ? fmtP(b) : fmt(b)}</td>
                <td style={P.td}>
                  {w === "A" && <span style={{ color:"#e2c97e", fontWeight:700 }}>🏆 {invA.nome}</span>}
                  {w === "B" && <span style={{ color:"#7eb8e2", fontWeight:700 }}>🏆 {invB.nome}</span>}
                  {!w        && <span style={{ color:"#4a4438" }}>—</span>}
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

function ScreenProjection({ invs, projs, cons, totalInv, settings, isMobile }) {
  const [view,   setView]   = useState("liquido");
  const [months, setMonths] = useState(12);
  const isLiq = view === "liquido";
  const rows  = cons.slice(0, months);
  const last  = rows[rows.length - 1];

  const barData = rows.map((r, i) => {
    const prev = rows[i - 1];
    return {
      mes:            r.mes.split(" ")[0],
      "Rend. Bruto":  i===0 ? r.rendimento  : r.rendimento  - (prev?.rendimento  ?? 0),
      "Rend. Líquido":i===0 ? r.rendLiquido  : r.rendLiquido - (prev?.rendLiquido ?? 0),
      "IR":           i===0 ? r.ir           : r.ir          - (prev?.ir          ?? 0),
    };
  });

  return (
    <div style={P.root}>
      <PageHeader title="Projeção" subtitle={`CDI ${fmtP(settings.cdiRate)} a.a.`}>
        <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
          <Toggle options={["liquido","bruto"]} labels={["Líquido","Bruto"]} value={view} onChange={setView} />
          <Toggle options={[12,24]} labels={["12m","24m"]} value={months} onChange={setMonths} />
        </div>
      </PageHeader>

      {cons.length === 0
        ? <Empty>Adicione investimentos para ver a projeção.</Empty>
        : (
          <>
            <div style={P.kpiRow} className="kpi-row">
              <KPI label={`Saldo (${months}m)`}  value={fmt(isLiq ? last?.saldoLiquido : last?.saldo)}       color="#7ecfb3" icon="◈" />
              <KPI label="Rendimento total"        value={`+${fmt(isLiq ? last?.rendLiquido : last?.rendimento)}`} color="#7eb8e2" icon="◬" />
              <KPI label="IR total"                value={`-${fmt(last?.ir ?? 0)}`}                          color="#e27e9a" icon="⊠" />
              <KPI label="Retorno s/ capital"      value={fmtP(((last?.rendLiquido ?? 0) / totalInv) * 100)} color="#e2c97e" icon="◎" />
            </div>

            <ChartCard title="Rendimento Mensal Incremental">
              <ResponsiveContainer width="100%" height={220}>
                <BarChart data={barData} margin={{ top:8, right:8, left:0, bottom:0 }} barCategoryGap="30%">
                  <CartesianGrid strokeDasharray="3 3" stroke="#1a1814" vertical={false} />
                  <XAxis dataKey="mes" tick={{ fill:"#6a6458", fontSize:10 }} axisLine={{ stroke:"#2a2820" }} tickLine={false} />
                  <YAxis tickFormatter={fmtS} tick={{ fill:"#6a6458", fontSize:10 }} axisLine={false} tickLine={false} width={56} />
                  <Tooltip content={<ChartTip />} />
                  <Legend wrapperStyle={{ fontFamily:"IBM Plex Mono", fontSize:10, color:"#6a6458", paddingTop:4 }} iconType="square" iconSize={8} />
                  <Bar dataKey="Rend. Bruto"   fill="#e2c97e" radius={[3,3,0,0]} fillOpacity={0.85} />
                  <Bar dataKey="IR"            fill="#e27e9a" radius={[3,3,0,0]} fillOpacity={0.85} />
                  <Bar dataKey="Rend. Líquido" fill="#7ecfb3" radius={[3,3,0,0]} fillOpacity={0.85} />
                </BarChart>
              </ResponsiveContainer>
            </ChartCard>

            <div style={{ marginTop:16 }}>
              <ChartCard title="Tabela Detalhada">
                <div style={{ overflowX:"auto" }}>
                  <table style={P.table}>
                    <thead><tr>
                      <th style={P.th}>Mês</th>
                      {projs.map(p => <th key={p.id} style={{ ...P.th, color:"#e2c97e" }}>{p.nome}</th>)}
                      {projs.length > 1 && <th style={{ ...P.th, color:"#7ecfb3" }}>Total</th>}
                      <th style={{ ...P.th, color:"#e27e9a" }}>IR</th>
                      <th style={{ ...P.th, color:"#7eb8e2" }}>Rend. Líq.</th>
                    </tr></thead>
                    <tbody>
                      {rows.map((row, i) => (
                        <tr key={i} style={P.tr}>
                          <td style={{ ...P.td, color:"#c9bfaa", fontWeight:600 }}>{row.mes}</td>
                          {projs.map(p => (
                            <td key={p.id} style={{ ...P.td, color:isLiq?"#7ecfb3":"#b0a990" }}>
                              {fmt(isLiq ? p.months[i].saldoLiquido : p.months[i].saldo)}
                            </td>
                          ))}
                          {projs.length > 1 && (
                            <td style={{ ...P.td, color:"#7ecfb3", fontWeight:700 }}>
                              {fmt(isLiq ? row.saldoLiquido : row.saldo)}
                            </td>
                          )}
                          <td style={{ ...P.td, color:"#e27e9a" }}>-{fmt(row.ir)}</td>
                          <td style={{ ...P.td, color:"#7eb8e2", fontWeight:600 }}>+{fmt(row.rendLiquido)}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
                <p style={P.note}>* CDI {fmtP(settings.cdiRate)} a.a. IR regressivo. Estimativas.</p>
              </ChartCard>
            </div>
          </>
        )
      }
    </div>
  );
}

// COTAÇÕES
// ═══════════════════════════════════════════════════════════════════════════════
function ScreenCotacoes({ quotes, isMobile, onFetch, onUpdateWatchlist, qLoading, settings }) {
  const [editSection, setEditSection] = useState(null);
  const [editInput,   setEditInput]   = useState("");

  const wl   = quotes?.watchlist  || DEF_WATCHLIST;
  const data = quotes?.data       || { currencies:{}, br:{}, us:{}, crypto:{} };

  const SECTIONS = [
    { key:"currencies", label:"💵 Moedas",       unit:"BRL", color:"#e2c97e", hint:"USD, EUR, GBP..." },
    { key:"br",         label:"📈 Ações BR",     unit:"BRL", color:"#7ecfb3", hint:"PETR4, VALE3..." },
    { key:"us",         label:"🇺🇸 Ações EUA",   unit:"USD", color:"#60a5fa", hint:"AAPL, MSFT..."   },
    { key:"crypto",     label:"₿ Crypto",        unit:"USD", color:"#f7931a", hint:"BTC, ETH..."     },
  ];

  function startEdit(key) {
    setEditSection(key);
    setEditInput((wl[key] || []).join(", "));
  }

  function saveEdit(key) {
    const tickers = editInput.split(/[,\s]+/).map(t => t.trim().toUpperCase()).filter(Boolean);
    onUpdateWatchlist(key, tickers);
    setEditSection(null);
  }

  function fmtQuote(val) {
    if (val === null || val === undefined) return "—";
    if (val >= 1000) return val.toLocaleString("pt-BR", { maximumFractionDigits:0 });
    return val.toLocaleString("pt-BR", { minimumFractionDigits:2, maximumFractionDigits:2 });
  }

  function changePctColor(pct) {
    if (!pct && pct !== 0) return "#6a6458";
    return pct >= 0 ? "#7ecfb3" : "#e27e9a";
  }

  function changePctStr(pct) {
    if (!pct && pct !== 0) return "—";
    return (pct >= 0 ? "+" : "") + pct.toFixed(2) + "%";
  }

  return (
    <div style={P.root}>
      <PageHeader title="Cotações" subtitle="Estimativas via Claude — sincroniza USD/EUR com o portfólio">
        <Btn onClick={() => onFetch(wl)} disabled={qLoading}>
          {qLoading ? "⟳ Buscando..." : "↻ Atualizar tudo"}
        </Btn>
      </PageHeader>

      {quotes?.updatedAt && (
        <div style={{ fontSize:11, color:"#5a5448", fontFamily:"IBM Plex Mono,monospace", marginBottom:20 }}>
          Última atualização: {quotes.updatedAt}
        </div>
      )}

      {quotes?.error && (
        <div style={{ background:"#1f0808", border:"1px solid #e27e9a44", borderRadius:8, padding:"12px 16px", marginBottom:20, fontSize:11, color:"#e27e9a", fontFamily:"IBM Plex Mono,monospace", lineHeight:1.7 }}>
          <strong>✗ Erro na última busca:</strong><br/>
          {quotes.error}<br/>
          <span style={{ color:"#6a6458" }}>Tente novamente ou verifique sua conexão com a internet.</span>
        </div>
      )}

      {!quotes?.updatedAt && !quotes?.error && (
        <div style={{ background:"#0e1520", border:"1px solid #1e3050", borderRadius:8, padding:"14px 18px", marginBottom:20, fontSize:12, color:"#7eb8e2", fontFamily:"IBM Plex Mono,monospace", lineHeight:1.7 }}>
          ℹ️ Clique em <strong style={{ color:"#e2c97e" }}>↻ Atualizar tudo</strong> para buscar cotações via Claude.<br/>
          <span style={{ color:"#5a6a7a" }}>O Claude usa seu conhecimento de treinamento para estimar preços recentes. Para cotações em tempo real, exporte e use a integração BCB/B3 em produção.</span>
        </div>
      )}

      <div style={{ display:"grid", gridTemplateColumns:isMobile?"1fr":"1fr 1fr", gap:20 }}>
        {SECTIONS.map(sec => {
          const tickers   = wl[sec.key] || [];
          const secData   = data[sec.key] || {};
          const isEditing = editSection === sec.key;

          return (
            <div key={sec.key} style={{ ...P.chartCard, borderColor:sec.color+"33" }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
                <div style={{ ...P.chartTitle, color:sec.color, marginBottom:0 }}>{sec.label}</div>
                <button style={{ ...P.iBtn, fontSize:11, padding:"3px 10px" }} onClick={() => isEditing ? saveEdit(sec.key) : startEdit(sec.key)}>
                  {isEditing ? "✓ Salvar" : "✏️ Editar"}
                </button>
              </div>

              {isEditing ? (
                <div>
                  <div style={{ fontSize:11, color:"#6a6458", fontFamily:"IBM Plex Mono,monospace", marginBottom:6 }}>
                    Tickers separados por vírgula ({sec.hint})
                  </div>
                  <input
                    style={{ ...P.input, marginBottom:8 }}
                    value={editInput}
                    onChange={e => setEditInput(e.target.value)}
                    onKeyDown={e => e.key === "Enter" && saveEdit(sec.key)}
                    placeholder={sec.hint}
                    autoFocus
                  />
                  <div style={{ display:"flex", gap:8 }}>
                    <Btn onClick={() => saveEdit(sec.key)}>Salvar</Btn>
                    <BtnCancel onClick={() => setEditSection(null)}>Cancelar</BtnCancel>
                  </div>
                </div>
              ) : (
                <div>
                  {tickers.length === 0 ? (
                    <div style={{ color:"#4a4438", fontSize:12, fontFamily:"IBM Plex Mono,monospace", padding:"8px 0" }}>
                      Nenhum ticker. Clique em ✏️ Editar para adicionar.
                    </div>
                  ) : (
                    <div>
                      {/* Header row */}
                      <div style={{ display:"grid", gridTemplateColumns:"1fr auto auto auto", gap:8, paddingBottom:8, borderBottom:"1px solid #1e1c16", marginBottom:4 }}>
                        <span style={{ fontSize:10, color:"#5a5448", textTransform:"uppercase", fontFamily:"IBM Plex Mono,monospace", letterSpacing:.8 }}>Ativo</span>
                        <span style={{ fontSize:10, color:"#5a5448", textTransform:"uppercase", fontFamily:"IBM Plex Mono,monospace", letterSpacing:.8, textAlign:"right" }}>Preço</span>
                        <span style={{ fontSize:10, color:"#5a5448", textTransform:"uppercase", fontFamily:"IBM Plex Mono,monospace", letterSpacing:.8, textAlign:"right" }}>Var.</span>
                        <span style={{ fontSize:10, color:"#5a5448", textTransform:"uppercase", fontFamily:"IBM Plex Mono,monospace", letterSpacing:.8, textAlign:"right" }}>%</span>
                      </div>
                      {tickers.map(ticker => {
                        const q = secData[ticker];
                        const hasData = q && q.price !== null && q.price !== undefined;
                        const pctColor = changePctColor(q?.changePct);
                        return (
                          <div key={ticker} style={{ display:"grid", gridTemplateColumns:"1fr auto auto auto", gap:8, padding:"8px 0", borderBottom:"1px solid #191714", alignItems:"center" }}>
                            <div>
                              <span style={{ color:"#d4cfc5", fontWeight:700, fontFamily:"IBM Plex Mono,monospace", fontSize:13 }}>{ticker}</span>
                              <span style={{ marginLeft:6, fontSize:10, color:"#5a5448", fontFamily:"IBM Plex Mono,monospace" }}>{sec.unit}</span>
                            </div>
                            <span style={{ color: hasData ? sec.color : "#4a4438", fontWeight:700, fontFamily:"IBM Plex Mono,monospace", fontSize:13, textAlign:"right" }}>
                              {hasData ? fmtQuote(q.price) : (qLoading ? "..." : "—")}
                            </span>
                            <span style={{ color: pctColor, fontFamily:"IBM Plex Mono,monospace", fontSize:11, textAlign:"right" }}>
                              {hasData ? fmtQuote(q.change) : "—"}
                            </span>
                            <span style={{ color: pctColor, fontWeight:600, fontFamily:"IBM Plex Mono,monospace", fontSize:11, textAlign:"right", minWidth:52 }}>
                              {hasData ? changePctStr(q.changePct) : "—"}
                            </span>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              )}

              {/* Portfolio sync note for currencies */}
              {sec.key === "currencies" && (data.currencies?.USD?.price || data.currencies?.EUR?.price) && (
                <div style={{ marginTop:10, padding:"8px 10px", background:"#081f12", border:"1px solid #7ecfb344", borderRadius:6, fontSize:10, color:"#7ecfb3", fontFamily:"IBM Plex Mono,monospace" }}>
                  ✓ USD e EUR sincronizados com o portfólio automaticamente.
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function ImportModal({ isMobile, onImport, onClose }) {
  const [err,  setErr]  = useState(null);
  const [drag, setDrag] = useState(false);
  const ref = useRef(null);

  function handle(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const data = parseImport(e.target.result, file.name.endsWith(".csv"));
        onImport(data);
      } catch (_) {
        setErr("Arquivo inválido. Use JSON ou CSV exportado pelo InvestPro.");
      }
    };
    reader.readAsText(file);
  }

  return (
    <Overlay onClose={onClose} isMobile={isMobile}>
      <ModalBox isMobile={isMobile} maxW={420}>
        <div style={M.title}>⬆ Importar Dados</div>
        <div
          style={{ border:`2px dashed ${drag?"#e2c97e":"#2a2820"}`, borderRadius:10, padding:"32px 24px", textAlign:"center", background:drag?"#1e1c10":"#0e0d0b", transition:"all .2s", cursor:"pointer", marginBottom:8 }}
          onDragOver={e => { e.preventDefault(); setDrag(true); }}
          onDragLeave={() => setDrag(false)}
          onDrop={e => { e.preventDefault(); setDrag(false); handle(e.dataTransfer.files[0]); }}>
          <div style={{ fontSize:32, marginBottom:8 }}>📂</div>
          <div style={{ color:"#c9bfaa", fontSize:13, marginBottom:4 }}>Arraste um arquivo aqui</div>
          <div style={{ color:"#6a6458", fontSize:11, fontFamily:"IBM Plex Mono,monospace", marginBottom:16 }}>JSON ou CSV exportado pelo InvestPro</div>
          <BtnCancel onClick={() => ref.current?.click()}>Selecionar arquivo</BtnCancel>
          <input ref={ref} type="file" accept=".json,.csv" style={{ display:"none" }} onChange={e => handle(e.target.files[0])} />
        </div>
        {err && <div style={{ background:"#1f0808", border:"1px solid #e27e9a44", borderRadius:6, padding:"9px 12px", fontSize:11, color:"#e27e9a", fontFamily:"IBM Plex Mono,monospace" }}>✗ {err}</div>}
        <div style={{ color:"#4a4438", fontSize:11, fontFamily:"IBM Plex Mono,monospace", marginTop:6 }}>⚠️ A importação substituirá todos os dados atuais.</div>
        <div style={M.actions}><BtnCancel onClick={onClose}>Cancelar</BtnCancel></div>
      </ModalBox>
    </Overlay>
  );
}

function KPI({ label, value, color, icon }) {
  return (
    <div style={{ ...P.kpiCard, borderColor:color+"44" }} className="card-hover">
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
        <div style={P.kpiLabel}>{label}</div>
        <span style={{ color:color+"88", fontSize:18 }}>{icon}</span>
      </div>
      <div style={{ ...P.kpiValue, color }} className="kpi-value">{value}</div>
    </div>
  );
}

function ChartCard({ title, children }) {
  return (
    <div style={P.chartCard}>
      <div style={P.chartTitle}>{title}</div>
      {children}
    </div>
  );
}

function AlertRow({ name, sub, badge, badgeColor, urgent }) {
  return (
    <div style={{ display:"flex", alignItems:"center", padding:"10px 12px", marginBottom:8, background:"#0e0d0b", border:`1px solid ${urgent?"#e27e9a44":"#3a3020"}`, borderRadius:8 }}>
      <div style={{ flex:1 }}>
        <div style={{ color:"#d4cfc5", fontWeight:600, fontSize:13 }}>{name}</div>
        <div style={{ color:"#6a6458", fontSize:11, fontFamily:"IBM Plex Mono,monospace", marginTop:2 }}>{sub}</div>
      </div>
      <div style={{ color:badgeColor, fontWeight:700, fontFamily:"IBM Plex Mono,monospace", fontSize:14, textAlign:"right" }}>{badge}</div>
    </div>
  );
}

function Met({ label, value, accent }) {
  return (
    <div style={P.metricBox}>
      <div style={P.metricLabel}>{label}</div>
      <div style={{ ...P.metricValue, ...(accent ? { color:accent } : {}) }}>{value}</div>
    </div>
  );
}

function Chip({ active, onClick, color, children }) {
  const c = color || "#e2c97e";
  return (
    <button style={{ ...P.chip, ...(active ? { borderColor:c, color:c, background:c+"18" } : {}) }} onClick={onClick}>
      {children}
    </button>
  );
}

function Toggle({ options, labels, value, onChange }) {
  return (
    <div style={{ display:"flex", gap:6 }}>
      {options.map((opt, i) => (
        <button key={opt} style={{ ...P.toggleBtn, ...(value===opt ? P.toggleActive : {}) }} onClick={() => onChange(opt)}>
          {labels[i]}
        </button>
      ))}
    </div>
  );
}

function Btn({ onClick, children }) {
  return <button style={P.btn} onClick={onClick} className="btn-hover">{children}</button>;
}

function BtnSec({ onClick, children }) {
  return <button style={P.btnSec} onClick={onClick} className="btn-hover">{children}</button>;
}

function BtnCancel({ onClick, children }) {
  return <button style={P.btnCancel} onClick={onClick}>{children}</button>;
}

function IBtn({ onClick, title, children }) {
  return <button style={P.iBtn} onClick={onClick} title={title}>{children}</button>;
}

function Overlay({ onClose, children, isMobile }) {
  return (
    <div style={{ ...M.overlay, alignItems:isMobile?"flex-end":"center" }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()}>{children}</div>
    </div>
  );
}

function ModalBox({ children, isMobile, maxW }) {
  return (
    <div style={{ ...M.box, maxWidth:isMobile?"100vw":maxW, width:isMobile?"100vw":"100%", borderRadius:isMobile?"16px 16px 0 0":14, paddingBottom:isMobile?32:28 }}>
      {children}
    </div>
  );
}

function Empty({ children }) { return <div style={P.empty}>{children}</div>; }
function Muted({ children }) { return <div style={{ color:"#4a4438", fontSize:12, fontFamily:"IBM Plex Mono,monospace", padding:"12px 0" }}>{children}</div>; }

function SnapRestoreBtn({ snap, onRestore }) {
  const [confirm, setConfirm] = useState(false);
  if (confirm) {
    return (
      <div style={{ display:"flex", gap:6, alignItems:"center" }}>
        <span style={{ fontSize:11, color:"#e2c97e", fontFamily:"IBM Plex Mono,monospace" }}>Confirmar?</span>
        <button style={{ ...P.btn, padding:"5px 12px", fontSize:11 }} onClick={() => { onRestore(snap); setConfirm(false); }}>Sim</button>
        <BtnCancel onClick={() => setConfirm(false)}>Não</BtnCancel>
      </div>
    );
  }
  return (
    <button style={{ ...P.btnSec, padding:"6px 14px", fontSize:11 }} onClick={() => setConfirm(true)}>
      ↩ Restaurar
    </button>
  );
}
