// COTAÇÕES
// ═══════════════════════════════════════════════════════════════════════════════
function ScreenCotacoes({ quotes, isMobile, onFetch, onUpdateWatchlist, qLoading, settings }) {
  const [editSection, setEditSection] = useState(null);
  const [editInput,   setEditInput]   = useState("");

  const wl   = quotes?.watchlist  || DEF_WATCHLIST;
  const data = quotes?.data       || { currencies:{}, br:{}, us:{}, crypto:{} };

  const SECTIONS = [
    { key:"currencies", label:"💵 Moedas",       unit:"BRL", color:"#F5C518", hint:"USD, EUR, GBP..." },
    { key:"br",         label:"📈 Ações BR",     unit:"BRL", color:"#22c55e", hint:"PETR4, VALE3..." },
    { key:"us",         label:"🇺🇸 Ações EUA",   unit:"USD", color:"#60a5fa", hint:"AAPL, MSFT..."   },
    { key:"crypto",     label:"₿ Crypto",        unit:"USD", color:"#f7931a", hint:"BTC, ETH..."     },
  ];

  function startEdit(key) {
    setEditSection(key);
    setEditInput((wl[key] || []).join(", "));
  }

  function saveEdit(key) {
    const tickers = editInput.split(/[,\s]+/).map(t => t.trim().toUpperCase()).filter(Boolean);
    onUpdateWatchlist(key, tickers);
    setEditSection(null);
  }

  function fmtQuote(val) {
    if (val === null || val === undefined) return "—";
    if (val >= 1000) return val.toLocaleString("pt-BR", { maximumFractionDigits:0 });
    return val.toLocaleString("pt-BR", { minimumFractionDigits:2, maximumFractionDigits:2 });
  }

  function changePctColor(pct) {
    if (!pct && pct !== 0) return "#555";
    return pct >= 0 ? "#22c55e" : "#ef4444";
  }

  function changePctStr(pct) {
    if (!pct && pct !== 0) return "—";
    return (pct >= 0 ? "+" : "") + pct.toFixed(2) + "%";
  }

  return (
    <div style={P.root}>
      <PageHeader title="Cotações" subtitle="Dados oficiais — BCB (CDI, PTAX) + Brapi (B3, Crypto)">
        <Btn onClick={() => onFetch()} disabled={qLoading}>
          {qLoading ? "Buscando..." : <span style={{display:"flex",alignItems:"center",gap:7}}><Icon name="refresh" size={14}/> Atualizar</span>}
        </Btn>
      </PageHeader>

      {/* Linha de status */}
      {quotes?.updatedAt && (
        <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:20, flexWrap:"wrap" }}>
          <span style={{ fontSize:11, color:"#555", fontFamily:"'IBM Plex Mono',monospace" }}>
            Última atualização: {quotes.updatedAt}
          </span>
          {data.cached && (
            <span style={{ fontSize:11, background:"#1a1a00", border:"1px solid #F5C51833", color:"#F5C518", fontFamily:"'IBM Plex Mono',monospace", padding:"2px 10px", borderRadius:20 }}>
              cache ativo
            </span>
          )}
          {data.source && (
            <span style={{ fontSize:11, color:"#444", fontFamily:"'IBM Plex Mono',monospace" }}>
              fonte: {data.source}
            </span>
          )}
        </div>
      )}

      {/* Card CDI */}
      {quotes?.data?.cdi && (
        <div style={{ background:"#111", border:"1px solid #F5C51844", borderRadius:14, padding:"16px 20px", marginBottom:20, display:"flex", alignItems:"center", gap:16, flexWrap:"wrap" }}>
          <div style={{ fontSize:32 }}>📡</div>
          <div style={{ flex:1 }}>
            <div style={{ fontSize:10, color:"#555", textTransform:"uppercase", letterSpacing:1.5, fontFamily:"'IBM Plex Mono',monospace", marginBottom:4 }}>
              Taxa CDI — Banco Central do Brasil
            </div>
            <div style={{ fontSize:28, fontWeight:800, color:"#F5C518", fontFamily:"'IBM Plex Mono',monospace", letterSpacing:-1 }}>
              {fmtP(quotes.data.cdi)}
              <span style={{ fontSize:13, color:"#555", marginLeft:8, fontWeight:400 }}>ao ano</span>
            </div>
          </div>
          <div style={{ background:"#001a00", border:"1px solid #22c55e33", borderRadius:8, padding:"6px 14px", fontSize:11, color:"#22c55e", fontFamily:"'IBM Plex Mono',monospace" }}>
            ✓ Sincronizado com o portfólio
          </div>
        </div>
      )}

      {/* Erro */}
      {quotes?.error && (
        <div style={{ background:"#1a0000", border:"1px solid #ef444433", borderRadius:10, padding:"14px 16px", marginBottom:20, fontSize:11, color:"#f87171", fontFamily:"'IBM Plex Mono',monospace", lineHeight:1.8 }}>
          <strong>✗ Erro na última busca:</strong><br/>
          {quotes.error}<br/>
          <span style={{ color:"#555" }}>Tente novamente ou verifique sua conexão.</span>
        </div>
      )}

      {/* Estado inicial */}
      {!quotes?.updatedAt && !quotes?.error && (
        <div style={{ background:"#111", border:"1px solid #222", borderRadius:10, padding:"14px 18px", marginBottom:20, fontSize:12, color:"#888", fontFamily:"'IBM Plex Mono',monospace", lineHeight:1.7 }}>
          Clique em <strong style={{ color:"#F5C518" }}>Atualizar</strong> para buscar cotações oficiais do BCB e B3.<br/>
          <span style={{ color:"#555", fontSize:11 }}>Gratuito · Sem chave de API · Cache de 30 minutos.</span>
        </div>
      )}

      <div style={{ display:"grid", gridTemplateColumns:isMobile?"1fr":"1fr 1fr", gap:20 }}>
        {SECTIONS.map(sec => {
          const tickers   = wl[sec.key] || [];
          const secData   = data[sec.key] || {};
          const isEditing = editSection === sec.key;

          return (
            <div key={sec.key} style={{ ...P.chartCard, borderColor:sec.color+"33" }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
                <div style={{ ...P.chartTitle, color:sec.color, marginBottom:0 }}>{sec.label}</div>
                <button style={{ ...P.iBtn, fontSize:11, padding:"3px 10px" }} onClick={() => isEditing ? saveEdit(sec.key) : startEdit(sec.key)}>
                  {isEditing ? "✓ Salvar" : "✏️ Editar"}
                </button>
              </div>

              {isEditing ? (
                <div>
                  <div style={{ fontSize:11, color:"#6a6458", fontFamily:"IBM Plex Mono,monospace", marginBottom:6 }}>
                    Tickers separados por vírgula ({sec.hint})
                  </div>
                  <input
                    style={{ ...P.input, marginBottom:8 }}
                    value={editInput}
                    onChange={e => setEditInput(e.target.value)}
                    onKeyDown={e => e.key === "Enter" && saveEdit(sec.key)}
                    placeholder={sec.hint}
                    autoFocus
                  />
                  <div style={{ display:"flex", gap:8 }}>
                    <Btn onClick={() => saveEdit(sec.key)}>Salvar</Btn>
                    <BtnCancel onClick={() => setEditSection(null)}>Cancelar</BtnCancel>
                  </div>
                </div>
              ) : (
                <div>
                  {tickers.length === 0 ? (
                    <div style={{ color:"#4a4438", fontSize:12, fontFamily:"IBM Plex Mono,monospace", padding:"8px 0" }}>
                      Nenhum ticker. Clique em ✏️ Editar para adicionar.
                    </div>
                  ) : (
                    <div>
                      {/* Header row */}
                      <div style={{ display:"grid", gridTemplateColumns:"1fr auto auto auto", gap:8, paddingBottom:8, borderBottom:"1px solid #1e1c16", marginBottom:4 }}>
                        <span style={{ fontSize:10, color:"#5a5448", textTransform:"uppercase", fontFamily:"IBM Plex Mono,monospace", letterSpacing:.8 }}>Ativo</span>
                        <span style={{ fontSize:10, color:"#5a5448", textTransform:"uppercase", fontFamily:"IBM Plex Mono,monospace", letterSpacing:.8, textAlign:"right" }}>Preço</span>
                        <span style={{ fontSize:10, color:"#5a5448", textTransform:"uppercase", fontFamily:"IBM Plex Mono,monospace", letterSpacing:.8, textAlign:"right" }}>Var.</span>
                        <span style={{ fontSize:10, color:"#5a5448", textTransform:"uppercase", fontFamily:"IBM Plex Mono,monospace", letterSpacing:.8, textAlign:"right" }}>%</span>
                      </div>
                      {tickers.map(ticker => {
                        const q = secData[ticker];
                        const hasData = q && q.price !== null && q.price !== undefined;
                        const pctColor = changePctColor(q?.changePct);
                        return (
                          <div key={ticker} style={{ display:"grid", gridTemplateColumns:"1fr auto auto auto", gap:8, padding:"8px 0", borderBottom:"1px solid #191714", alignItems:"center" }}>
                            <div>
                              <span style={{ color:"#d4cfc5", fontWeight:700, fontFamily:"IBM Plex Mono,monospace", fontSize:13 }}>{ticker}</span>
                              <span style={{ marginLeft:6, fontSize:10, color:"#5a5448", fontFamily:"IBM Plex Mono,monospace" }}>{sec.unit}</span>
                            </div>
                            <span style={{ color: hasData ? sec.color : "#4a4438", fontWeight:700, fontFamily:"IBM Plex Mono,monospace", fontSize:13, textAlign:"right" }}>
                              {hasData ? fmtQuote(q.price) : (qLoading ? "..." : "—")}
                            </span>
                            <span style={{ color: pctColor, fontFamily:"IBM Plex Mono,monospace", fontSize:11, textAlign:"right" }}>
                              {hasData ? fmtQuote(q.change) : "—"}
                            </span>
                            <span style={{ color: pctColor, fontWeight:600, fontFamily:"IBM Plex Mono,monospace", fontSize:11, textAlign:"right", minWidth:52 }}>
                              {hasData ? changePctStr(q.changePct) : "—"}
                            </span>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              )}

              {/* Portfolio sync note for currencies */}
              {sec.key === "currencies" && (data.currencies?.USD?.price || data.currencies?.EUR?.price) && (
                <div style={{ marginTop:10, padding:"8px 10px", background:"#081f12", border:"1px solid #7ecfb344", borderRadius:6, fontSize:10, color:"#7ecfb3", fontFamily:"IBM Plex Mono,monospace" }}>
                  ✓ USD e EUR sincronizados com o portfólio automaticamente.
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── Tela de Login + Solicitação de acesso ────────────────────────────────────
// Duas views num único componente: "login" e "register"
// Separadas aqui por responsabilidade, unificadas pela navegação entre elas
function ScreenLogin({ onLogin }) {
  const [view, setView] = useState("login"); // "login" | "register" | "success"

  if (view === "register") {
    return <ViewRegister onBack={() => setView("login")} onSuccess={() => setView("success")} />;
  }
  if (view === "success") {
    return <ViewRegisterSuccess onBack={() => setView("login")} />;
  }
  return <ViewLogin onLogin={onLogin} onRegister={() => setView("register")} />;
}

// ─── View: formulário de login ────────────────────────────────────────────────
function ViewLogin({ onLogin, onRegister }) {
  const [email,    setEmail]    = useState("");
  const [password, setPassword] = useState("");
  const [showPass, setShowPass] = useState(false);
  const [loading,  setLoading]  = useState(false);
  const [error,    setError]    = useState("");

  async function handleSubmit(e) {
    e.preventDefault();
    if (!email.trim() || !password) { setError("Preencha e-mail e senha."); return; }
    setLoading(true);
    setError("");
    try {
      const data = await apiCall("POST", "/auth/login", { email: email.trim(), password });
      onLogin(data);
    } catch (err) {
      setError(err.message);
    } finally {
      setLoading(false);
    }
  }

  return (
    <AuthLayout subtitle="Entre na sua conta">
      <form onSubmit={handleSubmit} style={{ display:"flex", flexDirection:"column", gap:14 }}>
        <div>
          <label style={P.label}>E-mail</label>
          <input style={P.input} type="email" value={email}
            onChange={e => setEmail(e.target.value)}
            placeholder="seu@email.com" autoComplete="email" autoFocus />
        </div>
        <div>
          <label style={P.label}>Senha</label>
          <div style={{ position:"relative" }}>
            <input style={{ ...P.input, paddingRight:44 }}
              type={showPass ? "text" : "password"}
              value={password} onChange={e => setPassword(e.target.value)}
              placeholder="••••••••" autoComplete="current-password" />
            <button type="button" onClick={() => setShowPass(s => !s)}
              style={{ position:"absolute", right:12, top:"50%", transform:"translateY(-50%)", background:"none", border:"none", cursor:"pointer", color:"#555", fontSize:16 }}>
              {showPass ? "🙈" : "👁️"}
            </button>
          </div>
        </div>

        <AuthError message={error} />

        <button type="submit" disabled={loading}
          style={{ ...P.btn, width:"100%", justifyContent:"center", padding:"13px", fontSize:15, marginTop:4, opacity:loading?0.6:1, cursor:loading?"not-allowed":"pointer" }}>
          {loading ? "Entrando..." : "Entrar"}
        </button>
      </form>

      <div style={{ textAlign:"center", marginTop:20 }}>
        <span style={{ fontSize:13, color:"#555" }}>Não tem acesso? </span>
        <button onClick={onRegister}
          style={{ background:"none", border:"none", color:T.accent, fontSize:13, cursor:"pointer", fontWeight:600, padding:0 }}>
          Solicitar acesso
        </button>
      </div>
    </AuthLayout>
  );
}

// ─── View: formulário de solicitação de acesso ────────────────────────────────
function ViewRegister({ onBack, onSuccess }) {
  const [form,    setForm]    = useState({ name:"", email:"", password:"", confirm:"" });
  const [loading, setLoading] = useState(false);
  const [error,   setError]   = useState("");

  function updateField(field, value) {
    setForm(f => ({ ...f, [field]: value }));
  }

  function validate() {
    if (!form.name.trim())         return "Nome é obrigatório.";
    if (!form.email.trim())        return "E-mail é obrigatório.";
    if (form.password.length < 6)  return "Senha deve ter pelo menos 6 caracteres.";
    if (form.password !== form.confirm) return "As senhas não coincidem.";
    return null;
  }

  async function handleSubmit(e) {
    e.preventDefault();
    const validationError = validate();
    if (validationError) { setError(validationError); return; }

    setLoading(true);
    setError("");
    try {
      await apiCall("POST", "/auth/register", {
        name:     form.name.trim(),
        email:    form.email.trim(),
        password: form.password,
      });
      onSuccess();
    } catch (err) {
      setError(err.message);
    } finally {
      setLoading(false);
    }
  }

  return (
    <AuthLayout subtitle="Solicitar acesso">
      <form onSubmit={handleSubmit} style={{ display:"flex", flexDirection:"column", gap:14 }}>
        <div>
          <label style={P.label}>Nome completo</label>
          <input style={P.input} value={form.name}
            onChange={e => updateField("name", e.target.value)}
            placeholder="João Silva" autoFocus />
        </div>
        <div>
          <label style={P.label}>E-mail</label>
          <input style={P.input} type="email" value={form.email}
            onChange={e => updateField("email", e.target.value)}
            placeholder="seu@email.com" autoComplete="email" />
        </div>
        <div>
          <label style={P.label}>Senha</label>
          <input style={P.input} type="password" value={form.password}
            onChange={e => updateField("password", e.target.value)}
            placeholder="mínimo 6 caracteres" autoComplete="new-password" />
        </div>
        <div>
          <label style={P.label}>Confirmar senha</label>
          <input style={P.input} type="password" value={form.confirm}
            onChange={e => updateField("confirm", e.target.value)}
            placeholder="repita a senha" autoComplete="new-password" />
        </div>

        <div style={{ background:"#111", border:`1px solid ${T.border}`, borderRadius:9, padding:"10px 14px", fontSize:12, color:"#555", fontFamily:T.mono }}>
          Sua solicitação ficará pendente até o administrador aprovar.
        </div>

        <AuthError message={error} />

        <button type="submit" disabled={loading}
          style={{ ...P.btn, width:"100%", justifyContent:"center", padding:"13px", fontSize:15, opacity:loading?0.6:1, cursor:loading?"not-allowed":"pointer" }}>
          {loading ? "Enviando..." : "Solicitar acesso"}
        </button>
      </form>

      <div style={{ textAlign:"center", marginTop:20 }}>
        <button onClick={onBack}
          style={{ background:"none", border:"none", color:"#555", fontSize:13, cursor:"pointer", padding:0 }}>
          ← Voltar ao login
        </button>
      </div>
    </AuthLayout>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// ADMIN PANEL
// ═══════════════════════════════════════════════════════════════════════════════
const MODULE_LABELS = {
  dashboard:   "Dashboard",
  investments: "Investimentos",
  renda:       "Minha Renda",
  history:     "Aportes",
  comparator:  "Comparador",
  projection:  "Projeção",
  quotes:      "Cotações",
  categories:  "Categorias",
  settings:    "Config.",
};

const ADMIN_TABS = [
  { id:"users",       label:"Usuários"       },
  { id:"pending",     label:"Solicitações"   },
  { id:"new",         label:"Novo usuário"   },
  { id:"permissions", label:"Permissões"     },
];

function ScreenAdmin({ auth, isMobile }) {
  const [users,     setUsers]     = useState([]);
  const [pending,   setPending]   = useState([]);
  const [loading,   setLoading]   = useState(true);
  const [error,     setError]     = useState("");
  const [newUser,   setNewUser]   = useState({ name:"", email:"", password:"", role:"user" });
  const [saving,    setSaving]    = useState(false);
  const [editId,    setEditId]    = useState(null);
  const [modules,   setModules]   = useState({});
  const [activeTab, setActiveTab] = useState("users");

  const editingUser = users.find(u => u.id === editId);

  async function loadAll() {
    setLoading(true);
    setError("");
    try {
      const [usersData, pendingData] = await Promise.all([
        apiCall("GET", "/admin/users",   null, auth.token),
        apiCall("GET", "/admin/pending", null, auth.token),
      ]);
      setUsers(usersData);
      setPending(pendingData);
      const mods = {};
      usersData.forEach(u => { mods[u.id] = u.modules || []; });
      setModules(mods);
    } catch (err) {
      setError(err.message);
    } finally {
      setLoading(false);
    }
  }

  useEffect(() => { loadAll(); }, []);

  async function approveUser(userId, role = "user") {
    try {
      await apiCall("PUT", `/admin/pending/${userId}/approve`, { role }, auth.token);
      await loadAll();
    } catch (err) { setError(err.message); }
  }

  async function rejectUser(userId) {
    if (!window.confirm("Recusar esta solicitação?")) return;
    try {
      await apiCall("PUT", `/admin/pending/${userId}/reject`, null, auth.token);
      await loadAll();
    } catch (err) { setError(err.message); }
  }

  async function createUser() {
    if (!newUser.name || !newUser.email || !newUser.password) return;
    setSaving(true);
    try {
      await apiCall("POST", "/admin/users", newUser, auth.token);
      setNewUser({ name:"", email:"", password:"", role:"user" });
      await loadAll();
      setActiveTab("users");
    } catch (err) {
      setError(err.message);
    } finally {
      setSaving(false);
    }
  }

  async function toggleModule(userId, module) {
    const current = modules[userId] || [];
    const updated  = current.includes(module)
      ? current.filter(m => m !== module)
      : [...current, module];

    // Optimistic update — reverte se der erro
    setModules(m => ({ ...m, [userId]: updated }));
    try {
      await apiCall("PUT", `/admin/users/${userId}/modules`, { modules: updated }, auth.token);
    } catch (err) {
      setModules(m => ({ ...m, [userId]: current }));
      setError(err.message);
    }
  }

  async function toggleActive(user) {
    try {
      await apiCall("PUT", `/admin/users/${user.id}`, { active: !user.active }, auth.token);
      await loadAll();
    } catch (err) { setError(err.message); }
  }

  async function deleteUser(id) {
    if (!window.confirm("Remover este usuário permanentemente?")) return;
    try {
      await apiCall("DELETE", `/admin/users/${id}`, null, auth.token);
      await loadAll();
    } catch (err) { setError(err.message); }
  }

  return (
    <div style={P.root}>
      <PageHeader title="Painel Admin" subtitle="Gerencie usuários e permissões de acesso" />

      {error && (
        <div style={{ background:"#1a0000", border:"1px solid #ef444433", borderRadius:10, padding:"12px 16px", marginBottom:20, fontSize:13, color:"#f87171", fontFamily:T.mono, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <span>✗ {error}</span>
          <button onClick={() => setError("")} style={{ background:"none", border:"none", color:"#f87171", cursor:"pointer", fontSize:16 }}>×</button>
        </div>
      )}

      {/* Tabs */}
      <div style={{ display:"flex", gap:4, marginBottom:24, background:T.surface2, borderRadius:12, padding:4, border:`1px solid ${T.border}`, width:"fit-content", flexWrap:"wrap" }}>
        {ADMIN_TABS.map(tab => (
          <button key={tab.id} onClick={() => setActiveTab(tab.id)}
            style={{ ...P.toggleBtn, ...(activeTab===tab.id ? P.toggleActive : {}), padding:"8px 16px", fontSize:13, position:"relative" }}>
            {tab.label}
            {tab.id === "pending" && pending.length > 0 && (
              <span style={{ position:"absolute", top:-4, right:-4, width:18, height:18, borderRadius:50, background:"#ef4444", color:"#fff", fontSize:10, fontWeight:700, display:"flex", alignItems:"center", justifyContent:"center" }}>
                {pending.length}
              </span>
            )}
          </button>
        ))}
      </div>

      {/* ── Usuários ativos ── */}
      {activeTab === "users" && (
        <div style={P.chartCard}>
          <div style={P.chartTitle}>Usuários ativos</div>
          {loading ? (
            <div style={{ color:"#555", fontFamily:T.mono, fontSize:13, padding:"20px 0" }}>Carregando...</div>
          ) : users.length === 0 ? (
            <Empty>Nenhum usuário cadastrado</Empty>
          ) : (
            <div style={{ overflowX:"auto" }}>
              <table style={P.table}>
                <thead><tr>
                  <th style={P.th}>Nome</th>
                  <th style={P.th}>E-mail</th>
                  <th style={P.th}>Perfil</th>
                  <th style={P.th}>Status</th>
                  <th style={P.th}>Módulos</th>
                  <th style={P.th}></th>
                </tr></thead>
                <tbody>
                  {users.map(u => (
                    <tr key={u.id} style={P.tr} className="tr-hover">
                      <td style={{ ...P.td, color:"#fff", fontWeight:600 }}>{u.name}</td>
                      <td style={{ ...P.td, fontFamily:T.mono, fontSize:11 }}>{u.email}</td>
                      <td style={P.td}><RoleBadge role={u.role} /></td>
                      <td style={P.td}>
                        <button onClick={() => toggleActive(u)}
                          style={{ fontSize:11, fontFamily:T.mono, background:u.active?"#22c55e22":"#ef444422", color:u.active?"#22c55e":"#ef4444", border:`1px solid ${u.active?"#22c55e33":"#ef444433"}`, borderRadius:20, padding:"3px 12px", cursor:"pointer" }}>
                          {u.active ? "Ativo" : "Inativo"}
                        </button>
                      </td>
                      <td style={{ ...P.td, color:"#555", fontSize:12 }}>{(modules[u.id]||[]).length} módulos</td>
                      <td style={P.td}>
                        <div style={{ display:"flex", gap:6 }}>
                          <IBtn onClick={() => { setEditId(u.id); setActiveTab("permissions"); }} title="Editar permissões" iconName="edit" />
                          {u.role !== "admin" && <IBtn onClick={() => deleteUser(u.id)} title="Remover" iconName="trash" />}
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      )}

      {/* ── Solicitações pendentes ── */}
      {activeTab === "pending" && (
        <div style={P.chartCard}>
          <div style={P.chartTitle}>Solicitações aguardando aprovação</div>
          {loading ? (
            <div style={{ color:"#555", fontFamily:T.mono, fontSize:13, padding:"20px 0" }}>Carregando...</div>
          ) : pending.length === 0 ? (
            <Empty>Nenhuma solicitação pendente</Empty>
          ) : (
            <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
              {pending.map(u => (
                <div key={u.id} style={{ display:"flex", alignItems:"center", gap:16, padding:"14px 16px", background:T.surface2, borderRadius:10, border:`1px solid ${T.border}`, flexWrap:"wrap" }}>
                  <div style={{ flex:1, minWidth:120 }}>
                    <div style={{ fontSize:14, fontWeight:600, color:"#fff" }}>{u.name}</div>
                    <div style={{ fontSize:11, color:"#555", fontFamily:T.mono, marginTop:2 }}>{u.email}</div>
                    <div style={{ fontSize:11, color:"#444", marginTop:4 }}>
                      Solicitado em {new Date(u.created_at).toLocaleDateString("pt-BR")}
                    </div>
                  </div>
                  <div style={{ display:"flex", gap:8, alignItems:"center", flexWrap:"wrap" }}>
                    <select
                      defaultValue="user"
                      id={`role-${u.id}`}
                      style={{ ...P.input, width:"auto", padding:"6px 10px", fontSize:12 }}>
                      <option value="user">Usuário</option>
                      <option value="guest">Convidado</option>
                      <option value="admin">Admin</option>
                    </select>
                    <button
                      onClick={() => approveUser(u.id, document.getElementById(`role-${u.id}`).value)}
                      style={{ ...P.btn, padding:"7px 16px", fontSize:12 }}>
                      Aprovar
                    </button>
                    <button
                      onClick={() => rejectUser(u.id)}
                      style={{ ...P.btnCancel, padding:"7px 16px", fontSize:12, color:"#ef4444", borderColor:"#ef444433" }}>
                      Recusar
                    </button>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* ── Novo usuário ── */}
      {activeTab === "new" && (
        <div style={{ ...P.chartCard, maxWidth:500 }}>
          <div style={P.chartTitle}>Criar usuário diretamente</div>
          <label style={P.label}>Nome completo</label>
          <input style={P.input} value={newUser.name} placeholder="João Silva"
            onChange={e => setNewUser(u => ({ ...u, name:e.target.value }))} />
          <label style={P.label}>E-mail</label>
          <input style={P.input} type="email" value={newUser.email} placeholder="joao@email.com"
            onChange={e => setNewUser(u => ({ ...u, email:e.target.value }))} />
          <label style={P.label}>Senha inicial</label>
          <input style={P.input} type="password" value={newUser.password} placeholder="mínimo 6 caracteres"
            onChange={e => setNewUser(u => ({ ...u, password:e.target.value }))} />
          <label style={P.label}>Perfil</label>
          <select style={{ ...P.input, cursor:"pointer" }} value={newUser.role}
            onChange={e => setNewUser(u => ({ ...u, role:e.target.value }))}>
            <option value="user">Usuário — acesso padrão</option>
            <option value="guest">Convidado — acesso limitado</option>
            <option value="admin">Admin — acesso total</option>
          </select>
          <p style={{ ...P.note, marginTop:12 }}>
            Usuário criado aqui já entra como ativo, sem precisar de aprovação.
          </p>
          <div style={{ marginTop:16 }}>
            <Btn onClick={createUser} disabled={saving}>
              {saving ? "Criando..." : "Criar usuário"}
            </Btn>
          </div>
        </div>
      )}

      {/* ── Permissões ── */}
      {activeTab === "permissions" && (
        <div>
          <div style={{ display:"flex", flexWrap:"wrap", gap:8, marginBottom:20 }}>
            {users.filter(u => u.role !== "admin").map(u => (
              <button key={u.id} onClick={() => setEditId(u.id)}
                style={{ padding:"8px 16px", borderRadius:20, border:"1px solid", fontSize:12, cursor:"pointer", fontFamily:T.mono, background:editId===u.id?T.accentDim:T.surface, color:editId===u.id?T.accent:"#aaa", borderColor:editId===u.id?T.accent:T.border2 }}>
                {u.name}
              </button>
            ))}
          </div>

          {editingUser ? (
            <div style={P.chartCard}>
              <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:20 }}>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:15, fontWeight:700, color:"#fff" }}>{editingUser.name}</div>
                  <div style={{ fontSize:11, color:"#555", fontFamily:T.mono, marginTop:2 }}>{editingUser.email}</div>
                </div>
                <RoleBadge role={editingUser.role} />
              </div>
              <div style={{ display:"grid", gridTemplateColumns:isMobile?"1fr":"1fr 1fr", gap:8 }}>
                {Object.entries(MODULE_LABELS).map(([mod, label]) => {
                  const enabled = (modules[editingUser.id] || []).includes(mod);
                  return (
                    <button key={mod} onClick={() => toggleModule(editingUser.id, mod)}
                      style={{ display:"flex", alignItems:"center", gap:12, padding:"12px 16px", borderRadius:10, background:enabled?T.accentDim:T.surface2, border:`1px solid ${enabled?T.accent:T.border}`, cursor:"pointer", transition:"all .15s", textAlign:"left" }}>
                      <div style={{ width:18, height:18, borderRadius:5, background:enabled?T.accent:"#2a2a2a", border:`2px solid ${enabled?T.accent:"#444"}`, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, fontSize:11, color:"#000", fontWeight:800 }}>
                        {enabled ? "✓" : ""}
                      </div>
                      <span style={{ fontSize:13, color:enabled?"#fff":"#666", fontWeight:enabled?600:400 }}>{label}</span>
                    </button>
                  );
                })}
              </div>
              <p style={P.note}>Alterações salvas automaticamente.</p>
            </div>
          ) : (
            <Empty>Selecione um usuário acima para editar suas permissões.</Empty>
          )}
        </div>
      )}
    </div>
  );
}

// MODALS

function InvModal({ data, cats, isMobile, onSave, onClose }) {
  const [form, setForm] = useState({
    id:          data.id,
    nome:        data.nome || "",
    tipo:        data.tipo || "cdb",
    valor:       data.valor ? String(data.valor) : "",
    pct:         data.pct  ? String(data.pct)   : "",
    data:        data.data || new Date().toISOString().split("T")[0],
    vencimento:  data.vencimento || "",
    categoriaId: data.categoriaId || null,
  });

  const t = getType(form.tipo);

  return (
    <Overlay onClose={onClose} isMobile={isMobile}>
      <ModalBox isMobile={isMobile} maxW={500}>
        <div style={M.title}>{data.id ? "Editar" : "Novo"} Investimento</div>

        <label style={P.label}>Tipo</label>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(5,1fr)", gap:6, marginBottom:4 }}>
          {TYPES.map(tp => (
            <button key={tp.id} onClick={() => setForm(f => ({ ...f, tipo:tp.id }))}
              style={{ ...M.typeBtn, ...(form.tipo===tp.id ? { borderColor:tp.color, color:tp.color, background:tp.color+"18" } : {}) }}>
              <span style={{ fontSize:14 }}>{tp.icon}</span>
              <span style={{ fontSize:9 }}>{tp.label}</span>
            </button>
          ))}
        </div>

        {t.intl && (
          <div style={{ background:"#0e1520", border:"1px solid #1e3050", borderRadius:6, padding:"8px 12px", fontSize:11, color:"#7eb8e2", fontFamily:"IBM Plex Mono,monospace", marginBottom:4 }}>
            🌍 Ativo em {t.currency}. Convertido para BRL via câmbio configurado.
          </div>
        )}

        <label style={P.label}>Nome</label>
        <input style={P.input} value={form.nome} onChange={e => setForm(f => ({ ...f, nome:e.target.value }))} placeholder={`Ex: ${t.label} XP`} />

        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
          <div>
            <label style={P.label}>Valor {t.currency ? `(${t.currency})` : "(R$)"}</label>
            <input style={P.input} type="number" value={form.valor} onChange={e => setForm(f => ({ ...f, valor:e.target.value }))} placeholder="10000" />
          </div>
          <div>
            <label style={P.label}>{t.intl ? "Retorno a.a. (%)" : "% CDI"}</label>
            <input style={P.input} type="number" value={form.pct} onChange={e => setForm(f => ({ ...f, pct:e.target.value }))} placeholder={t.intl ? "12" : "100"} />
          </div>
        </div>

        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
          <div>
            <label style={P.label}>Data de Início</label>
            <input style={{ ...P.input, colorScheme:"dark" }} type="date" value={form.data} onChange={e => setForm(f => ({ ...f, data:e.target.value }))} />
          </div>
          <div>
            <label style={P.label}>Vencimento (opcional)</label>
            <input style={{ ...P.input, colorScheme:"dark" }} type="date" value={form.vencimento} onChange={e => setForm(f => ({ ...f, vencimento:e.target.value }))} />
          </div>
        </div>

        {cats.length > 0 && (
          <>
            <label style={P.label}>Categoria (opcional)</label>
            <div style={{ display:"flex", flexWrap:"wrap", gap:8, marginBottom:8 }}>
              <button style={{ ...M.catChip, ...(form.categoriaId===null ? M.catChipActive : {}) }} onClick={() => setForm(f => ({ ...f, categoriaId:null }))}>Nenhuma</button>
              {cats.map(cat => (
                <button key={cat.id} onClick={() => setForm(f => ({ ...f, categoriaId:cat.id }))}
                  style={{ ...M.catChip, ...(form.categoriaId===cat.id ? { borderColor:cat.cor, color:cat.cor, background:cat.cor+"18" } : {}) }}>
                  {cat.nome}
                </button>
              ))}
            </div>
          </>
        )}

        {t.ir
          ? <div style={M.irNote}>⚠️ {t.label} tem IR regressivo (22,5% → 15%)</div>
          : <div style={{ ...M.irNote, borderColor:"#7ecfb344", color:"#7ecfb3", background:"#7ecfb308" }}>✓ {t.label} é isento de IR</div>
        }

        <div style={M.actions}>
          <BtnCancel onClick={onClose}>Cancelar</BtnCancel>
          <Btn onClick={() => onSave(form)}>Salvar</Btn>
        </div>
      </ModalBox>
    </Overlay>
  );
}

function DepModal({ data, invs, isMobile, onSave, onClose }) {
  const [form, setForm] = useState({
    invId: data.invId || invs[0]?.id || null,
    valor: "",
    data:  new Date().toISOString().split("T")[0],
    obs:   "",
  });
  return (
    <Overlay onClose={onClose} isMobile={isMobile}>
      <ModalBox isMobile={isMobile} maxW={400}>
        <div style={M.title}>💰 Registrar Aporte</div>
        <label style={P.label}>Investimento</label>
        <select style={{ ...P.input, cursor:"pointer" }} value={form.invId || ""} onChange={e => setForm(f => ({ ...f, invId:parseInt(e.target.value) }))}>
          {invs.map(inv => { const t = getType(inv.tipo); return <option key={inv.id} value={inv.id}>{t.icon} {inv.nome}</option>; })}
        </select>
        <label style={P.label}>Valor (R$)</label>
        <input style={P.input} type="number" value={form.valor} onChange={e => setForm(f => ({ ...f, valor:e.target.value }))} placeholder="1000" />
        <label style={P.label}>Data</label>
        <input style={{ ...P.input, colorScheme:"dark" }} type="date" value={form.data} onChange={e => setForm(f => ({ ...f, data:e.target.value }))} />
        <label style={P.label}>Observação (opcional)</label>
        <input style={P.input} value={form.obs} onChange={e => setForm(f => ({ ...f, obs:e.target.value }))} placeholder="Ex: Aporte mensal" />
        <div style={{ background:"#0e1520", border:"1px solid #1e3050", borderRadius:6, padding:"8px 12px", fontSize:11, color:"#7eb8e2", fontFamily:"IBM Plex Mono,monospace", marginTop:6 }}>
          💡 O valor será somado ao saldo do investimento.
        </div>
        <div style={M.actions}>
          <BtnCancel onClick={onClose}>Cancelar</BtnCancel>
          <Btn onClick={() => onSave(form)}>Registrar</Btn>
        </div>
      </ModalBox>
    </Overlay>
  );
}

function CatModal({ data, isMobile, onSave, onClose }) {
  const [form, setForm] = useState({ id:data.id, nome:data.nome||"", cor:data.cor||"#7ecfb3" });
  const COLORS = ["#e2c97e","#7ecfb3","#7eb8e2","#b77ee2","#e27e9a","#e2a07e","#f7931a","#9a9a9a"];
  return (
    <Overlay onClose={onClose} isMobile={isMobile}>
      <ModalBox isMobile={isMobile} maxW={360}>
        <div style={M.title}>{data.id ? "Editar" : "Nova"} Categoria</div>
        <label style={P.label}>Nome</label>
        <input style={P.input} value={form.nome} onChange={e => setForm(f => ({ ...f, nome:e.target.value }))} onKeyDown={e => e.key==="Enter" && onSave(form)} placeholder="Ex: Renda Fixa" />
        <label style={P.label}>Cor</label>
        <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:12 }}>
          {COLORS.map(c => (
            <button key={c} onClick={() => setForm(f => ({ ...f, cor:c }))}
              style={{ width:28, height:28, borderRadius:6, background:c, border:form.cor===c?"2px solid #fff":"2px solid transparent", cursor:"pointer" }} />
          ))}
        </div>
        <div style={M.actions}>
          <BtnCancel onClick={onClose}>Cancelar</BtnCancel>
          <Btn onClick={() => onSave(form)}>Salvar</Btn>
        </div>
      </ModalBox>
    </Overlay>
  );
}

function ImportModal({ isMobile, onImport, onClose }) {
  const [err,  setErr]  = useState(null);
  const [drag, setDrag] = useState(false);
  const ref = useRef(null);

  function handle(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const data = parseImport(e.target.result, file.name.endsWith(".csv"));
        onImport(data);
      } catch (_) {
        setErr("Arquivo inválido. Use JSON ou CSV exportado pelo InvestPro.");
      }
    };
    reader.readAsText(file);
  }

  return (
    <Overlay onClose={onClose} isMobile={isMobile}>
      <ModalBox isMobile={isMobile} maxW={420}>
        <div style={M.title}>⬆ Importar Dados</div>
        <div
          style={{ border:`2px dashed ${drag?"#e2c97e":"#2a2820"}`, borderRadius:10, padding:"32px 24px", textAlign:"center", background:drag?"#1e1c10":"#0e0d0b", transition:"all .2s", cursor:"pointer", marginBottom:8 }}
          onDragOver={e => { e.preventDefault(); setDrag(true); }}
          onDragLeave={() => setDrag(false)}
          onDrop={e => { e.preventDefault(); setDrag(false); handle(e.dataTransfer.files[0]); }}>
          <div style={{ fontSize:32, marginBottom:8 }}>📂</div>
          <div style={{ color:"#c9bfaa", fontSize:13, marginBottom:4 }}>Arraste um arquivo aqui</div>
          <div style={{ color:"#6a6458", fontSize:11, fontFamily:"IBM Plex Mono,monospace", marginBottom:16 }}>JSON ou CSV exportado pelo InvestPro</div>
          <BtnCancel onClick={() => ref.current?.click()}>Selecionar arquivo</BtnCancel>
          <input ref={ref} type="file" accept=".json,.csv" style={{ display:"none" }} onChange={e => handle(e.target.files[0])} />
        </div>
        {err && <div style={{ background:"#1f0808", border:"1px solid #e27e9a44", borderRadius:6, padding:"9px 12px", fontSize:11, color:"#e27e9a", fontFamily:"IBM Plex Mono,monospace" }}>✗ {err}</div>}
        <div style={{ color:"#4a4438", fontSize:11, fontFamily:"IBM Plex Mono,monospace", marginTop:6 }}>⚠️ A importação substituirá todos os dados atuais.</div>
        <div style={M.actions}><BtnCancel onClick={onClose}>Cancelar</BtnCancel></div>
      </ModalBox>
    </Overlay>
  );
}

function Chip({ active, onClick, color, children }) {
  const c = color || "#F5C518";
  return (
    <button style={{ ...P.chip, ...(active ? { borderColor:c, color:c, background:c+"22", fontWeight:600 } : {}) }} onClick={onClick}>
      {children}
    </button>
  );
}

function Toggle({ options, labels, value, onChange }) {
  return (
    <div style={{ display:"flex", gap:3, background:"#0a0a0a", borderRadius:10, padding:3, border:"1px solid #1a1a1a" }}>
      {options.map((opt, i) => (
        <button key={opt} style={{ ...P.toggleBtn, ...(value===opt ? P.toggleActive : {}) }} onClick={() => onChange(opt)}>
          {labels[i]}
        </button>
      ))}
    </div>
  );
}

function Btn({ onClick, children, disabled }) {
  return <button style={{ ...P.btn, ...(disabled?{opacity:.45,cursor:"not-allowed"}:{}) }} onClick={disabled?undefined:onClick} className={disabled?"":"btn-hover"}>{children}</button>;
}

function BtnSec({ onClick, children }) {
  return <button style={P.btnSec} onClick={onClick} className="btn-hover">{children}</button>;
}

function BtnCancel({ onClick, children }) {
  return <button style={P.btnCancel} onClick={onClick}>{children}</button>;
}

function IBtn({ onClick, title, children, iconName }) {
  return (
    <button style={P.iBtn} onClick={onClick} title={title} className="ibtn-hover">
      {iconName ? <Icon name={iconName} size={14} /> : children}
    </button>
  );
}

function Overlay({ onClose, children, isMobile }) {
  return (
    <div style={{ ...M.overlay, alignItems:isMobile?"flex-end":"center" }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()}>{children}</div>
    </div>
  );
}

function ModalBox({ children, isMobile, maxW }) {
  return (
    <div style={{ ...M.box, maxWidth:isMobile?"100vw":maxW, width:isMobile?"100vw":"100%", borderRadius:isMobile?"20px 20px 0 0":16, paddingBottom:isMobile?36:28 }}>
      {children}
    </div>
  );
}

function Empty({ children }) { return <div style={P.empty}><div style={{ fontSize:32, marginBottom:12, opacity:.3 }}>◎</div>{children}</div>; }
function Muted({ children }) { return <div style={{ color:"#444", fontSize:12, fontFamily:"'IBM Plex Mono',monospace", padding:"16px 0" }}>{children}</div>; }

function SnapRestoreBtn({ snap, onRestore }) {
  const [confirm, setConfirm] = useState(false);
  if (confirm) {
    return (
      <div style={{ display:"flex", gap:6, alignItems:"center" }}>
        <span style={{ fontSize:11, color:"#F5C518", fontFamily:"'IBM Plex Mono',monospace" }}>Confirmar?</span>
        <Btn onClick={() => { onRestore(snap); setConfirm(false); }}>Sim</Btn>
        <BtnCancel onClick={() => setConfirm(false)}>Não</BtnCancel>
      </div>
    );
  }
  return (
    <button style={{ ...P.btnSec, padding:"6px 14px", fontSize:11, display:"flex", alignItems:"center", gap:6 }} onClick={() => setConfirm(true)}>
      <Icon name="restore" size={13} /> Restaurar
    </button>
  );
}

const CSS = `
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600;700;800&display=swap');

:root {
  --accent: #F5C518;
  --bg: #090909;
  --surface: #111111;
  --border: #1f1f1f;
  --text: #ffffff;
  --text-sub: #888888;
  --text-muted: #444444;
  --green: #22c55e;
  --red: #ef4444;
  --radius: 14px;
  --transition: .18s cubic-bezier(.4,0,.2,1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }

/* Buttons */
.btn-hover { transition: opacity var(--transition), transform .1s; cursor: pointer; }
.btn-hover:hover { opacity: .88; transform: translateY(-1px); }
.btn-hover:active { transform: translateY(0); }

/* Cards */
.card-hover { transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition); }
.card-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 36px rgba(0,0,0,.55); border-color: #333 !important; }

/* Nav hover */
.nav-hover:hover { background: #1f1f1f !important; color: #ffffff !important; }
.ibtn-hover:hover { background: #1a1a1a !important; color: #fff !important; border-color: #333 !important; }

/* Table row hover */
.tr-hover:hover { background: #141414; }

/* Inputs */
input:focus, select:focus, textarea:focus { border-color: var(--accent) !important; box-shadow: 0 0 0 3px rgba(245,197,24,.08); }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #444; }

/* Select options */
select option { background: #111; color: #fff; }

/* Recharts tooltip global */
.recharts-tooltip-wrapper { outline: none; }

/* Mobile */
@media (max-width: 767px) {
  .kpi-row { grid-template-columns: 1fr 1fr !important; gap: 10px !important; margin-bottom: 18px !important; }
  .kpi-value { font-size: 17px !important; }
  .page-title { font-size: 24px !important; }
  .filter-row { flex-direction: column !important; align-items: stretch !important; gap: 10px !important; }
  .search-input { width: 100% !important; }
  .card-hover:hover { transform: none; box-shadow: none; }
}

/* Tablet */
@media (min-width: 768px) and (max-width: 1024px) {
  .kpi-row { grid-template-columns: repeat(2, 1fr) !important; }
}
