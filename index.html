function useIsMobile() {
  const [v, set] = useState(false);
  useEffect(() => {
    const fn = () => set(window.innerWidth < 768);
    fn();
    window.addEventListener("resize", fn);
    return () => window.removeEventListener("resize", fn);
  }, []);
  return v;
}

async function apiCall(method, path, body, token) {
  const cleanPath = path.startsWith('/') ? path : `/${path}`;
  const opts = {
    method,
    headers: { "Content-Type": "application/json" },
  };
  if (token) opts.headers["Authorization"] = `Bearer ${token}`;
  if (body)  opts.body = JSON.stringify(body);
  const res  = await fetch(`${API_URL}${cleanPath}`, opts);
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || `Erro ${res.status}`);
  return data;
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function getType(id) { return TYPES.find(t => t.id === id) || TYPES[TYPES.length - 1]; }

function irAliquota(dias) {
  if (dias <= 180) return 0.225;
  if (dias <= 360) return 0.200;
  if (dias <= 720) return 0.175;
  return 0.15;
}
function irLabel(dias) {
  if (dias <= 180) return "22,5%";
  if (dias <= 360) return "20,0%";
  if (dias <= 720) return "17,5%";
  return "15,0%";
}

function getIRAlert(inv) {
  const dias = Math.round((Date.now() - new Date(inv.data + "T12:00:00").getTime()) / 86400000);
  const bands = [[160, 180, "22,5%", "20,0%"], [340, 360, "20,0%", "17,5%"], [700, 720, "17,5%", "15,0%"]];
  for (const [s, e, from, to] of bands) {
    if (dias >= s && dias < e) {
      return { faixa: from, proxima: to, diasRestantes: e - dias, urgente: dias >= s + 15 };
    }
  }
  return null;
}

function getVencAlert(inv) {
  if (!inv.vencimento) return null;
  const dias = Math.round((new Date(inv.vencimento + "T12:00:00").getTime() - Date.now()) / 86400000);
  if (dias < 0)   return { label: "Vencido",   dias: Math.abs(dias), cor: "#e27e7e", urgente: true  };
  if (dias <= 30) return { label: `${dias}d`,  dias, cor: "#e27e9a", urgente: true  };
  if (dias <= 90) return { label: `${dias}d`,  dias, cor: "#e2c97e", urgente: false };
  return null;
}

function addMonths(date, n) {
  const d = new Date(date);
  d.setMonth(d.getMonth() + n);
  return d;
}

function calcMonths(inv, cdiRate, fx) {
  const t      = getType(inv.tipo);
  const annual = t.intl ? (inv.pct / 100) : ((cdiRate * (inv.pct || 100)) / 10000);
  const mo     = Math.pow(1 + annual, 1 / 12) - 1;
  const start  = new Date(inv.data + "T12:00:00");
  const today  = new Date();
  const past   = Math.max(0,
    (today.getFullYear() - start.getFullYear()) * 12 + today.getMonth() - start.getMonth()
  );
  const fxRate  = t.currency ? (fx[t.currency] || 1) : 1;
  const valBRL  = inv.valor * fxRate;

  return Array.from({ length: 24 }, (_, i) => {
    const fd       = addMonths(today, i + 1);
    const dtot     = Math.round((fd - start) / 86400000);
    const aliq     = t.ir ? irAliquota(dtot) : 0;
    const saldo    = valBRL * Math.pow(1 + mo, past + i + 1);
    const rb       = saldo - valBRL;
    const ir       = rb * aliq;
    const rl       = rb - ir;
    return {
      mes:          fd.toLocaleDateString("pt-BR", { month: "short", year: "numeric" }),
      saldo,        rendimento: rb,
      ir,           aliquotaLabel: irLabel(dtot),
      saldoLiquido: valBRL + rl,
      rendLiquido:  rl,
    };
  });
}

// ─── Storage ──────────────────────────────────────────────────────────────────
const LS_SNAPS = "investpro_snaps_v1";
const MAX_SNAPS = 10;

function lsLoad() {
  try { const r = localStorage.getItem(LS_KEY); return r ? JSON.parse(r) : null; }
  catch (_) { return null; }
}

function lsSave(d) {
  try {
    // Before overwriting, snapshot the current state
    const current = localStorage.getItem(LS_KEY);
    if (current) {
      try {
        const snaps = JSON.parse(localStorage.getItem(LS_SNAPS) || "[]");
        const cur   = JSON.parse(current);
        const label = cur.investments
          ? `${cur.investments.length} ativo${cur.investments.length!==1?"s":""}`
          : "snapshot";
        snaps.unshift({
          ts:      Date.now(),
          label,
          data:    current,
        });
        localStorage.setItem(LS_SNAPS, JSON.stringify(snaps.slice(0, MAX_SNAPS)));
      } catch (_) {}
    }
    localStorage.setItem(LS_KEY, JSON.stringify(d));
  } catch (_) {}
}

function lsLoadSnaps() {
  try { return JSON.parse(localStorage.getItem(LS_SNAPS) || "[]"); }
  catch (_) { return []; }
}

function lsRestoreSnap(snapData) {
  try {
    // Snapshot current state before restoring
    const current = localStorage.getItem(LS_KEY);
    if (current) {
      const snaps = lsLoadSnaps();
      const cur   = JSON.parse(current);
      snaps.unshift({ ts: Date.now(), label: `(antes do restore) ${cur.investments?.length||0} ativos`, data: current });
      localStorage.setItem(LS_SNAPS, JSON.stringify(snaps.slice(0, MAX_SNAPS)));
    }
    localStorage.setItem(LS_KEY, snapData);
    return JSON.parse(snapData);
  } catch (_) { return null; }
}

function doExportCSV(investments) {
  const rows = ["id,nome,tipo,valor,pct,data,vencimento,categoriaId",
    ...investments.map(i => `${i.id},"${i.nome}",${i.tipo},${i.valor},${i.pct},${i.data},${i.vencimento||""},${i.categoriaId||""}`)];
  const b = new Blob([rows.join("\n")], { type: "text/csv" });
  const a = Object.assign(document.createElement("a"), { href: URL.createObjectURL(b), download: `investpro_${Date.now()}.csv` });
  a.click(); URL.revokeObjectURL(a.href);
}
function parseImport(text, isCSV) {
  if (isCSV) {
    const rows = text.trim().split("\n").slice(1);
    const investments = rows.map((l, i) => {
      const c = l.split(",");
      return { id: parseInt(c[0]) || i+1, nome: (c[1]||"").replace(/"/g,""), tipo: c[2]||"cdb", valor: parseFloat(c[3])||0, pct: parseFloat(c[4])||100, data: c[5]||"2024-01-01", vencimento: c[6]||null, categoriaId: c[7] ? parseInt(c[7]) : null };
    });
    return { investments };
  }
  const d = JSON.parse(text);
  if (!Array.isArray(d.investments)) throw new Error("Invalid");
  return d;
}

  // Backend retorna: { cdi, currencies: { USD: { price } }, br: {}, us: {}, crypto: {} }
  return {
    cdi:       data.cdi,
    currencies: data.currencies,
    br:        data.br     || {},
    us:        data.us     || {},
    crypto:    data.crypto || {},
    source:    data.source || "BCB + Brapi",
    cached:    data.cached || false,
  };
}

// ─── Tooltip ──────────────────────────────────────────────────────────────────
const TIP_S = { background:"#0e0d0b", border:"1px solid #2a2820", borderRadius:8, padding:"10px 14px", fontFamily:"IBM Plex Mono,monospace", fontSize:11 };
const TIP_H = { color:"#c9bfaa", fontWeight:600, marginBottom:6, borderBottom:"1px solid #1e1c16", paddingBottom:4 };

function ChartTip({ active, payload, label }) {
  if (!active || !payload || !payload.length) return null;
  return (
    <div style={TIP_S}>
      <div style={TIP_H}>{label}</div>
      {payload.map((p, i) => (
        <div key={i} style={{ display:"flex", justifyContent:"space-between", gap:12, marginBottom:2 }}>
          <span style={{ color:"#6a6458" }}>{p.dataKey || p.name}</span>
          <span style={{ color: p.stroke || p.fill, fontWeight:600 }}>{fmt(p.value)}</span>
        </div>
      ))}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// APP
// ═══════════════════════════════════════════════════════════════════════════════
function App() {
  // ── Auth ─────────────────────────────────────────────────────────────────────
  // TODOS os hooks devem ser declarados aqui — antes de qualquer return condicional
  const [auth, setAuth] = useState(() => authLoad());

  // ── App state ─────────────────────────────────────────────────────────────────
  // Inicializador lazy: lsLoad() só é chamado uma vez, não a cada render
  const [invs,     setInvs]     = useState(() => { const s = lsLoad(); return s?.investments ?? DEF_INVS; });
  const [cats,     setCats]     = useState(() => { const s = lsLoad(); return s?.categories  ?? DEF_CATS; });
  const [settings, setSettings] = useState(() => { const s = lsLoad(); return s?.settings    ?? DEFAULT_SETTINGS; });
  const [deps,     setDeps]     = useState(() => { const s = lsLoad(); return s?.deposits     ?? []; });
  const [nii,      setNii]      = useState(() => { const s = lsLoad(); return s?.nii          ?? 3; });
  const [nci,      setNci]      = useState(() => { const s = lsLoad(); return s?.nci          ?? 4; });
  const [ndi,      setNdi]      = useState(() => { const s = lsLoad(); return s?.ndi          ?? 1; });
  const [quotes,   setQuotes]   = useState(() => { const s = lsLoad(); return s?.quotes       ?? DEF_QUOTES; });
  const [renda,    setRenda]    = useState(() => { const s = lsLoad(); return s?.renda        ?? defRenda(); });
  const [snaps,    setSnaps]    = useState(() => lsLoadSnaps());
  const [apiKey,   setApiKey_]  = useState(() => { try { return localStorage.getItem("investpro_apikey") || ""; } catch(_) { return ""; } });
  const [screen,   setScreen]   = useState("dashboard");
  const [sideOpen, setSideOpen] = useState(true);
  const [modal,    setModal]    = useState(null);
  const [toast,    setToast]    = useState(null);
  const [qLoading, setQLoading] = useState(false);

  const toastRef  = useRef(null);
  const isMobile  = useIsMobile();
  useEffect(() => {
    if (auth?.token) {
      console.log("Sincronizando com a Neon via Northflank...");
      apiCall("GET", "/data", null, auth.token)
        .then(data => {
          if (data) {
            if (data.investments) setInvs(data.investments);
            if (data.categories)  setCats(data.categories);
            if (data.settings)    setSettings(data.settings);
            if (data.deposits)    setDeps(data.deposits);
            if (data.renda)       setRenda(data.renda);
            // Salva no navegador para o próximo acesso ser mais rápido e offline
            lsSave(data);
          }
        })
        .catch(err => console.error("Erro na sincronização:", err));
    }
  }, [auth]);
  // ----------------------------------

  // ── Valores derivados ─────────────────────────────────────────────────────────
  const isLoggedIn  = !!auth?.token;
  const userRole    = auth?.user?.role || "guest";
  const userModules = auth?.modules    || [];
  const isAdmin     = userRole === "admin";
  const fx          = settings.fx || FX_DEFAULT;

  // ── Auth handlers ─────────────────────────────────────────────────────────────
  function handleLogin(data) {
    authSave(data);
    setAuth(data);
  }

  async function handleLogout() {
    try { await apiCall("POST", "/auth/logout", null, auth?.token); } catch (_) {}
    authClear();
    setAuth(null);
  }

  // ── Renderização condicional — após todos os hooks ────────────────────────────
  if (!isLoggedIn) {
    return <ScreenLogin onLogin={handleLogin} />;
  }

  const save = useCallback((i, c, s, d, ni, nc, nd, q, r) => {
    lsSave({ investments:i, categories:c, settings:s, deposits:d, nii:ni, nci:nc, ndi:nd, quotes:q, renda:r });
    setSnaps(lsLoadSnaps());
  }, []);

  const toast_ = useCallback((msg, ok=true) => {
    setToast({ msg, ok });
    clearTimeout(toastRef.current);
    toastRef.current = setTimeout(() => setToast(null), 2800);
  }, []);

  const projs = useMemo(() =>
    invs.map(inv => ({ ...inv, months: calcMonths(inv, settings.cdiRate, fx) })),
    [invs, settings.cdiRate, fx]
  );

  const cons = useMemo(() => {
    if (!projs.length) return [];
    return Array.from({ length: 24 }, (_, i) => ({
      mes:          projs[0].months[i].mes,
      saldo:        projs.reduce((a,c) => a + c.months[i].saldo, 0),
      rendimento:   projs.reduce((a,c) => a + c.months[i].rendimento, 0),
      ir:           projs.reduce((a,c) => a + c.months[i].ir, 0),
      saldoLiquido: projs.reduce((a,c) => a + c.months[i].saldoLiquido, 0),
      rendLiquido:  projs.reduce((a,c) => a + c.months[i].rendLiquido, 0),
    }));
  }, [projs]);

  const totalInv = invs.reduce((a, c) => {
    const t = getType(c.tipo);
    return a + c.valor * (t.currency ? (fx[t.currency] || 1) : 1);
  }, 0);

  const irAlerts   = useMemo(() => invs.map(i => ({ inv:i, a:getIRAlert(i) })).filter(x => x.a),   [invs]);
  const vencAlerts = useMemo(() => invs.map(i => ({ inv:i, a:getVencAlert(i) })).filter(x => x.a), [invs]);
  const urgent     = [...irAlerts.filter(x => x.a?.urgente), ...vencAlerts.filter(x => x.a?.urgente)];

  // ── Handlers ────────────────────────────────────────────────────────────────
  function saveInv(form) {
    const v = parseFloat(String(form.valor).replace(",", "."));
    const p = parseFloat(String(form.pct).replace(",", "."));
    if (!form.nome?.trim() || isNaN(v) || v <= 0 || isNaN(p) || p <= 0 || !form.data || !form.tipo) {
      toast_("Preencha todos os campos.", false); return;
    }
    const obj = { nome:form.nome.trim(), tipo:form.tipo, valor:v, pct:p, data:form.data, vencimento:form.vencimento||null, categoriaId:form.categoriaId||null };
    let newInvs, newNii = nii;
    if (!form.id) { newInvs = [...invs, { id:nii, ...obj }]; newNii++; }
    else          { newInvs = invs.map(i => i.id === form.id ? { ...i, ...obj } : i); }
    setInvs(newInvs); setNii(newNii); setModal(null);
    save(newInvs, cats, settings, deps, newNii, nci, ndi, quotes, renda);
    toast_("✓ Investimento salvo");
  }

  function delInv(id) {
    const n = invs.filter(i => i.id !== id);
    setInvs(n); save(n, cats, settings, deps, nii, nci, ndi, quotes);
    toast_("✓ Removido");
  }

  function saveDep(form) {
    const v = parseFloat(String(form.valor).replace(",", "."));
    if (!form.invId || isNaN(v) || v <= 0 || !form.data) { toast_("Preencha todos os campos.", false); return; }
    const newDeps = [...deps, { id:ndi, invId:form.invId, valor:v, data:form.data, obs:form.obs||"" }];
    const newInvs = invs.map(i => i.id === form.invId ? { ...i, valor:i.valor+v } : i);
    const newNdi  = ndi + 1;
    setDeps(newDeps); setInvs(newInvs); setNdi(newNdi); setModal(null);
    save(newInvs, cats, settings, newDeps, nii, nci, newNdi, quotes, renda);
    toast_("✓ Aporte registrado");
  }

  function delDep(id) {
    const d = deps.find(x => x.id === id);
    if (!d) return;
    const newDeps = deps.filter(x => x.id !== id);
    const newInvs = invs.map(i => i.id === d.invId ? { ...i, valor:Math.max(0, i.valor-d.valor) } : i);
    setDeps(newDeps); setInvs(newInvs);
    save(newInvs, cats, settings, newDeps, nii, nci, ndi, quotes, renda);
    toast_("✓ Aporte removido");
  }

  function saveCat(form) {
    if (!form.nome?.trim()) { toast_("Nome obrigatório.", false); return; }
    let newCats, newNci = nci;
    if (!form.id) { newCats = [...cats, { id:nci, nome:form.nome.trim(), cor:form.cor||"#7ecfb3" }]; newNci++; }
    else          { newCats = cats.map(c => c.id === form.id ? { ...c, nome:form.nome.trim(), cor:form.cor } : c); }
    setCats(newCats); setNci(newNci); setModal(null);
    save(invs, newCats, settings, deps, nii, newNci, ndi, quotes, renda);
    toast_("✓ Categoria salva");
  }

  function delCat(id) {
    const newCats = cats.filter(c => c.id !== id);
    const newInvs = invs.map(i => i.categoriaId === id ? { ...i, categoriaId:null } : i);
    setCats(newCats); setInvs(newInvs);
    save(newInvs, newCats, settings, deps, nii, nci, ndi, quotes, renda);
    toast_("✓ Categoria removida");
  }

  function saveSettings(s) {
    setSettings(s); save(invs, cats, s, deps, nii, nci, ndi, quotes, renda);
    toast_("✓ Configurações salvas");
  }

  function restoreSnap(snap) {
    const restored = lsRestoreSnap(snap.data);
    if (!restored) { toast_("✗ Erro ao restaurar versão.", false); return; }
    setInvs(restored.investments   ?? []);
    setCats(restored.categories    ?? DEF_CATS);
    setSettings(restored.settings  ?? DEFAULT_SETTINGS);
    setDeps(restored.deposits      ?? []);
    setNii(restored.nii            ?? 1);
    setNci(restored.nci            ?? 1);
    setNdi(restored.ndi            ?? 1);
    setQuotes(restored.quotes      ?? DEF_QUOTES);
    setSnaps(lsLoadSnaps());
    toast_(`✓ Versão de ${new Date(snap.ts).toLocaleString("pt-BR")} restaurada`);
  }

  function saveApiKey(key) {
    try { localStorage.setItem("investpro_apikey", key); } catch(_) {}
    setApiKey_(key);
    toast_("✓ Chave de API salva");
  }

  async function fetchQuotes() {
    setQLoading(true);
    try {
      const data = await fetchAllQuotes(auth?.token);
      const now  = new Date().toLocaleString("pt-BR");
      const newQ = { ...quotes, data, updatedAt: now, error: null };
      setQuotes(newQ);

      // Sincroniza CDI e câmbio com as configurações do portfólio
      const newFx = { ...settings.fx };
      if (data.currencies?.USD?.price) newFx.USD = data.currencies.USD.price;
      if (data.currencies?.EUR?.price) newFx.EUR = data.currencies.EUR.price;
      const newSet = { ...settings, fx: newFx };
      if (data.cdi && data.cdi > 0) newSet.cdiRate = data.cdi;

      setSettings(newSet);
      save(invs, cats, newSet, deps, nii, nci, ndi, newQ, renda);

      const cdiMsg    = data.cdi    ? ` · CDI ${fmtP(data.cdi)}` : "";
      const cacheMsg  = data.cached ? " (cache)" : "";
      toast_(`✓ Cotações atualizadas${cdiMsg}${cacheMsg} — ${now}`);
    } catch (err) {
      const msg  = err.message || "Erro desconhecido";
      const newQ = { ...quotes, error: msg };
      setQuotes(newQ);
      save(invs, cats, settings, deps, nii, nci, ndi, newQ, renda);
      toast_(`✗ ${msg.substring(0, 80)}`, false);
    } finally {
      setQLoading(false);
    }
  }

  function updateWatchlist(section, tickers) {
    const newQ = { ...quotes, watchlist: { ...quotes.watchlist, [section]: tickers } };
    setQuotes(newQ);
    save(invs, cats, settings, deps, nii, nci, ndi, newQ, renda);
  }

  function saveRenda(mesIdx, data) {
    const newRenda = { ...renda, [mesIdx]: data };
    setRenda(newRenda);
    save(invs, cats, settings, deps, nii, nci, ndi, quotes, newRenda);
  }

  function doImport(data) {
    const ni = data.investments || [];
    const nc = data.categories  || cats;
    const ns = data.settings    || settings;
    const nd = data.deposits    || [];
    const nii2 = ni.length ? Math.max(...ni.map(i=>i.id))+1 : 1;
    const nci2 = nc.length ? Math.max(...nc.map(c=>c.id))+1 : 1;
    const ndi2 = nd.length ? Math.max(...nd.map(d=>d.id))+1 : 1;
    setInvs(ni); setCats(nc); setSettings(ns); setDeps(nd);
    setNii(nii2); setNci(nci2); setNdi(ndi2);
    save(ni, nc, ns, nd, nii2, nci2, ndi2, quotes, renda);
    setModal(null);
    toast_(`✓ ${ni.length} investimentos importados`);
  }

  // Filter nav items by user permissions
  const visibleNav = isAdmin
    ? NAV
    : NAV.filter(item => userModules.includes(item.id));

  const sp = { invs, cats, settings, projs, cons, totalInv, deps, fx, isMobile, quotes, snaps, apiKey, renda, auth, isAdmin, userModules };

  return (
    <div style={S.app}>
      <style>{CSS}</style>

      {toast && (
        <div style={{ ...S.toast, bottom:isMobile?76:24, right:isMobile?12:24, left:isMobile?12:"auto", background:toast.ok?"#001a0a":"#1a0000", borderColor:toast.ok?"#00cc6644":"#cc000044", color:toast.ok?"#00cc66":"#ff6666" }}>
          {toast.msg}
        </div>
      )}

      {urgent.length > 0 && (
        <AlertBanner urgent={urgent} />
      )}

      {!isMobile && (
        <Sidebar sideOpen={sideOpen} setSideOpen={setSideOpen} screen={screen} setScreen={setScreen}
          visibleNav={visibleNav} onLogout={handleLogout} user={auth?.user} />
      )}

      {isMobile && (
        <>
          <div style={S.mobileBar}>
            <button style={{ ...S.hamburger, color:"#fff", background:"#1f1f1f", borderRadius:10, padding:"8px 10px", border:"1px solid #333" }} onClick={() => setSideOpen(o => !o)} aria-label="Menu">
              <Icon name={sideOpen ? "close" : "menu"} size={20} />
            </button>
            <div style={{ display:"flex", alignItems:"center", gap:8, flex:1, justifyContent:"center" }}>
              <span style={{ fontSize:20 }}>🪙</span>
              <span style={{ ...S.logoText, fontSize:16 }}>InvestPro</span>
            </div>
            <span style={S.mobileCdi}>CDI {fmtP(settings.cdiRate)}</span>
          </div>
          {sideOpen && (
            <div style={S.drawerOverlay} onClick={() => setSideOpen(false)}>
              <nav style={S.drawer} onClick={e => e.stopPropagation()}>
                <div style={S.drawerHeader}>
                  <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                    <span style={{ fontSize:22 }}>🪙</span>
                    <span style={{ fontSize:18, fontWeight:800, color:"#fff" }}>InvestPro</span>
                  </div>
                  <button style={{ ...S.hamburger, color:"#fff" }} onClick={() => setSideOpen(false)}>
                    <Icon name="close" size={20} />
                  </button>
                </div>
                {/* User info */}
                <div style={{ padding:"12px 20px 8px", borderBottom:`1px solid ${T.border}` }}>
                  <div style={{ fontSize:13, color:"#fff", fontWeight:600 }}>{auth?.user?.name}</div>
                  <div style={{ fontSize:11, color:"#555", fontFamily:T.mono, marginTop:2 }}>{auth?.user?.email}</div>
                  <div style={{ marginTop:6 }}><RoleBadge role={auth?.user?.role} /></div>
                </div>
                {visibleNav.map(item => (
                  <button key={item.id}
                    style={{ ...S.drawerItem, ...(screen===item.id ? S.drawerItemActive : {}) }}
                    onClick={() => { setScreen(item.id); setSideOpen(false); }}>
                    <Icon name={item.icon} size={18} />
                    <span>{item.label}</span>
                    {screen===item.id && <span style={S.drawerActiveDot} />}
                  </button>
                ))}
                {/* Logout */}
                <button style={{ ...S.drawerItem, marginTop:"auto", color:"#ef4444", borderTop:`1px solid ${T.border}` }}
                  onClick={() => { setSideOpen(false); handleLogout(); }}>
                  <Icon name="close" size={18} />
                  <span>Sair</span>
                </button>
              </nav>
            </div>
          )}
        </>
      )}

      <main style={{ ...S.main, marginLeft:isMobile?0:(sideOpen?240:68), padding:isMobile?"16px 14px 40px":"28px 36px 56px", marginTop:isMobile?56:0 }}>
        {screen === "dashboard"   && <ScreenDashboard   {...sp} setScreen={setScreen} onAdd={() => setModal({t:"inv",d:{}})} irAlerts={irAlerts} vencAlerts={vencAlerts} />}
        {screen === "investments" && <ScreenInvestments {...sp} onAdd={() => setModal({t:"inv",d:{}})} onEdit={inv => setModal({t:"inv",d:inv})} onDel={delInv} onDep={inv => setModal({t:"dep",d:{invId:inv.id}})} onExJSON={() => doExportJSON(invs,cats,settings,deps)} onExCSV={() => doExportCSV(invs)} onImport={() => setModal({t:"import"})} />}
        {screen === "renda"       && <ScreenRenda       renda={renda} isMobile={isMobile} onSave={saveRenda} />}
        {screen === "history"     && <ScreenHistory     {...sp} onAddDep={() => setModal({t:"dep",d:{}})} onDelDep={delDep} />}
        {screen === "comparator"  && <ScreenComparator  {...sp} />}
        {screen === "projection"  && <ScreenProjection  {...sp} />}
        {screen === "quotes"      && <ScreenCotacoes    {...sp} onFetch={fetchQuotes} onUpdateWatchlist={updateWatchlist} qLoading={qLoading} />}
        {screen === "categories"  && <ScreenCategories  {...sp} onAdd={() => setModal({t:"cat",d:{}})} onEdit={cat => setModal({t:"cat",d:cat})} onDel={delCat} />}
        {screen === "settings"    && <ScreenSettings    {...sp} onSave={saveSettings} onRestore={restoreSnap} onSaveApiKey={saveApiKey} />}
        {screen === "admin"       && isAdmin && <ScreenAdmin auth={auth} isMobile={isMobile} />}
      </main>

      {modal?.t === "inv"    && <InvModal    data={modal.d} cats={cats} isMobile={isMobile} onSave={saveInv}    onClose={() => setModal(null)} />}
      {modal?.t === "cat"    && <CatModal    data={modal.d}             isMobile={isMobile} onSave={saveCat}    onClose={() => setModal(null)} />}
      {modal?.t === "dep"    && <DepModal    data={modal.d} invs={invs} isMobile={isMobile} onSave={saveDep}    onClose={() => setModal(null)} />}
      {modal?.t === "import" && <ImportModal                            isMobile={isMobile} onImport={doImport} onClose={() => setModal(null)} />}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════════════════════════════════════════
function Sidebar({ sideOpen, setSideOpen, screen, setScreen, visibleNav, onLogout, user }) {
  return (
    <aside style={{ ...S.sidebar, width:sideOpen?240:68 }}>
      {/* Logo */}
      <div style={S.sidebarLogo} onClick={() => setSideOpen(o => !o)}>
        <div style={{ width:36, height:36, borderRadius:10, background:"#F5C518", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, fontSize:20, lineHeight:1 }}>
          🪙
        </div>
        {sideOpen && (
          <>
            <span style={S.logoText}>InvestPro</span>
            <span style={{ marginLeft:"auto", color:"#555", flexShrink:0, display:"flex" }}>
              <Icon name="close" size={14} />
            </span>
          </>
        )}
      </div>

      {/* User info */}
      {sideOpen && user && (
        <div style={{ padding:"12px 14px", borderBottom:`1px solid ${T.border}`, flexShrink:0 }}>
          <div style={{ fontSize:13, fontWeight:600, color:"#fff", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{user.name}</div>
          <div style={{ fontSize:10, color:"#555", fontFamily:T.mono, marginTop:2, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{user.email}</div>
          <div style={{ marginTop:6 }}><RoleBadge role={user.role} /></div>
        </div>
      )}

      {/* Nav */}
      <nav style={S.nav}>
        {(visibleNav || NAV).map(item => (
          <button key={item.id}
            style={{ ...S.navItem, ...(screen===item.id?S.navActive:{}), justifyContent:sideOpen?"flex-start":"center" }}
            className={screen===item.id ? "" : "nav-hover"}
            onClick={() => setScreen(item.id)}
            title={!sideOpen ? item.label : undefined}>
            <Icon name={item.icon} size={18} style={{ flexShrink:0 }} />
            {sideOpen && <span style={{ fontSize:13, marginLeft:2 }}>{item.label}</span>}
          </button>
        ))}
      </nav>

      {/* Logout */}
      <button
        style={{ ...S.navItem, justifyContent:sideOpen?"flex-start":"center", color:"#ef4444", borderTop:`1px solid ${T.border}`, flexShrink:0, padding:"14px 11px" }}
        className="nav-hover"
        onClick={onLogout}
        title={!sideOpen ? "Sair" : undefined}>
        <Icon name="close" size={18} style={{ flexShrink:0 }} />
        {sideOpen && <span style={{ fontSize:13, marginLeft:2 }}>Sair</span>}
      </button>
    </aside>
  );
}

function SumRow({ label, value, color }) {
  return (
    <div style={{ marginTop:8 }}>
      <div style={S.sl}>{label}</div>
      <div style={{ ...S.sv, color }}>{value}</div>
    </div>
  );
}

function MetaBar({ pct }) {
  return (
    <div style={{ marginTop:8 }}>
      <div style={S.sl}>Meta {pct.toFixed(0)}%</div>
      <div style={{ height:4, background:"#1e1c16", borderRadius:2, marginTop:4 }}>
        <div style={{ height:4, background:"#b77ee2", borderRadius:2, width:`${pct}%`, transition:"width .4s" }} />
      </div>
    </div>
  );
}

function AlertBanner({ urgent }) {
  const msgs = urgent.slice(0, 3).map(x => {
    if (x.a?.proxima) return `IR ${x.inv.nome}: ${x.a.faixa}→${x.a.proxima} em ${x.a.diasRestantes}d`;
    return `Venc. ${x.inv.nome}: ${x.a.label}`;
  });
  return (
    <div style={S.alertBanner}>
      <span>⚠️</span>
      <span style={{ flex:1, fontSize:11 }}>{msgs.join(" · ")}</span>
    </div>
  );
}

// SCREENS
// ═══════════════════════════════════════════════════════════════════════════════

function ScreenDashboard({ invs, cats, settings, projs, cons, totalInv, deps, fx, isMobile, setScreen, onAdd, irAlerts, vencAlerts }) {
  const last12  = cons[11];
  const next1   = cons[0];
  const meta    = settings.meta;
  const metaPct = meta?.ativa && meta.valor > 0 ? Math.min(100, totalInv / meta.valor * 100) : null;

  const byType = TYPES.map(t => ({
    ...t,
    value: invs.filter(i => i.tipo === t.id).reduce((a, c) => a + c.valor * (t.currency ? (fx[t.currency]||1) : 1), 0)
  })).filter(t => t.value > 0);

  const byCat = cats.map(cat => ({
    name:  cat.nome,
    color: cat.cor,
    value: invs.filter(i => i.categoriaId === cat.id).reduce((a, c) => {
      const t = getType(c.tipo);
      return a + c.valor * (t.currency ? (fx[t.currency]||1) : 1);
    }, 0),
  })).filter(c => c.value > 0);

  const areaData = cons.slice(0, 12).map(r => ({
    mes:        r.mes.split(" ")[0],
    "Líquido":  r.saldoLiquido,
    "Bruto":    r.saldo,
    "Principal": totalInv,
  }));

  return (
    <div style={P.root}>
      <PageHeader title="Dashboard" subtitle="Visão geral">
        <Btn onClick={onAdd}>+ Novo</Btn>
      </PageHeader>

      <div style={P.kpiRow} className="kpi-row">
        <KPI label="Total Investido"     value={fmt(totalInv)}                   color="#F5C518" icon="investments" />
        <KPI label="Patrimônio 12m"      value={fmt(last12?.saldoLiquido ?? 0)}  color="#ffffff" icon="projection" />
        <KPI label="IR estimado 12m"     value={fmt(last12?.ir ?? 0)}            color="#ff6666" icon="alert" />
        <KPI label="Rend. próximo mês"   value={`+${fmt(next1?.rendLiquido ?? 0)}`} color="#aaaaaa" icon="quotes" />
      </div>

      {metaPct !== null && (
        <div style={P.metaCard}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
            <span style={{ color:"#b77ee2", fontWeight:700, fontSize:13 }}>
              🎯 Meta · <span style={{ color:"#6a6458", fontWeight:400, fontSize:11, fontFamily:"IBM Plex Mono,monospace" }}>{fmt(totalInv)} de {fmt(meta.valor)}</span>
            </span>
            <span style={{ color:"#b77ee2", fontWeight:800, fontFamily:"IBM Plex Mono,monospace" }}>{metaPct.toFixed(1)}%</span>
          </div>
          <div style={P.metaTrack}><div style={{ ...P.metaFill, width:`${metaPct}%` }} /></div>
          <div style={{ display:"flex", justifyContent:"space-between", marginTop:4, fontSize:10, color:"#4a4438", fontFamily:"IBM Plex Mono,monospace" }}>
            <span>Faltam {fmt(Math.max(0, meta.valor - totalInv))}</span>
            <span>Prazo: {meta.prazo}m</span>
          </div>
        </div>
      )}

      <div style={{ ...P.grid2, gridTemplateColumns:isMobile?"1fr":"1fr 1fr" }}>
        <ChartCard title="Evolução Patrimonial — 12m">
          <ResponsiveContainer width="100%" height={200}>
            <AreaChart data={areaData} margin={{ top:8, right:8, left:0, bottom:0 }}>
              <defs>
                {[["l","#7ecfb3"],["b","#e2c97e"],["p","#3a3020"]].map(([id, c]) => (
                  <linearGradient key={id} id={`g${id}`} x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%"   stopColor={c} stopOpacity={0.3} />
                    <stop offset="100%" stopColor={c} stopOpacity={0.02} />
                  </linearGradient>
                ))}
              </defs>
              <CartesianGrid strokeDasharray="3 3" stroke="#1a1814" vertical={false} />
              <XAxis dataKey="mes" tick={{ fill:"#6a6458", fontSize:10 }} axisLine={{ stroke:"#2a2820" }} tickLine={false} />
              <YAxis tickFormatter={fmtS} tick={{ fill:"#6a6458", fontSize:10 }} axisLine={false} tickLine={false} width={52} />
              <Tooltip content={<ChartTip />} />
              <Area type="monotone" dataKey="Principal" stroke="#4a4030" strokeWidth={1} fill="url(#gp)" strokeDasharray="4 3" dot={false} />
              <Area type="monotone" dataKey="Bruto"     stroke="#e2c97e" strokeWidth={1.5} fill="url(#gb)" dot={false} />
              <Area type="monotone" dataKey="Líquido"   stroke="#7ecfb3" strokeWidth={2}   fill="url(#gl)" dot={false} activeDot={{ r:4 }} />
            </AreaChart>
          </ResponsiveContainer>
        </ChartCard>

        <ChartCard title="Alocação por Tipo">
          <ResponsiveContainer width="100%" height={200}>
            <PieChart>
              <Pie data={byType} dataKey="value" nameKey="label" cx="50%" cy="50%" outerRadius={75} innerRadius={42} paddingAngle={3}
                label={({ label: lb, percent }) => `${lb} ${(percent*100).toFixed(0)}%`}
                labelLine={{ stroke:"#2a2820" }}>
                {byType.map((t, i) => <Cell key={i} fill={t.color} stroke="#0e0d0b" strokeWidth={2} />)}
              </Pie>
              <Tooltip formatter={v => fmt(v)} contentStyle={{ background:"#0e0d0b", border:"1px solid #2a2820", borderRadius:8, fontFamily:"IBM Plex Mono,monospace", fontSize:11 }} />
            </PieChart>
          </ResponsiveContainer>
        </ChartCard>
      </div>

      <div style={{ ...P.grid2, gridTemplateColumns:isMobile?"1fr":"1fr 1fr" }}>
        <ChartCard title="🔔 Vencimentos">
          {vencAlerts.length === 0
            ? <Muted>✓ Nenhum vencimento próximo (90 dias).</Muted>
            : vencAlerts.map(({ inv, a }) => (
              <AlertRow key={inv.id} name={inv.nome} sub={`Vence: ${fmtD(inv.vencimento)}`} badge={a.label} badgeColor={a.cor} urgent={a.urgente} />
            ))
          }
        </ChartCard>

        <ChartCard title="⚠️ Alertas de IR">
          {irAlerts.length === 0
            ? <Muted>✓ Nenhum investimento próximo de mudar de faixa.</Muted>
            : irAlerts.map(({ inv, a }) => (
              <AlertRow key={inv.id} name={inv.nome} sub={`IR: ${a.faixa} → ${a.proxima}`} badge={`${a.diasRestantes}d`} badgeColor={a.urgente?"#e27e9a":"#e2c97e"} urgent={a.urgente} />
            ))
          }
        </ChartCard>
      </div>

      {byCat.length > 0 && (
        <ChartCard title="Distribuição por Categoria">
          <ResponsiveContainer width="100%" height={180}>
            <BarChart data={byCat} layout="vertical" margin={{ top:4, right:8, left:0, bottom:0 }}>
              <CartesianGrid strokeDasharray="3 3" stroke="#1a1814" horizontal={false} />
              <XAxis type="number" tickFormatter={fmtS} tick={{ fill:"#6a6458", fontSize:10 }} axisLine={false} tickLine={false} />
              <YAxis type="category" dataKey="name" tick={{ fill:"#c9bfaa", fontSize:11, fontFamily:"IBM Plex Mono" }} axisLine={false} tickLine={false} width={90} />
              <Tooltip formatter={v => fmt(v)} contentStyle={{ background:"#0e0d0b", border:"1px solid #2a2820", borderRadius:8, fontFamily:"IBM Plex Mono,monospace", fontSize:11 }} />
              <Bar dataKey="value" radius={[0,4,4,0]}>
                {byCat.map((c, i) => <Cell key={i} fill={c.color} />)}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
        </ChartCard>
      )}
    </div>
  );
}

function ScreenInvestments({ invs, cats, projs, fx, isMobile, onAdd, onEdit, onDel, onDep, onExJSON, onExCSV, onImport }) {
  const [filter, setFilter] = useState("all");
  const [search, setSearch] = useState("");

  const filtered = projs.filter(inv =>
    (filter === "all" || inv.tipo === filter) &&
    inv.nome.toLowerCase().includes(search.toLowerCase())
  );

  return (
    <div style={P.root}>
      <PageHeader title="Investimentos" subtitle={`${invs.length} ativo${invs.length !== 1 ? "s" : ""}`}>
        <div style={{ display:"flex", gap:7, flexWrap:"wrap" }}>
          <BtnSec onClick={onImport}><Icon name="upload" size={13}/>Importar</BtnSec>
          <BtnSec onClick={onExCSV}><Icon name="download" size={13}/>CSV</BtnSec>
          <BtnSec onClick={onExJSON}><Icon name="download" size={13}/>JSON</BtnSec>
          <Btn onClick={onAdd}>+ Novo</Btn>
        </div>
      </PageHeader>

      <div style={P.filterRow} className="filter-row">
        <input style={P.search} className="search-input" placeholder="Buscar..." value={search} onChange={e => setSearch(e.target.value)} />
        <div style={{ display:"flex", flexWrap:"wrap", gap:7 }}>
          <Chip active={filter==="all"} onClick={() => setFilter("all")}>Todos</Chip>
          {TYPES.filter(t => invs.some(i => i.tipo === t.id)).map(t => (
            <Chip key={t.id} active={filter===t.id} onClick={() => setFilter(t.id)} color={t.color}>{t.icon} {t.label}</Chip>
          ))}
        </div>
      </div>

      {filtered.length === 0
        ? <Empty>Nenhum investimento encontrado.</Empty>
        : (
          <div style={P.cardGrid}>
            {filtered.map(inv => (
              <InvCard key={inv.id} inv={inv} cats={cats} fx={fx} onEdit={onEdit} onDel={onDel} onDep={onDep} />
            ))}
          </div>
        )
      }
    </div>
  );
}

function InvCard({ inv, cats, fx, onEdit, onDel, onDep }) {
  const t       = getType(inv.tipo);
  const cat     = cats.find(c => c.id === inv.categoriaId);
  const last    = inv.months[11];
  const fxRate  = t.currency ? (fx[t.currency] || 1) : 1;
  const valBRL  = inv.valor * fxRate;
  const gain    = last.rendLiquido;
  const gainPct = valBRL > 0 ? gain / valBRL * 100 : 0;
  const irAlert = getIRAlert(inv);
  const va      = getVencAlert(inv);

  return (
    <div style={{ ...P.invCard, borderColor:t.color+"55" }} className="card-hover">
      <div style={P.invCardTop}>
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          <span style={{ ...P.typeIcon, background:t.color+"22", color:t.color }}>{t.icon}</span>
          <div>
            <div style={{ color:"#f0ebe0", fontWeight:700, fontSize:14 }}>{inv.nome}</div>
            <div style={{ color:t.color, fontSize:11, fontFamily:"IBM Plex Mono,monospace" }}>{t.label}{t.currency && ` · ${t.currency}`}</div>
          </div>
        </div>
        <div style={{ display:"flex", gap:5 }}>
          <IBtn onClick={() => onDep(inv)} title="Registrar aporte" iconName="deposit"/>
          <IBtn onClick={() => onEdit(inv)} title="Editar" iconName="edit"/>
          <IBtn onClick={() => onDel(inv.id)} title="Remover" iconName="trash"/>
        </div>
      </div>

      {cat && <div style={{ ...P.catTag, borderColor:cat.cor, color:cat.cor }}>{cat.nome}</div>}
      {va && <div style={{ ...P.pill, borderColor:va.cor+"66", color:va.cor }}>🔔 Vence: {fmtD(inv.vencimento)} ({va.label})</div>}
      {irAlert && <div style={{ ...P.pill, borderColor:irAlert.urgente?"#e27e9a66":"#e2c97e44", color:irAlert.urgente?"#e27e9a":"#e2c97e" }}>⚠️ IR: {irAlert.faixa}→{irAlert.proxima} em {irAlert.diasRestantes}d</div>}

      <div style={P.metrics}>
        <Met label={t.currency ? `Valor (${t.currency})` : "Investido"} value={t.currency ? fmtFX(inv.valor, t.currency) : fmt(inv.valor)} />
        {t.currency && <Met label="Valor (BRL)" value={fmt(valBRL)} accent="#9a9080" />}
        <Met label={t.intl ? "Retorno a.a." : "% CDI"}    value={fmtP(inv.pct)} />
        <Met label="Saldo 12m"  value={fmt(last.saldoLiquido)} accent="#7ecfb3" />
        <Met label="Rend. líq." value={`+${fmt(gain)}`}         accent="#7ecfb3" />
        <Met label="Retorno %"  value={`+${gainPct.toFixed(2)}%`} accent="#7eb8e2" />
        {t.ir && <Met label="IR 12m" value={`-${fmt(last.ir)}`} accent="#e27e9a" />}
      </div>

      {inv.vencimento && <div style={P.dateTag}>Vence: {fmtD(inv.vencimento)}</div>}
      <div style={P.dateTag}>Início: {fmtD(inv.data)}</div>
    </div>
  );
}

function ScreenHistory({ invs, deps, isMobile, onAddDep, onDelDep }) {
  const [filterInv, setFilterInv] = useState("all");

  const sorted   = [...deps].sort((a, b) => new Date(b.data) - new Date(a.data));
  const filtered = filterInv === "all" ? sorted : sorted.filter(d => d.invId === parseInt(filterInv));
  const totalDep = deps.reduce((a, d) => a + d.valor, 0);

  const byMonth = useMemo(() => {
    const map = {};
    deps.forEach(d => {
      const key = new Date(d.data + "T12:00:00").toLocaleDateString("pt-BR", { month:"short", year:"numeric" });
      map[key] = (map[key] || 0) + d.valor;
    });
    return Object.entries(map).slice(-12).map(([mes, valor]) => ({ mes, valor }));
  }, [deps]);

  const byInv = useMemo(() => {
    const map = {};
    deps.forEach(d => { map[d.invId] = (map[d.invId] || 0) + d.valor; });
    return map;
  }, [deps]);

  return (
    <div style={P.root}>
      <PageHeader title="Histórico de Aportes" subtitle={`${deps.length} aporte${deps.length!==1?"s":""} · ${fmt(totalDep)}`}>
        <Btn onClick={onAddDep}>+ Registrar Aporte</Btn>
      </PageHeader>

      <div style={P.kpiRow} className="kpi-row">
        <KPI label="Total aportado"   value={fmt(totalDep)}                                          color="#F5C518" icon="investments" />
        <KPI label="Média por aporte" value={deps.length ? fmt(totalDep/deps.length) : "R$ 0"}      color="#aaaaaa" icon="quotes" />
        <KPI label="Ativos com aportes" value={`${Object.keys(byInv).length}`}                      color="#ffffff" icon="projection" />
        <KPI label="Último aporte"    value={sorted[0] ? fmtD(sorted[0].data) : "—"}                color="#F5C518" icon="history" />
      </div>

      <div style={{ ...P.grid2, gridTemplateColumns:isMobile?"1fr":"2fr 1fr" }}>
        <ChartCard title="Aportes por Mês">
          {byMonth.length === 0
            ? <Empty>Nenhum aporte registrado.</Empty>
            : (
              <ResponsiveContainer width="100%" height={200}>
                <BarChart data={byMonth} margin={{ top:8, right:8, left:0, bottom:0 }}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#1a1814" vertical={false} />
                  <XAxis dataKey="mes" tick={{ fill:"#6a6458", fontSize:10 }} axisLine={{ stroke:"#2a2820" }} tickLine={false} />
                  <YAxis tickFormatter={fmtS} tick={{ fill:"#6a6458", fontSize:10 }} axisLine={false} tickLine={false} width={52} />
                  <Tooltip content={<ChartTip />} />
                  <Bar dataKey="valor" fill="#e2c97e" radius={[4,4,0,0]} fillOpacity={0.85} />
                </BarChart>
              </ResponsiveContainer>
            )
          }
        </ChartCard>

        <ChartCard title="Por Investimento">
          {invs.filter(i => byInv[i.id]).length === 0
            ? <Muted>Sem aportes.</Muted>
            : invs.filter(i => byInv[i.id]).map(inv => {
              const t   = getType(inv.tipo);
              const val = byInv[inv.id] || 0;
              const pct = totalDep > 0 ? val / totalDep * 100 : 0;
              return (
                <div key={inv.id} style={{ marginBottom:10 }}>
                  <div style={{ display:"flex", justifyContent:"space-between", marginBottom:3 }}>
                    <span style={{ color:"#c9bfaa", fontSize:12 }}>{t.icon} {inv.nome}</span>
                    <span style={{ color:t.color, fontFamily:"IBM Plex Mono,monospace", fontSize:11 }}>{fmt(val)}</span>
                  </div>
                  <div style={{ height:4, background:"#1e1c16", borderRadius:2 }}>
                    <div style={{ height:4, background:t.color, borderRadius:2, width:`${pct}%` }} />
                  </div>
                </div>
              );
            })
          }
        </ChartCard>
      </div>

      <ChartCard title="Todos os Aportes">
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12, flexWrap:"wrap", gap:8 }}>
          <div />
          <select style={{ ...P.search, width:"auto", cursor:"pointer" }} value={filterInv} onChange={e => setFilterInv(e.target.value)}>
            <option value="all">Todos</option>
            {invs.map(inv => <option key={inv.id} value={inv.id}>{inv.nome}</option>)}
          </select>
        </div>
        {filtered.length === 0
          ? <Muted>Nenhum aporte encontrado.</Muted>
          : (
            <div style={{ overflowX:"auto" }}>
              <table style={P.table}>
                <thead><tr>
                  <th style={P.th}>Data</th>
                  <th style={P.th}>Investimento</th>
                  <th style={P.th}>Valor</th>
                  <th style={P.th}>Obs.</th>
                  <th style={P.th}></th>
                </tr></thead>
                <tbody>
                  {filtered.map(dep => {
                    const inv = invs.find(i => i.id === dep.invId);
                    const t   = getType(inv?.tipo);
                    return (
                      <tr key={dep.id} style={P.tr}>
                        <td style={{ ...P.td, color:"#c9bfaa" }}>{fmtD(dep.data)}</td>
                        <td style={{ ...P.td, color:t.color }}>{t.icon} {inv?.nome || "—"}</td>
                        <td style={{ ...P.td, color:"#7ecfb3", fontWeight:600 }}>{fmt(dep.valor)}</td>
                        <td style={{ ...P.td, color:"#6a6458", fontSize:11 }}>{dep.obs || "—"}</td>
                        <td style={P.td}><IBtn onClick={() => onDelDep(dep.id)} title="Remover" iconName="trash"/></td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )
        }
      </ChartCard>
    </div>
  );
}

function ScreenComparator({ invs, projs, isMobile }) {
  const [selA, setSelA] = useState(invs[0]?.id ?? null);
  const [selB, setSelB] = useState(invs[1]?.id ?? null);

  const invA = projs.find(p => p.id === selA);
  const invB = projs.find(p => p.id === selB);

  const chartData = invA && invB
    ? Array.from({ length:12 }, (_, i) => ({
        mes:          invA.months[i].mes.split(" ")[0],
        [invA.nome]:  invA.months[i].saldoLiquido,
        [invB.nome]:  invB.months[i].saldoLiquido,
      }))
    : [];

  return (
    <div style={P.root}>
      <PageHeader title="Comparador" subtitle="Compare dois investimentos lado a lado" />

      {invs.length < 2
        ? <Empty>Cadastre ao menos 2 investimentos para comparar.</Empty>
        : (
          <>
            <div style={{ display:"grid", gridTemplateColumns:isMobile?"1fr":"1fr 1fr", gap:16, marginBottom:20 }}>
              {[{ sel:selA, set:setSelA, label:"Investimento A", color:"#e2c97e" },
                { sel:selB, set:setSelB, label:"Investimento B", color:"#7eb8e2" }].map(({ sel, set, label, color }) => (
                <CompSelector key={label} sel={sel} setSel={set} label={label} color={color} invs={invs} projs={projs} />
              ))}
            </div>

            {invA && invB && (
              <>
                <ChartCard title="Saldo Líquido — 12 meses">
                  <ResponsiveContainer width="100%" height={220}>
                    <AreaChart data={chartData} margin={{ top:8, right:8, left:0, bottom:0 }}>
                      <defs>
                        <linearGradient id="cA" x1="0" y1="0" x2="0" y2="1">
                          <stop offset="0%"   stopColor="#e2c97e" stopOpacity={0.3} />
                          <stop offset="100%" stopColor="#e2c97e" stopOpacity={0.02} />
                        </linearGradient>
                        <linearGradient id="cB" x1="0" y1="0" x2="0" y2="1">
                          <stop offset="0%"   stopColor="#7eb8e2" stopOpacity={0.3} />
                          <stop offset="100%" stopColor="#7eb8e2" stopOpacity={0.02} />
                        </linearGradient>
                      </defs>
                      <CartesianGrid strokeDasharray="3 3" stroke="#1a1814" vertical={false} />
                      <XAxis dataKey="mes" tick={{ fill:"#6a6458", fontSize:10 }} axisLine={{ stroke:"#2a2820" }} tickLine={false} />
                      <YAxis tickFormatter={fmtS} tick={{ fill:"#6a6458", fontSize:10 }} axisLine={false} tickLine={false} width={56} />
                      <Tooltip content={<ChartTip />} />
                      <Legend wrapperStyle={{ fontFamily:"IBM Plex Mono", fontSize:10, color:"#6a6458" }} iconType="circle" iconSize={7} />
                      <Area type="monotone" dataKey={invA.nome} stroke="#e2c97e" strokeWidth={2} fill="url(#cA)" dot={false} />
                      <Area type="monotone" dataKey={invB.nome} stroke="#7eb8e2" strokeWidth={2} fill="url(#cB)" dot={false} />
                    </AreaChart>
                  </ResponsiveContainer>
                </ChartCard>

                <div style={{ marginTop:16 }}>
                  <ChartCard title="Confronto direto — 12 meses">
                    <CompTable invA={invA} invB={invB} />
                  </ChartCard>
                </div>
              </>
            )}
          </>
        )
      }
    </div>
  );
}

function CompSelector({ sel, setSel, label, color, invs, projs }) {
  const inv = projs.find(p => p.id === sel);
  return (
    <div style={{ ...P.chartCard, borderColor:color+"44" }}>
      <div style={{ ...P.chartTitle, color }}>{label}</div>
      <select style={{ ...P.search, width:"100%", cursor:"pointer" }} value={sel ?? ""} onChange={e => setSel(parseInt(e.target.value))}>
        {invs.map(i => <option key={i.id} value={i.id}>{i.nome}</option>)}
      </select>
      {inv && (
        <div style={{ marginTop:12, display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
          <Met label="Investido"  value={fmt(inv.valor)} />
          <Met label="% CDI/Ret." value={fmtP(inv.pct)} />
          <Met label="Saldo 12m"  value={fmt(inv.months[11].saldoLiquido)} accent={color} />
          <Met label="Rend. líq." value={`+${fmt(inv.months[11].rendLiquido)}`} accent={color} />
        </div>
      )}
    </div>
  );
}

function CompTable({ invA, invB }) {
  const rows = [
    { label:"Valor investido",   a:invA.valor,                                 b:invB.valor },
    { label:"Saldo bruto 12m",   a:invA.months[11].saldo,                      b:invB.months[11].saldo },
    { label:"IR 12m",            a:invA.months[11].ir,                         b:invB.months[11].ir, lower:true },
    { label:"Saldo líquido 12m", a:invA.months[11].saldoLiquido,               b:invB.months[11].saldoLiquido },
    { label:"Rend. líquido 12m", a:invA.months[11].rendLiquido,                b:invB.months[11].rendLiquido },
    { label:"Retorno %",         a:invA.months[11].rendLiquido/invA.valor*100,  b:invB.months[11].rendLiquido/invB.valor*100, pct:true },
  ];
  return (
    <div style={{ overflowX:"auto" }}>
      <table style={P.table}>
        <thead><tr>
          <th style={P.th}>Métrica</th>
          <th style={{ ...P.th, color:"#e2c97e" }}>{invA.nome}</th>
          <th style={{ ...P.th, color:"#7eb8e2" }}>{invB.nome}</th>

          })}

      </table>
    </div>
  );
}

function ScreenProjection({ invs, projs, cons, totalInv, settings, isMobile }) {
  const [view,   setView]   = useState("liquido");

  const barData = rows.map((r, i) => {
    const prev = rows[i - 1];
    return {
      mes:            r.mes.split(" ")[0],
      "Rend. Bruto":  i===0 ? r.rendimento  : r.rendimento  - (prev?.rendimento  ?? 0),
      "Rend. Líquido":i===0 ? r.rendLiquido  : r.rendLiquido - (prev?.rendLiquido ?? 0),
      "IR":           i===0 ? r.ir           : r.ir          - (prev?.ir          ?? 0),

  });

  return (
    <div style={P.root}>
      <PageHeader title="Projeção" subtitle={`CDI ${fmtP(settings.cdiRate)} a.a.`}>

          <Toggle options={["liquido","bruto"]} labels={["Líquido","Bruto"]} value={view} onChange={setView} />
          <Toggle options={[12,24]} labels={["12m","24m"]} value={months} onChange={setMonths} />

          <>

              <KPI label={`Saldo (${months}m)`}  value={fmt(isLiq ? last?.saldoLiquido : last?.saldo)}       color="#ffffff" icon="projection" />
              <KPI label="Rendimento total"        value={`+${fmt(isLiq ? last?.rendLiquido : last?.rendimento)}`} color="#aaaaaa" icon="quotes" />
              <KPI label="IR total"                value={`-${fmt(last?.ir ?? 0)}`}                          color="#ff6666" icon="alert" />
              <KPI label="Retorno s/ capital"      value={fmtP(((last?.rendLiquido ?? 0) / totalInv) * 100)} color="#F5C518" icon="investments" />

                <BarChart data={barData} margin={{ top:8, right:8, left:0, bottom:0 }} barCategoryGap="30%">
                  <CartesianGrid strokeDasharray="3 3" stroke="#1a1814" vertical={false} />
                  <XAxis dataKey="mes" tick={{ fill:"#6a6458", fontSize:10 }} axisLine={{ stroke:"#2a2820" }} tickLine={false} />

            </ChartCard>

            <div style={{ marginTop:16 }}>
              <ChartCard title="Tabela Detalhada">
                <div style={{ overflowX:"auto" }}>
                  <table style={P.table}>

function ScreenRenda({ renda, isMobile, onSave }) {
  const hoje = new Date();
  const [mesIdx, setMesIdx] = useState(hoje.getMonth());
  const [editReceita, setEditReceita] = useState(false);
  const [addCat, setAddCat] = useState(false);
  const [newCatNome, setNewCatNome] = useState("");

  const mesData = renda[mesIdx] || defRendaMes();
  const cats = mesData.gastos || DEF_RENDA_CATS.map(c => ({ catId:c.id, previsto:DEF_RENDA_GASTOS_PREV[c.id]||0, real:0 }));

  const totalReceita = (mesData.receitas?.salario||0) + (mesData.receitas?.freelance||0) + (mesData.receitas?.outros||0);
  const totalPrevisto = cats.reduce((a,g) => a + (g.previsto||0), 0);
  const totalReal     = cats.reduce((a,g) => a + (g.real||0), 0);
  const saldo         = totalReceita - totalReal;
  const comprometido  = totalReceita > 0 ? (totalReal / totalReceita * 100) : 0;

  function updateReceita(field, val) {
    const newRec = { ...mesData.receitas, [field]: parseFloat(val)||0 };
    onSave(mesIdx, { ...mesData, receitas: newRec });
  }

  function updateGasto(catId, field, val) {
    const newGastos = cats.map(g => g.catId === catId ? { ...g, [field]: parseFloat(val)||0 } : g);
    onSave(mesIdx, { ...mesData, gastos: newGastos });
  }

  function addNewCat() {
    if (!newCatNome.trim()) return;
    const newId = Date.now();
    DEF_RENDA_CATS.push({ id: newId, nome: newCatNome.trim(), icone: "📦" });
    const newGastos = [...cats, { catId: newId, previsto:0, real:0 }];
    onSave(mesIdx, { ...mesData, gastos: newGastos });
    setNewCatNome(""); setAddCat(false);
  }

  function removeCat(catId) {
    const newGastos = cats.filter(g => g.catId !== catId);
    onSave(mesIdx, { ...mesData, gastos: newGastos });
  }

  // Chart data — top 8 by real value
  const chartData = cats
    .map(g => { const c = DEF_RENDA_CATS.find(x => x.id === g.catId); return { nome: c?.nome||"?", real: g.real||0, previsto: g.previsto||0 }; })
    .filter(x => x.real > 0 || x.previsto > 0)
    .sort((a,b) => b.real - a.real)
    .slice(0, 8);

  const saldoOk = saldo >= 0;

  return (
    <div style={P.root}>
      <PageHeader title="Minha Renda" subtitle="Controle financeiro mensal — ganhos e gastos" />

      {/* Month tabs */}
      <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:24 }}>
        {MESES.map((m, i) => (
          <button key={i} onClick={() => setMesIdx(i)}
            style={{ padding:"6px 14px", borderRadius:20, border:"1px solid", fontSize:12, fontFamily:"'IBM Plex Mono',monospace", cursor:"pointer", fontWeight: mesIdx===i?700:400,
              background: mesIdx===i?"#F5C518":"#111",
              color:      mesIdx===i?"#000":"#666",
              borderColor:mesIdx===i?"#F5C518":"#2a2a2a" }}>
            {m.substring(0,3)}
          </button>
        ))}
      </div>

      {/* KPI cards */}
      <div style={P.kpiRow} className="kpi-row">
        <KPI label="Total Receitas"   value={fmt(totalReceita)}              color="#F5C518" icon="deposit" />
        <KPI label="Total Gastos"     value={fmt(totalReal)}                 color={totalReal > totalPrevisto ? "#ff6666" : "#ffffff"} icon="renda" />
        <KPI label="Saldo do Mês"     value={fmt(saldo)}                     color={saldoOk ? "#00cc66" : "#ff6666"} icon={saldoOk?"dashboard":"alert"} />
        <KPI label="Comprometido"     value={`${comprometido.toFixed(1)}%`}  color={comprometido > 90 ? "#ff6666" : comprometido > 70 ? "#F5C518" : "#00cc66"} icon="comparator" />
      </div>

      {/* Saldo bar */}
      <div style={{ ...P.chartCard, marginBottom:20 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
          <span style={{ fontSize:11, color:"#555", fontFamily:"'IBM Plex Mono',monospace", textTransform:"uppercase", letterSpacing:1.2 }}>
            Gastos vs Receita — {MESES[mesIdx]}
          </span>
          <span style={{ fontSize:12, color: saldoOk?"#00cc66":"#ff6666", fontFamily:"'IBM Plex Mono',monospace", fontWeight:700 }}>
            {saldoOk ? `Sobram ${fmt(saldo)}` : `Déficit ${fmt(Math.abs(saldo))}`}
          </span>
        </div>
        <div style={{ height:10, background:"#1a1a1a", borderRadius:5, overflow:"hidden" }}>
          <div style={{ height:10, borderRadius:5, width:`${Math.min(100,comprometido)}%`, transition:"width .5s",
            background: comprometido>100?"#ff6666":comprometido>80?"#F5C518":"#00cc66" }} />
        </div>
        <div style={{ display:"flex", justifyContent:"space-between", marginTop:5, fontSize:10, color:"#555", fontFamily:"'IBM Plex Mono',monospace" }}>
          <span>R$ 0</span>
          <span>Meta: 80% ({fmt(totalReceita*0.8)})</span>
          <span>{fmt(totalReceita)}</span>
        </div>
      </div>

      <div style={{ ...P.grid2, gridTemplateColumns:isMobile?"1fr":"1fr 1fr" }}>
        {/* Receitas */}
        <div style={P.chartCard}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
            <div style={P.chartTitle}>💰 Receitas</div>
            <button style={{ ...P.iBtn, fontSize:11 }} onClick={() => setEditReceita(e => !e)}>
              {editReceita ? "✓ Fechar" : "✏️ Editar"}
            </button>
          </div>
          {[
            { key:"salario",   label:"Salário",            icon:"👔" },
            { key:"freelance", label:"Freelance / Extra",  icon:"💡" },
            { key:"outros",    label:"Outros",             icon:"📦" },
          ].map(({ key, label, icon }) => (
            <div key={key} style={{ display:"flex", alignItems:"center", gap:12, padding:"10px 0", borderBottom:"1px solid #1a1a1a" }}>
              <span style={{ fontSize:18, width:28 }}>{icon}</span>
              <span style={{ flex:1, color:"#ccc", fontSize:13 }}>{label}</span>
              {editReceita
                ? <input type="number" defaultValue={mesData.receitas?.[key]||0}
                    onBlur={e => updateReceita(key, e.target.value)}
                    style={{ ...P.input, width:120, textAlign:"right", fontSize:13 }} />
                : <span style={{ color:"#F5C518", fontWeight:700, fontFamily:"'IBM Plex Mono',monospace", fontSize:14 }}>{fmt(mesData.receitas?.[key]||0)}</span>
              }
            </div>
          ))}
          <div style={{ display:"flex", justifyContent:"space-between", marginTop:12, padding:"10px 0" }}>
            <span style={{ color:"#555", fontSize:12, textTransform:"uppercase", letterSpacing:1, fontFamily:"'IBM Plex Mono',monospace" }}>TOTAL</span>
            <span style={{ color:"#F5C518", fontWeight:800, fontFamily:"'IBM Plex Mono',monospace", fontSize:16 }}>{fmt(totalReceita)}</span>
          </div>
        </div>

        {/* Gastos chart */}
        <div style={P.chartCard}>
          <div style={P.chartTitle}>📊 Gastos por Categoria</div>
          {chartData.length === 0
            ? <Muted>Nenhum gasto lançado ainda.</Muted>
            : (
              <ResponsiveContainer width="100%" height={220}>
                <BarChart data={chartData} layout="vertical" margin={{ top:0, right:8, left:0, bottom:0 }}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#1a1a1a" horizontal={false} />
                  <XAxis type="number" tickFormatter={v => `R$${(v/1000).toFixed(1)}k`} tick={{ fill:"#555", fontSize:10 }} axisLine={false} tickLine={false} />
                  <YAxis type="category" dataKey="nome" tick={{ fill:"#aaa", fontSize:10, fontFamily:"'IBM Plex Mono',monospace" }} axisLine={false} tickLine={false} width={100} />
                  <Tooltip formatter={v => fmt(v)} contentStyle={{ background:"#111", border:"1px solid #222", borderRadius:8, fontFamily:"'IBM Plex Mono',monospace", fontSize:11 }} />
                  <Legend wrapperStyle={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:10, color:"#555" }} iconType="square" iconSize={7} />
                  <Bar dataKey="previsto" name="Previsto" fill="#333"    radius={[0,3,3,0]} />
                  <Bar dataKey="real"     name="Real"     fill="#F5C518" radius={[0,3,3,0]} />
                </BarChart>
              </ResponsiveContainer>
            )
          }
        </div>
      </div>

      {/* Gastos table */}
      <div style={{ ...P.chartCard, marginTop:4 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16, flexWrap:"wrap", gap:8 }}>
          <div style={P.chartTitle}>💸 Lançamento de Gastos — {MESES[mesIdx]}</div>
          <div style={{ display:"flex", gap:8 }}>
            <span style={{ color:"#555", fontSize:11, fontFamily:"'IBM Plex Mono',monospace", alignSelf:"center" }}>
              Previsto: <strong style={{ color:"#aaa" }}>{fmt(totalPrevisto)}</strong>
              {" · "}Real: <strong style={{ color: totalReal>totalPrevisto?"#ff6666":"#00cc66" }}>{fmt(totalReal)}</strong>
            </span>
            <button style={{ ...P.btnSec, fontSize:11, padding:"6px 12px" }} onClick={() => setAddCat(true)}>+ Categoria</button>
          </div>
        </div>

        {addCat && (
          <div style={{ display:"flex", gap:8, marginBottom:14, padding:12, background:"#0a0a0a", borderRadius:8, border:"1px solid #2a2a2a" }}>
            <input style={{ ...P.input, flex:1 }} placeholder="Nome da categoria" value={newCatNome} onChange={e => setNewCatNome(e.target.value)} onKeyDown={e => e.key==="Enter" && addNewCat()} autoFocus />
            <Btn onClick={addNewCat}>Adicionar</Btn>
            <BtnCancel onClick={() => setAddCat(false)}>Cancelar</BtnCancel>
          </div>
        )}

        <div style={{ overflowX:"auto" }}>
          <table style={P.table}>
            <thead><tr>
              <th style={P.th}>Categoria</th>
              <th style={{ ...P.th, textAlign:"right" }}>Previsto</th>
              <th style={{ ...P.th, textAlign:"right" }}>Real</th>
              <th style={{ ...P.th, textAlign:"right" }}>Diferença</th>
              <th style={{ ...P.th, textAlign:"right" }}>% Total</th>
              <th style={P.th}></th>
            </tr></thead>
            <tbody>
              {cats.map(g => {
                const cat = DEF_RENDA_CATS.find(c => c.id === g.catId);
                if (!cat) return null;
                const diff = (g.real||0) - (g.previsto||0);
                const pct  = totalReal > 0 ? (g.real||0) / totalReal * 100 : 0;
                const acima = diff > 0;
                return (
                  <tr key={g.catId} style={P.tr}>
                    <td style={{ ...P.td, color:"#fff" }}>{cat.icone} {cat.nome}</td>
                    <td style={{ ...P.td, textAlign:"right" }}>
                      <input type="number" value={g.previsto||0}
                        onChange={e => updateGasto(g.catId, "previsto", e.target.value)}
                        style={{ background:"transparent", border:"none", borderBottom:"1px solid #2a2a2a", color:"#777", fontFamily:"'IBM Plex Mono',monospace", fontSize:12, textAlign:"right", width:90, outline:"none" }} />
                    </td>
                    <td style={{ ...P.td, textAlign:"right" }}>
                      <input type="number" value={g.real||0}
                        onChange={e => updateGasto(g.catId, "real", e.target.value)}
                        style={{ background:"transparent", border:"none", borderBottom:"1px solid #F5C518", color:"#fff", fontFamily:"'IBM Plex Mono',monospace", fontSize:12, textAlign:"right", width:90, outline:"none", fontWeight:600 }} />
                    </td>
                    <td style={{ ...P.td, textAlign:"right", color: acima?"#ff6666":"#00cc66", fontWeight:600 }}>
                      {diff !== 0 ? (acima ? `+${fmt(diff)}` : fmt(diff)) : "—"}
                    </td>
                    <td style={{ ...P.td, textAlign:"right", color:"#555" }}>{pct.toFixed(1)}%</td>
                    <td style={P.td}>
                      <button style={{ ...P.iBtn, fontSize:11 }} onClick={() => removeCat(g.catId)} title="Remover">✕</button>
                    </td>
                  </tr>
                );
              })}
            </tbody>
            <tfoot>
              <tr style={{ borderTop:"2px solid #333" }}>
                <td style={{ ...P.td, color:"#fff", fontWeight:700 }}>TOTAL</td>
                <td style={{ ...P.td, textAlign:"right", color:"#aaa", fontWeight:700 }}>{fmt(totalPrevisto)}</td>
                <td style={{ ...P.td, textAlign:"right", color:"#F5C518", fontWeight:800, fontSize:14 }}>{fmt(totalReal)}</td>
                <td style={{ ...P.td, textAlign:"right", color: totalReal>totalPrevisto?"#ff6666":"#00cc66", fontWeight:700 }}>
                  {fmt(totalReal - totalPrevisto)}
                </td>
                <td style={{ ...P.td, textAlign:"right", color:"#555" }}>100%</td>
                <td style={P.td}></td>
              </tr>
            </tfoot>
          </table>
        </div>
        <p style={P.note}>Clique nos valores de Previsto ou Real para editar diretamente na tabela.</p>
      </div>
    </div>
  );
}
