<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InvestPro</title>
    <meta name="description" content="Rastreador de investimentos brasileiro" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪙</text></svg>" />
    <style>
      body { background: #08090A; margin: 0; }
      #splash {
        position: fixed; inset: 0; background: #08090A;
        display: flex; align-items: center; justify-content: center;
        flex-direction: column; gap: 16px; z-index: 9999;
        font-family: 'DM Sans', sans-serif;
      }
      .sp-logo {
        width: 52px; height: 52px; border-radius: 14px;
        background: #F5C518; display: flex; align-items: center;
        justify-content: center; font-size: 28px;
        animation: pulse .8s ease-in-out infinite alternate;
      }
      .sp-text { color: #F5C518; font-size: 13px; font-family: 'JetBrains Mono', monospace; letter-spacing: .5px; }
      .sp-bar  { width: 120px; height: 2px; background: #1E2024; border-radius: 2px; overflow: hidden; }
      .sp-fill { height: 100%; background: #F5C518; border-radius: 2px; animation: load 1.2s ease-in-out infinite; }
      @keyframes pulse { from { box-shadow: 0 0 0 0 rgba(245,197,24,.3); } to { box-shadow: 0 0 0 10px rgba(245,197,24,.0); } }
      @keyframes load  { 0%{width:0%} 60%{width:100%} 100%{width:100%;opacity:0} }
    </style>
  </head>
  <body>
    <div id="splash">
      <div class="sp-logo">🪙</div>
      <div class="sp-bar"><div class="sp-fill"></div></div>
      <div class="sp-text">InvestPro</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const s = document.getElementById('splash');
          if (s) { s.style.opacity = '0'; s.style.transition = 'opacity .3s'; setTimeout(() => s.remove(), 300); }
        }, 600);
      });
    </script>
  </body>
</html>
